<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content"/>
<title>BébéPilote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── Color tokens ── */
:root{
  --c-bg:#F2F0EB;--c-bg2:#FAFAF8;--c-bg3:#F5F4F0;--c-card:#fff;
  --c-bd:#F0EDE8;--c-bd2:#EAE7E2;--c-bd3:#E8E5DF;--c-fbd:#E2DFD9;--c-bd4:#F5F3EF;
  --c-ink:#1A1918;--c-t2:#5C5752;--c-t3:#7A7570;--c-t4:#B0A89E;--c-t5:#9C9790;--c-t6:#C4BFB8;
}
[data-theme="dark"]{
  --c-bg:#1C1B19;--c-bg2:#252320;--c-bg3:#2C2926;--c-card:#2A2826;
  --c-bd:#2C2926;--c-bd2:#363330;--c-bd3:#363330;--c-fbd:#3A3835;--c-bd4:#2C2926;
  --c-ink:#F0EDE8;--c-t2:#9E9690;--c-t3:#7A7570;--c-t4:#5A5450;--c-t5:#6A6460;--c-t6:#4A4845;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;font-size:100%}body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--c-bg);color:var(--c-ink);font-size:0.9375rem;line-height:1.5}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input{font-family:inherit}
a{color:#2D4A8A}

/* ── Layout ── */
#app{min-height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* ── Typography ── */
.t-headline{font-size:1.625rem;font-weight:700;letter-spacing:-.5px;color:var(--c-ink)}
.t-title{font-size:1.125rem;font-weight:600;color:var(--c-ink)}
.t-body{font-size:0.875rem;color:var(--c-t2);line-height:1.65}
.t-caption{font-size:0.75rem;color:var(--c-t5);font-weight:500}
.t-label{font-size:0.6875rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-t5)}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.serif-title{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;letter-spacing:.01em}

/* ── Surfaces ── */
.surface{background:var(--c-card);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.08)}
.surface-sm{background:var(--c-card);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.08)}

/* ── Inputs ── */
.field{width:100%;border:1.5px solid var(--c-fbd);border-radius:10px;padding:11px 14px;font-size:0.9375rem;color:var(--c-ink);background:var(--c-card);outline:none;transition:border-color .15s}
.field:focus{border-color:#2D4A8A}
.field-label{display:block;font-size:0.75rem;font-weight:600;color:var(--c-t3);margin-bottom:6px;letter-spacing:.03em}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:14px;border-radius:10px;font-size:0.9375rem;font-weight:600;text-align:center;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-dark{background:var(--c-ink);color:var(--c-bg)}
.btn-dark:hover{opacity:.88}
.btn-ghost{border:1.5px solid var(--c-fbd);color:var(--c-t2)}
.btn-ghost:hover{border-color:var(--c-t6)}
.btn-danger-ghost{border:1.5px solid #F0D4D4;color:#C45A5A;border-radius:10px;width:100%;padding:12px;font-size:0.875rem;font-weight:600}
.btn-danger-confirm{background:#C45A5A;color:#fff;border-radius:10px;width:100%;padding:12px;font-size:0.875rem;font-weight:600}

/* ── Gender toggle ── */
.gender-opt{flex:1;padding:10px 8px;border-radius:10px;border:1.5px solid var(--c-fbd);font-size:0.875rem;font-weight:600;color:var(--c-t2);text-align:center;transition:all .15s}
.gender-opt.sel{background:var(--c-ink);border-color:var(--c-ink);color:var(--c-bg)}

/* ── Top bar ── */
.topbar{background:var(--c-bg);padding:12px 20px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.child-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.625rem;font-weight:500;letter-spacing:.01em}
.child-avatar{width:30px;height:30px;border-radius:50%;background:var(--c-fbd);display:flex;align-items:center;justify-content:center;font-size:0.8125rem;font-weight:700;color:var(--c-t2)}
/* Child switcher dropdown */
.child-switcher{position:relative}
.child-drop{position:absolute;top:calc(100% + 8px);left:0;background:var(--c-card);border:1px solid var(--c-bd2);border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:200px;z-index:40;overflow:hidden}
.child-drop-item{display:flex;align-items:center;gap:10px;padding:11px 14px;width:100%;text-align:left;border-bottom:1px solid var(--c-bd);transition:background .12s}
.child-drop-item:last-child{border-bottom:none}
.child-drop-item:active,.child-drop-item:hover{background:var(--c-bg3)}
.child-drop-item.active-c{background:var(--c-bg3)}
/* Topbar stat pills */
.topbar-pills{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.topbar-pill{font-size:0.6875rem;font-weight:600;padding:3px 8px;border-radius:99px;background:var(--c-bg3);color:var(--c-t3);letter-spacing:.01em;white-space:nowrap}

/* ── Side drawer ── */
.hamburger-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;background:var(--c-bg3);color:var(--c-t2);transition:background .15s;flex-shrink:0}
.hamburger-btn:hover,.hamburger-btn:active{background:var(--c-fbd)}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;opacity:0;pointer-events:none;transition:opacity .22s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;left:0;top:0;height:100%;width:272px;max-width:82%;background:var(--c-card);z-index:61;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:4px 0 32px rgba(0,0,0,.14)}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:calc(16px + env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--c-bd);flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:10px 8px}
.drawer-foot{border-top:1px solid var(--c-bd);padding:8px 8px calc(12px + env(safe-area-inset-bottom));flex-shrink:0}
.drawer-item{display:flex;align-items:center;gap:13px;padding:11px 14px;border-radius:10px;width:100%;text-align:left;transition:background .12s;font-size:0.9375rem;font-weight:500;color:var(--c-t2)}
.drawer-item:hover,.drawer-item:active{background:var(--c-bg3)}
.drawer-item.active{background:var(--c-bg3);color:var(--c-ink);font-weight:600}
.drawer-item svg{width:20px;height:20px;flex-shrink:0;stroke:currentColor}
.drawer-section-label{padding:10px 14px 4px;font-size:0.6875rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--c-t4)}
.drawer-conv-item{display:flex;align-items:center;padding:8px 14px;border-radius:10px;width:100%;text-align:left;transition:background .12s;cursor:pointer;gap:0}
.drawer-conv-item:hover,.drawer-conv-item:active{background:var(--c-bg3)}
.drawer-conv-item.active{background:var(--c-bg3)}
.drawer-conv-title{flex:1;font-size:0.875rem;color:var(--c-t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
.drawer-conv-item.active .drawer-conv-title{color:var(--c-ink);font-weight:500}
.drawer-all-convs{display:flex;align-items:center;padding:7px 14px;font-size:0.8125rem;font-weight:500;color:var(--c-t3);width:100%;text-align:left;border-radius:10px;transition:background .12s}
.drawer-all-convs:hover,.drawer-all-convs:active{background:var(--c-bg3)}
/* ── Context menu ── */
.ctx-menu{position:fixed;background:var(--c-card);border:1px solid var(--c-bd2);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:300;min-width:190px;padding:5px;animation:fadeIn .1s}
.ctx-menu-item{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;font-size:0.9375rem;font-weight:500;text-align:left;border-radius:10px;color:var(--c-t2);transition:background .1s}
.ctx-menu-item:hover,.ctx-menu-item:active{background:var(--c-bg3)}
.ctx-menu-item.danger{color:#C45A5A}
.ctx-menu-sep{height:1px;background:var(--c-bd);margin:3px 0}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* ── Section rows ── */
.section-card{background:var(--c-card);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.08);margin:0 16px 8px}
.s-row{display:flex;align-items:center;gap:14px;padding:15px 16px;width:100%;text-align:left;border-bottom:1px solid var(--c-bd4);background:none;transition:background .12s}
.s-row:last-child{border-bottom:none}
.s-row:hover,.s-row:active{background:var(--c-bg2)}
.s-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.125rem;flex-shrink:0}

/* Section accent colors */
.acc-blue  {background:#EBF0FA;color:#2D4A8A}
.acc-green {background:#E8F2EA;color:#3D7050}
.acc-honey {background:#FBF3E5;color:#A06C2A}
.acc-rose  {background:#F7ECEF;color:#A04060}
.acc-purple{background:#F0EBFB;color:#5A3A8A}
.acc-amber {background:#FBF4E5;color:#A06C2A}
.acc-teal  {background:#E6F4F1;color:#1B7060}
.acc-coral {background:#FFF0EB;color:#A03828}
.acc-sage  {background:#EAF0E8;color:#3A5E38}
.acc-plum  {background:#FBF3E5;color:#A06C2A}

/* ── Controverse du jour (proto) ── */
.ctrv-card{display:block;margin:0 16px 16px;width:calc(100% - 32px);padding:18px;border-radius:16px;text-align:left;transition:opacity .15s;background:#FBF3E5;border:1px solid #F0E8D4}
.ctrv-card:hover{opacity:.92}
.observe-card{display:flex;align-items:center;gap:14px;margin:14px 16px 4px;width:calc(100% - 32px);padding:14px 16px;border-radius:14px;text-align:left;background:var(--c-card);border:1px dashed var(--c-bd2);transition:background .12s,border-color .12s;cursor:pointer}
.observe-card:hover{background:var(--c-bg2);border-color:#9CB89C}
.obs-ex:active{transform:scale(.97)}
.ctrv-fb{display:inline-flex;align-items:center;justify-content:center;padding:11px 8px;border-radius:11px;font-size:0.8125rem;font-weight:600;color:var(--c-t2);background:var(--c-bg2);border:1px solid var(--c-bd);transition:background .15s,border-color .15s,color .15s}
.ctrv-fb.on{background:#FBF3E5;border-color:#E8D5B0;color:#A06C2A}
.ctrv-creuser-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;border-radius:12px;background:#A06C2A;color:#fff;font-size:0.875rem;font-weight:600;margin-bottom:22px;transition:opacity .15s}
.ctrv-creuser-btn:hover{opacity:.9}
.dive-sugg{display:block;width:100%;text-align:left;padding:12px 14px;border-radius:11px;background:var(--c-bg2);border:1px solid var(--c-bd);font-size:0.8125rem;color:var(--c-ink);margin-bottom:8px;transition:background .15s}
.dive-sugg:hover{background:var(--c-bg3)}
.dive-ask{display:flex;gap:8px;margin-top:12px}
.dive-ask input{flex:1;padding:11px 14px;border-radius:11px;border:1px solid var(--c-bd);background:var(--c-card);font-size:0.875rem;color:var(--c-ink);outline:none}
.dive-ask input:focus{border-color:#E8D5B0}
.dive-send-btn{display:flex;align-items:center;justify-content:center;width:44px;border-radius:11px;background:#A06C2A;color:#fff;flex-shrink:0}
/* ── Zoé camps (débat inline) ── */
.zoe-camps-btn{display:inline-flex;align-items:center;gap:7px;margin-top:10px;padding:8px 13px;border-radius:10px;background:#FBF3E5;border:1px solid #F0E8D4;font-size:0.8125rem;font-weight:600;color:#A06C2A;transition:background .15s}
.zoe-camps-btn:hover,.zoe-camps-btn:active{background:#F5EBD5}
.zoe-camps-inline{margin-top:14px;padding-top:12px;border-top:1px solid var(--c-bd)}
.zoe-camp-item{border-radius:0 9px 9px 0;padding:9px 12px;margin-bottom:7px}

/* ── Neuron card ── */
.neuron-wrap{margin:12px 16px;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.1)}
.neuron-head{background:#3D5570;padding:11px 18px;display:flex;align-items:center;gap:8px}
.neuron-body{background:var(--c-card);padding:16px 18px}
.stat-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:0.75rem;font-weight:600}

/* ── Conseil ── */
.conseil-btn{display:flex;gap:14px;align-items:flex-start;margin:0 16px 16px;width:calc(100%-32px);padding:14px 16px;border-radius:14px;text-align:left;transition:opacity .15s;width:calc(100% - 32px);background:var(--c-bg2);border:1px solid var(--c-bd2)}
.conseil-btn:hover{opacity:.85}

/* ── History ── */
.hist-card{background:var(--c-card);border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.08);margin-bottom:10px;overflow:hidden}
.hist-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 16px;transition:background .12s}
.hist-row:hover{background:var(--c-bg2)}

/* ── Chat (Claude iOS style) ── */
.chat-zoe-head{background:var(--c-card);border-bottom:1px solid var(--c-bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-zoe-av{width:34px;height:34px;border-radius:50%;background:#3D5570;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-msgs-area{flex:1;min-height:0;overflow-y:auto;padding:18px 16px 10px;display:flex;flex-direction:column;gap:16px;background:var(--c-bg)}
/* User bubble — right aligned */
.msg-me{align-self:flex-end;background:var(--c-ink);color:var(--c-bg);border-radius:18px 18px 4px 18px;padding:11px 15px;max-width:80%;font-size:0.9375rem;line-height:1.55;word-break:break-word}
/* Bot response — no bubble, plain text */
.msg-block{display:flex;flex-direction:column;align-items:flex-start;gap:6px;max-width:94%;align-self:flex-start}
.msg-bot{color:var(--c-ink);font-size:0.9375rem;line-height:1.72;word-break:break-word}
.msg-bot ul,.msg-bot ol{margin:5px 0 5px 18px;padding:0}
.msg-bot li{margin-bottom:3px;line-height:1.6}
.msg-bot strong{font-weight:700;color:var(--c-ink)}
.msg-bot code{background:var(--c-bg2);padding:1px 4px;border-radius:4px;font-size:.88em;font-family:monospace}
.msg-actions{display:flex;gap:2px;margin-top:2px}
.msg-act{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--c-t4);transition:background .12s,color .12s}
.msg-act:hover{background:var(--c-bg3);color:var(--c-t2)}
.msg-act.on{color:#E05A5A}
.msg-act.saved-on{color:#3D5570}
.msg-act.copied-flash{color:#3D7050}
.msg-refs{display:flex;flex-direction:column;gap:5px;margin-top:4px;width:100%}
.msg-ref-link{display:flex;align-items:center;gap:7px;font-size:0.75rem;color:var(--c-t2);text-decoration:none;padding:7px 11px;background:var(--c-card);border:1px solid var(--c-bd2);border-radius:10px;line-height:1.4;transition:background .12s}
.msg-ref-link:hover{background:var(--c-bg2)}
/* Empty state */
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px 8px;gap:20px}
.chat-prompt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.chat-prompt-card{background:var(--c-card);border:1px solid var(--c-bd2);border-radius:16px;padding:14px 13px;text-align:left;font-size:0.8125rem;line-height:1.5;color:var(--c-t2);transition:background .12s,transform .1s;cursor:pointer;display:flex;flex-direction:column;gap:7px}
.chat-prompt-card:hover,.chat-prompt-card:active{background:var(--c-bg2);transform:scale(.98)}
.chat-prompt-card.sos{background:#E8F2EA;border-color:#C8E0CC}
.chat-prompt-card.sos .chat-prompt-cat{color:#3D7050}
[data-theme="dark"] .chat-prompt-card.sos{background:#1A2E20;border-color:#253D2A}
.chat-prompt-cat{font-size:0.625rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--c-t4)}
/* Input pill */
.chat-pill-wrap{padding:10px 12px;padding-bottom:max(68px,calc(56px + env(safe-area-inset-bottom)));background:var(--c-bg);flex-shrink:0}
.chat-pill{display:flex;align-items:flex-end;gap:8px;border-radius:22px;border:1.5px solid var(--c-bd2);background:var(--c-card);padding:8px 8px 8px 16px;transition:border-color .15s}
.chat-pill:focus-within{border-color:#3D5570}
.chat-pill-in{flex:1;background:none;border:none;outline:none;font-size:0.9375rem;color:var(--c-ink);padding:5px 0;line-height:1.45;font-family:inherit;resize:none;overflow-y:auto;max-height:120px;display:block}
.chat-pill-in::placeholder{color:var(--c-t4)}
.chat-pill-in:disabled{opacity:.5}
.chat-pill-send{width:34px;height:34px;border-radius:50%;background:var(--c-ink);color:var(--c-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .1s}
.chat-pill-send:active{transform:scale(.9)}
.chat-pill-send:disabled{opacity:.28}
/* ── Accordéon suggestions Zoé ── */
.chat-acc{display:flex;flex-direction:column;gap:8px;width:100%}
.api-log-card{background:var(--c-card);border:1px solid var(--c-bd2);border-radius:14px;padding:13px 14px;margin-bottom:10px}
.api-log-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.api-log-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:0.5625rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.api-log-badge.ok{background:rgba(58,94,56,.13);color:#3A5E38}
.api-log-badge.err{background:rgba(160,56,40,.13);color:#A03828}
.api-log-badge.ant{background:rgba(61,85,112,.13);color:#3D5570}
.api-log-badge.gem{background:rgba(196,138,64,.13);color:#A06C2A}
.api-log-resp{font-size:0.6875rem;color:var(--c-t3);line-height:1.55;padding:8px 10px;background:var(--c-bg2);border-radius:8px;margin-top:6px;white-space:pre-wrap;word-break:break-word;max-height:100px;overflow:hidden;font-family:ui-monospace,monospace}
.api-log-resp.expanded{max-height:none}
.api-log-actions{display:flex;gap:7px;margin-top:8px}
.api-log-act{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;background:var(--c-bg2);border:1px solid var(--c-bd);font-size:0.75rem;font-weight:500;color:var(--c-t2);transition:background .12s}
.api-log-act:active{background:var(--c-bg3)}
.ms-btn{flex:1;padding:10px 6px;border-radius:10px;background:#fff;border:1px solid #DDE4ED;font-size:0.8125rem;font-weight:600;color:#5C5752;cursor:pointer;transition:background .12s,border-color .12s,color .12s}
.ms-btn:active{transform:scale(.97)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--c-bd)}
.toggle-row:last-child{border-bottom:none}
.toggle-knob{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-knob input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;cursor:pointer;inset:0;background:var(--c-bg3);border-radius:12px;transition:.18s;border:1px solid var(--c-bd2)}
.toggle-track:before{position:absolute;content:'';height:18px;width:18px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-knob input:checked+.toggle-track{background:#3D5570;border-color:#3D5570}
.toggle-knob input:checked+.toggle-track:before{transform:translateX(18px)}

.fav-chip{flex-shrink:0;padding:7px 13px;border-radius:99px;font-size:0.75rem;font-weight:600;background:var(--c-bg3);color:var(--c-t2);border:1.5px solid transparent;white-space:nowrap;transition:background .15s,color .15s}

.fav-flat-head{display:flex;align-items:flex-start;gap:0;width:100%;padding:0;text-align:left;cursor:pointer}

.ref-link{display:flex;align-items:flex-start;gap:7px;font-size:0.75rem;color:inherit;text-decoration:none;padding:7px 10px;border-radius:9px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);margin-bottom:6px;line-height:1.5;transition:background .12s}

const milestones=[
  {minDays:0,maxDays:30,category:'Réflexes & Sens',fact:'Votre bébé reconnaît déjà votre voix !',details:'Après 9 mois à vous entendre, votre bébé peut différencier votre voix de celles des autres. Son ouïe est parfaitement développée. Il préfère les visages humains aux autres formes et peut suivre un objet lentement du regard.',tip:'Parlez-lui doucement en le regardant dans les yeux. Il adorera votre visage !',emoji:'👁️',en:{category:'Reflexes & Senses',fact:'Your baby already recognizes your voice!',tip:'Talk to them softly while looking into their eyes. They\'ll love your face!',details:"After 9 months of hearing you, your baby can tell your voice apart from others'. Their hearing is fully developed. They prefer human faces over other shapes and can slowly follow an object with their gaze."}},
  {minDays:0,maxDays:30,category:'Réflexes primitifs',fact:'Son réflexe de préhension est incroyable !',details:"Si vous mettez votre doigt dans sa paume, il le saisit avec une force surprenante. Ce réflexe de Moro est un vestige de l'évolution. Son réflexe de succion est aussi très fort !",tip:"Laissez-le attraper votre doigt — c'est fascinant et crée du lien !",emoji:'🤜',en:{category:'Primitive reflexes',fact:'Their grasp reflex is incredible!',tip:'Let them grab your finger — it\'s fascinating and builds connection!',details:"If you put your finger in their palm, they grasp it with surprising strength. This Moro reflex is a vestige of evolution. Their sucking reflex is also very strong!"}},
  {minDays:30,maxDays:60,category:'Social & Émotions',fact:'Le premier sourire social arrive bientôt…',details:"Vers 6–8 semaines, les bébés offrent leur premier vrai sourire en réponse à un visage humain. Ce n'est plus un réflexe mais une vraie communication ! Son cerveau développe activement les circuits sociaux.",tip:'Souriez-lui souvent ! Les miroirs sont aussi très stimulants à cet âge.',emoji:'😊',en:{category:'Social & Emotions',fact:'The first social smile is coming…',tip:'Smile at them often! Mirrors are also very stimulating at this age.',details:"Around 6–8 weeks, babies offer their first real smile in response to a human face. It is no longer a reflex but genuine communication! Their brain is actively developing social circuits."}},
  {minDays:30,maxDays:60,category:'Motricité',fact:'Il commence à tenir sa tête quelques secondes !',details:'Le contrôle de la tête se développe progressivement. En position ventrale (tummy time), bébé soulève la tête quelques secondes. Les muscles du cou se renforcent chaque jour.',tip:'Faites du "tummy time" quotidien — 3 à 5 minutes plusieurs fois par jour !',emoji:'💪',en:{category:'Motor',fact:'Starting to hold head up for a few seconds!',tip:'Do daily tummy time — 3 to 5 minutes several times a day!',details:"Head control develops progressively. In tummy time, baby lifts their head for a few seconds. Neck muscles strengthen every day."}},
  {minDays:60,maxDays:90,category:'Communication',fact:'Il roucoule et fait des "ah" et "oh" !',details:"Le babillage précoce commence ! Bébé produit des sons voyelles appelés cooing. C'est son premier langage. Il répond à votre voix en vocalisant.",tip:"Répondez à chacun de ses sons comme si c'était une vraie conversation !",emoji:'🗣️',en:{category:'Communication',fact:'Cooing and making "ah" and "oh" sounds!',tip:'Respond to each of their sounds as if it were a real conversation!',details:"Early babbling begins! Baby produces vowel sounds called cooing. It is their first language. They respond to your voice by vocalising."}},
  {minDays:60,maxDays:90,category:'Vision',fact:'Il suit les objets colorés avec ses yeux !',details:"Sa vision s'améliore considérablement. Il peut maintenant suivre un objet sur 180°. Il préfère les couleurs vives et les contrastes forts.",tip:'Les mobiles colorés et les livres à fort contraste sont parfaits maintenant !',emoji:'🌈',en:{category:'Vision',fact:'Tracking colorful objects with their eyes!',tip:'Colorful mobiles and high-contrast books are perfect now!',details:"Their vision improves considerably. They can now follow an object through 180°. They prefer bright colours and strong contrasts."}},
  {minDays:90,maxDays:120,category:'Social',fact:'Il rit aux éclats !',details:"Les premiers vrais rires apparaissent vers 3–4 mois. Son cerveau limbique est en pleine construction. Il reconnaît ses parents et réagit différemment aux visages familiers.",tip:'Les chatouilles douces, les bisous sur le ventre font rire aux éclats !',emoji:'😂',en:{category:'Social',fact:'Laughing out loud!',tip:'Gentle tickles and tummy kisses get the giggles going!',details:"The first real laughs appear around 3–4 months. Their limbic brain is under construction. They recognise their parents and react differently to familiar faces."}},
  {minDays:90,maxDays:120,category:'Motricité',fact:'Il découvre ses mains et les porte à sa bouche !',details:"La coordination main-bouche se développe. Bébé regarde ses mains fasciné — il découvre qu'elles lui appartiennent !",tip:'Des jouets légers et colorés à agiter sont parfaits à saisir !',emoji:'🤲',en:{category:'Motor',fact:'Discovering their hands and bringing them to their mouth!',tip:'Light, colorful toys to shake are perfect to grasp!',details:"Hand-to-mouth coordination is developing. Baby stares at their hands fascinated — discovering that they belong to them!"}},
  {minDays:120,maxDays:180,category:'Motricité',fact:'Il commence à se retourner du dos sur le ventre !',details:"Un grand exploit moteur ! Il tient maintenant bien sa tête. Ses jambes se renforcent — il adore sauter quand on le tient debout.",tip:'Stimulez le retournement avec un jouet coloré placé sur le côté !',emoji:'🔄',en:{category:'Motor',fact:'Starting to roll from back to tummy!',tip:'Encourage rolling with a colorful toy placed to the side!',details:"A major motor achievement! They now hold their head well. Their legs are strengthening — they love to jump when you hold them upright."}},
  {minDays:120,maxDays:180,category:'Langage',fact:'Il babille "ba-ba", "ma-ma", "da-da" !',details:"Le babillage canonique apparaît : des syllabes répétées. C'est une révolution neurologique ! Il imite aussi vos expressions faciales.",tip:'Narrez tout ce que vous faites : "Je prépare le bain de bébé !"',emoji:'💬',en:{category:'Language',fact:'Babbling "ba-ba", "ma-ma", "da-da"!',tip:'Narrate everything you do: "I\'m getting the bath ready!"',details:"Canonical babbling appears: reduplicated syllables. It is a neurological revolution! They also imitate your facial expressions."}},
  {minDays:120,maxDays:180,category:'Alimentation',fact:'La diversification alimentaire approche !',details:"Vers 4–6 mois, le système digestif est prêt pour des aliments solides. Chaque nouvel aliment active de nouveaux circuits gustatifs !",tip:'Commencez par les légumes (carotte, courgette) en purée lisse !',emoji:'🥕',en:{category:'Feeding',fact:'Solid foods are approaching!',tip:'Start with vegetables (carrot, zucchini) as smooth purée!',details:"Around 4–6 months, the digestive system is ready for solid foods. Each new food activates new gustatory circuits!"}},
  {minDays:180,maxDays:270,category:'Motricité',fact:"Il s'assoie sans aide !",details:"La position assise indépendante marque une étape majeure. Sa capacité à ramasser de petits objets avec le pouce et l'index (pince) se développe.",tip:'Créez un espace sécurisé au sol avec des jouets à portée de main !',emoji:'🧸',en:{category:'Motor',fact:'Sitting up without help!',tip:'Create a safe floor space with toys within reach!',details:"The independent sitting position marks a major milestone. The ability to pick up small objects with the thumb and forefinger (pincer grip) is developing."}},
  {minDays:180,maxDays:270,category:'Cognitif',fact:'Il comprend que les objets existent même cachés !',details:"La permanence de l'objet se développe ! Si vous cachez un jouet sous un tissu, il le cherche. C'est une révolution cognitive décrite par Piaget.",tip:'Jouez à cache-cache avec un jouet sous une couverture !',emoji:'🔍',en:{category:'Cognitive',fact:'Understanding that objects exist even when hidden!',tip:'Play hide-and-seek with a toy under a blanket!',details:"Object permanence is developing! If you hide a toy under a cloth, they look for it. This is a cognitive revolution described by Piaget."}},
  {minDays:180,maxDays:270,category:'Social',fact:"L'anxiété de séparation fait son apparition.",details:"Bébé pleure quand vous partez et se calme à votre retour. C'est signe d'un attachement sain !",tip:'Dites toujours au revoir avant de partir — ne disparaissez jamais en cachette !',emoji:'🤗',en:{category:'Social',fact:'Separation anxiety is appearing.',tip:'Always say goodbye before leaving — never sneak away!',details:"Baby cries when you leave and calms down when you return. It is a sign of healthy attachment!"}},
  {minDays:270,maxDays:365,category:'Motricité',fact:"Il se met debout en s'appuyant sur les meubles !",details:"Le \"crusing\" (marcher en s'appuyant) commence. Les premiers pas solo arrivent parfois vers 9 mois, souvent vers 12–15 mois.",tip:"Sécurisez la maison : protège-coins, barrières d'escalier !",emoji:'🚶',en:{category:'Motor',fact:'Pulling up to stand using furniture!',tip:'Baby-proof the house: corner guards, stair gates!',details:"Cruising (walking while holding on) begins. Independent first steps sometimes come around 9 months, often around 12–15 months."}},
  {minDays:270,maxDays:365,category:'Langage',fact:'Il dit "papa" ou "mama" avec intention !',details:'Les premiers mots vrais apparaissent ! Il comprend des dizaines de mots. Il pointe du doigt les objets.',tip:'Lisez des livres avec de grandes images et nommez tout ce que vous voyez !',emoji:'📖',en:{category:'Language',fact:'Saying "dada" or "mama" with intention!',tip:'Read books with big pictures and name everything you see!',details:"True first words appear! They understand dozens of words. They point to objects with their finger."}},
  {minDays:270,maxDays:365,category:'Cognitif',fact:'Il imite vos gestes : taper des mains, faire au revoir !',details:"L'imitation devient sophistiquée. Les neurones miroirs permettent cette magie sociale. Il comprend les relations de cause à effet.",tip:'Faites des comptines avec des gestes : Petit Escargot, Promène-toi !',emoji:'👋',en:{category:'Cognitive',fact:'Imitating your gestures: clapping, waving goodbye!',tip:'Do nursery rhymes with gestures: Itsy Bitsy Spider, Twinkle Twinkle!',details:"Imitation becomes sophisticated. Mirror neurons enable this social magic. They understand cause-and-effect relationships."}},
  {minDays:365,maxDays:540,category:'Langage',fact:'Son vocabulaire explose ! 20 à 50 mots bientôt !',details:"L'explosion du vocabulaire est en cours. Il commence les mots-phrases : \"eau !\" signifie \"j'ai soif\".",tip:'Commentez vos actions avec des mots simples et clairs toute la journée !',emoji:'💭',en:{category:'Language',fact:'Vocabulary explosion — 20 to 50 words soon!',tip:'Comment on your actions with simple, clear words all day!',details:"The vocabulary explosion is underway. They begin word-phrases: 'water!' means 'I'm thirsty'."}},
  {minDays:365,maxDays:540,category:'Motricité',fact:'Il marche, court presque, monte les escaliers !',details:"La marche se stabilise. Sa motricité fine progresse : il mange seul à la cuillère, empile des cubes.",tip:"Laissez-le manger seul, même si c'est un peu le bazar !",emoji:'🏃',en:{category:'Motor',fact:'Walking, almost running, climbing stairs!',tip:'Let them eat alone, even if it gets a bit messy!',details:"Walking stabilises. Fine motor skills progress: they eat alone with a spoon, stack blocks."}},
  {minDays:365,maxDays:540,category:'Social',fact:'Il joue à faire semblant pour la première fois !',details:"Le jeu symbolique émerge : il fait semblant de dormir, de manger, de parler au téléphone.",tip:"Proposez des jeux d'imitation : dinette, poupée, téléphone jouet !",emoji:'🎭',en:{category:'Social',fact:'Playing pretend for the first time!',tip:'Offer imitation games: toy kitchen, dolls, toy phone!',details:"Symbolic play emerges: they pretend to sleep, to eat, to talk on the phone."}},
  {minDays:540,maxDays:730,category:'Autonomie',fact:'Il dit "non" et "moi tout seul" !',details:"L'affirmation de soi est une étape saine ! Les crises de colère sont normales : le cortex préfrontal ne sera mature qu'à 25 ans.",tip:'Nommez ses émotions : "Tu es frustré parce que…" — ça aide vraiment !',emoji:'😤',en:{category:'Autonomy',fact:'Saying "no" and "me do it"!',tip:'Name their emotions: "You\'re frustrated because…" — it really helps!',details:"Self-assertion is a healthy stage! Tantrums are normal: the prefrontal cortex will not be mature until age 25."}},
  {minDays:540,maxDays:730,category:'Langage',fact:'Il fait des phrases de 2–3 mots !',details:"Les premières phrases apparaissent : \"encore gâteau\", \"papa parti\". Vers 24 mois, son vocabulaire comprend 200 à 300 mots.",tip:"Si vous parlez plusieurs langues, continuez ! C'est le meilleur moment pour le bilinguisme.",emoji:'🗺️',en:{category:'Language',fact:'Making 2–3 word sentences!',tip:'If you speak multiple languages, keep going! This is the best time for bilingualism.',details:"First sentences appear: 'more cake', 'daddy gone'. Around 24 months, their vocabulary includes 200 to 300 words."}},
  {minDays:730,maxDays:1095,category:'Cognitif',fact:'Il pose des "pourquoi ?" à n\'arrêt !',details:"La période des \"pourquoi ?\" marque l'éveil de la pensée logique. Son cortex préfrontal construit des connexions causales.",tip:"Répondez honnêtement, même si c'est \"je ne sais pas, on va chercher ensemble !\"",emoji:'🤔',en:{category:'Cognitive',fact:'Asking "why?" non-stop!',tip:'Answer honestly, even if it\'s "I don\'t know, let\'s find out together!"',details:"The 'why?' period marks the awakening of logical thinking. Their prefrontal cortex is building causal connections."}},

langage:[
  {minMonths:0,maxMonths:4,emoji:'🗣️',title:'Les premiers gazouillis',title_en:'First Coos & Gurgles',summary:"Votre bébé expérimente sa voix — chaque son est une invitation à dialoguer.",summary_en:"Your baby is experimenting with their voice — every sound is an invitation to talk.",detail:"Entre 2 et 4 mois, les bébés commencent à émettre des sons doux appelés gazouillis. Ces vocalisations activent les circuits neuronaux dédiés au langage, notamment les aires de Broca et Wernicke. Chaque fois que vous répondez à un gazouilli, vous créez ce que les chercheurs appellent une \"danse conversationnelle\" : un échange tour-à-tour qui pose les bases des compétences futures en communication.",detail_en:"Between 2 and 4 months, babies begin to produce soft sounds called coos. These vocalisations activate the neural circuits dedicated to language, particularly Broca's and Wernicke's areas. Every time you respond to a coo, you create what researchers call a 'conversational dance': a turn-taking exchange that lays the groundwork for future communication skills.",references:['Stern, D. N. (1985). The Interpersonal World of the Infant. Basic Books.','Kuhl, P. K. (2004). Early language acquisition. Nature Reviews Neuroscience.']},
  {minMonths:1,maxMonths:7,emoji:'👂',title:'Votre bébé reconnaît votre voix',title_en:'Your Baby Recognizes Your Voice',summary:"Dès la naissance, votre bébé préfère votre voix à toute autre — c'est ancré dans son cerveau.",summary_en:"From birth, your baby prefers your voice over all others — it's wired into their brain.",detail:"Des études ont montré que les nouveau-nés reconnaissent la voix maternelle entendue in utero. Le cerveau du nourrisson traite les sons de la langue maternelle de façon privilégiée dès les premières heures de vie. Parlez-lui souvent, chantez, racontez votre quotidien à voix haute.",detail_en:"Studies have shown that newborns recognise the maternal voice heard in utero. The infant brain processes sounds of the mother tongue in a privileged way from the very first hours of life. Talk to them often, sing, narrate your daily life out loud.",references:["DeCasper, A. J. & Fifer, W. P. (1980). Of human bonding. Science.",'Mehler, J. et al. (1988). A precursor of language acquisition. Cognition.']},
  {minMonths:4,maxMonths:10,emoji:'🐣',title:'Le babillage : ba-ba, ma-ma',title_en:'Babbling: ba-ba, ma-ma',summary:"Les syllabes répétées sont la répétition motrice du langage — votre bébé s'entraîne.",summary_en:"Repeated syllables are language motor rehearsal — your baby is practicing.",detail:"Vers 6–9 mois, les bébés entrent dans la phase de babillage canonique : des syllabes redupliquées. Le cerveau synchronise les aires motrices de la bouche avec les aires auditives. Les bébés qui babillent davantage développent un vocabulaire plus riche à 2 ans.",detail_en:"Around 6–9 months, babies enter the canonical babbling phase: reduplicated syllables. The brain synchronises the motor areas of the mouth with the auditory areas. Babies who babble more develop a richer vocabulary by age 2.",references:['Oller, D. K. (2000). The Emergence of the Speech Capacity. Lawrence Erlbaum.','Gros-Louis, J. et al. (2006). Maternal responses to infant vocalizations. Infancy.']},
  {minMonths:6,maxMonths:14,emoji:'🧠',title:'Comprendre avant de parler',title_en:'Understanding Before Speaking',summary:"Votre bébé comprend beaucoup plus qu'il ne dit — le langage réceptif précède l'expressif.",summary_en:"Your baby understands far more than they say — receptive language comes before expressive.",detail:"À 9 mois, un bébé comprend en moyenne 20 à 50 mots, alors qu'il n'en dit encore aucun. Le langage réceptif se développe 3 à 6 mois avant le langage expressif. Nommez tout ce que vous faites, voyez et touchez.",detail_en:"At 9 months, a baby understands on average 20 to 50 words, while not yet saying any. Receptive language develops 3 to 6 months before expressive language. Name everything you do, see, and touch.",references:['Benedict, H. (1979). Early lexical development. Journal of Child Language.','Bates, E. et al. (1994). Developmental variation in early vocabulary. Journal of Child Language.']},
  {minMonths:8,maxMonths:16,emoji:'👉',title:'Le pointage, premier langage universel',title_en:'Pointing: The First Universal Language',summary:"Pointer du doigt est un acte cognitif majeur — le début de la communication intentionnelle.",summary_en:"Pointing is a major cognitive act — the beginning of intentional communication.",detail:"Le pointage proto-déclaratif émerge vers 9–12 mois. Il implique de comprendre que les autres ont une perspective mentale différente — un précurseur de la théorie de l'esprit.",detail_en:"Proto-declarative pointing emerges around 9–12 months. It involves understanding that others have a different mental perspective — a precursor to theory of mind.",references:['Tomasello, M. (1995). Joint attention as social cognition.','Baron-Cohen, S. (1989). Perceptual role taking and protodeclarative pointing in autism. BJDP.']},
  {minMonths:10,maxMonths:20,emoji:'✨',title:'Les premiers vrais mots',title_en:'The First Real Words',summary:"Entre 10 et 14 mois en moyenne, les premiers mots apparaissent — un moment magique.",summary_en:"Between 10 and 14 months on average, first words appear — a magical moment.",detail:"Un \"vrai mot\" est une forme sonore stable utilisée de façon intentionnelle. Les premiers mots sont souvent des noms de proches, des onomatopées ou des mots fonctionnels (\"encore\", \"non\").",detail_en:"A 'real word' is a stable sound form used intentionally. First words are often names of close people, onomatopoeia, or functional words ('more', 'no').",references:['Nelson, K. (1973). Structure and strategy in learning to talk. Monographs SRCD.','Bloom, P. (2000). How Children Learn the Meanings of Words. MIT Press.']},
  {minMonths:14,maxMonths:26,emoji:'💥',title:"L'explosion lexicale",title_en:'The Vocabulary Explosion',summary:"Entre 18 et 24 mois, le vocabulaire passe de 50 à 200 mots — une accélération spectaculaire.",summary_en:"Between 18 and 24 months, vocabulary goes from 50 to 200 words — a spectacular acceleration.",detail:"Vers 18–20 mots dans son vocabulaire, votre enfant comprend que chaque objet a un nom. Cette prise de conscience déclenche l'explosion lexicale — il peut apprendre 5 à 10 mots nouveaux par jour.",detail_en:"Around 18–20 words in their vocabulary, your child understands that every object has a name. This realisation triggers the vocabulary explosion — they can learn 5 to 10 new words per day.",references:["Bates, E. et al. (1994). Developmental variation in early vocabulary. Journal of Child Language.",'Goldfield, B. A. & Reznick, J. S. (1990). Early lexical acquisition. Journal of Child Language.']},
  {minMonths:18,maxMonths:32,emoji:'🔗',title:'Combiner deux mots',title_en:'Combining Two Words',summary:"Les premières combinaisons de mots marquent l'entrée dans la syntaxe — la grammaire commence.",summary_en:"First word combinations mark the entry into syntax — grammar begins.",detail:"Vers 18–24 mois, votre enfant combine deux mots : \"encore lait\", \"papa parti\". Roger Brown (1973) a montré que cette étape est universelle dans toutes les langues.",detail_en:"Around 18–24 months, your child combines two words: 'more milk', 'daddy gone'. Roger Brown (1973) showed that this stage is universal across all languages.",references:['Brown, R. (1973). A First Language. Harvard University Press.','Braine, M. D. S. (1963). The ontogeny of English phrase structure. Language.']},
  {minMonths:24,maxMonths:48,emoji:'💬',title:'Les phrases et les "pourquoi"',title_en:'Sentences and "Why?"',summary:"L'explosion syntaxique est en cours — votre enfant construit des phrases et pose des questions.",summary_en:"The syntax explosion is underway — your child builds sentences and asks questions.",detail:"Entre 24 et 36 mois, les phrases s'allongent, les pronoms apparaissent et les premières questions émergent. La période des \"pourquoi\" vers 3 ans est un signe de santé cognitive remarquable.",detail_en:"Between 24 and 36 months, sentences lengthen, pronouns appear, and first questions emerge. The 'why' period around age 3 is a sign of remarkable cognitive health.",references:["Tyack, D. & Ingram, D. (1977). Children's production and comprehension of questions.",'Harris, M. (1992). Language Experience and Early Language Development. Psychology Press.']},
  {minMonths:30,maxMonths:54,emoji:'📖',title:'Raconter des histoires',title_en:'Telling Stories',summary:"Votre enfant commence à raconter des événements passés — la mémoire narrative se développe.",summary_en:"Your child begins to recount past events — narrative memory is developing.",detail:"Vers 3 ans, les enfants construisent des récits. Cette capacité narrative requiert mémoire épisodique et théorie de l'esprit.",detail_en:"Around age 3, children build narratives. This narrative ability requires episodic memory and theory of mind.",references:['Nelson, K. (1996). Language in Cognitive Development. Cambridge University Press.','Fivush, R. & Haden, C. A. (2003). Autobiographical Memory and the Construction of a Narrative Self.']},
  {minMonths:36,maxMonths:66,emoji:'🎵',title:'La conscience phonologique',title_en:'Phonological Awareness',summary:"Jouer avec les sons des mots prépare directement votre enfant à apprendre à lire.",summary_en:"Playing with word sounds directly prepares your child to learn to read.",detail:"La conscience phonologique est le meilleur prédicteur de la réussite en lecture. Elle se développe entre 3 et 6 ans par le jeu avec les sons : comptines, rimes, jeux de mots.",detail_en:"Phonological awareness is the best predictor of reading success. It develops between ages 3 and 6 through play with sounds: nursery rhymes, rhymes, word games.",references:['Goswami, U. & Bryant, P. (1990). Phonological Skills and Learning to Read. Psychology Press.','Adams, M. J. (1990). Beginning to Read. MIT Press.']},
  {minMonths:48,maxMonths:72,emoji:'📚',title:'Prêt pour la lecture',title_en:'Ready to Read',summary:"La conscience des lettres et des sons prépare votre enfant à décoder les mots écrits.",summary_en:"Letter and sound awareness prepares your child to decode written words.",detail:"Vers 4–5 ans, beaucoup d'enfants commencent à reconnaître des lettres. Lire à voix haute chaque jour, dès la naissance, est l'une des pratiques parentales ayant le plus d'impact sur la réussite scolaire.",detail_en:"Around ages 4–5, many children begin to recognise letters. Reading aloud every day, from birth, is one of the parenting practices with the greatest impact on academic success.",references:['Bus, A. G. et al. (1995). Joint book reading makes for success. Review of Educational Research.','Snow, C. E. et al. (1998). Preventing Reading Difficulties. National Academy Press.']},
  {minMonths:0,maxMonths:72,emoji:'🎶',title:'La musique booste le langage',title_en:'Music Boosts Language',summary:"Chanter avec votre enfant est l'une des meilleures façons de stimuler le développement langagier.",summary_en:"Singing with your child is one of the best ways to stimulate language development.",detail:"Les neurosciences confirment un lien étroit entre traitement musical et traitement du langage. Les bébés exposés à beaucoup de musique développent une meilleure discrimination phonétique.",detail_en:"Neuroscience confirms a close link between musical processing and language processing. Babies exposed to a lot of music develop better phonetic discrimination.",references:['Anvari, S. H. et al. (2002). Relations among musical skills and early reading ability. JECP.','Trainor, L. J. & Trehub, S. E. (1992). Sensitivity to Western musical structure. JEP.']},

  {minMonths:1,maxMonths:5,emoji:'🦒',title:'Le contrôle de la tête',title_en:'Head Control',summary:"Tenir sa tête droite est la première grande victoire motrice de votre bébé.",summary_en:"Holding the head upright is your baby's first major motor victory.",detail:"Le contrôle céphalique suit un développement crânio-caudal. À 3 mois, la plupart des bébés tiennent leur tête lors d'une traction en position assise ; à 4 mois, à 90° sur le ventre.",detail_en:"Head control follows a cranio-caudal pattern of development. By 3 months, most babies hold their head during a pull-to-sit; by 4 months, at 90° on their tummy.",references:['Prechtl, H. F. R. (2001). General movement assessment. Mental Retardation and Developmental Disabilities.','Rochat, P. (1992). Self-sitting and reaching in 5–8-month-old infants. Journal of Motor Behavior.']},
  {minMonths:3,maxMonths:8,emoji:'✋',title:'Attraper et saisir',title_en:'Grasping and Gripping',summary:"De la préhension palmaire à la pince fine — l'histoire de la main de votre bébé.",summary_en:"From palmar grasp to pincer grip — the story of your baby's hand.",detail:"La préhension évolue : réflexe de Moro → préhension palmaire (2–4 mois) → saisie volontaire (4–5 mois) → pince pouce-index (8–10 mois). Offrez des objets de textures et tailles variées.",detail_en:"Grasping evolves: Moro reflex → palmar grasp (2–4 months) → voluntary reaching (4–5 months) → pincer grip thumb-index (8–10 months). Offer objects of varied textures and sizes.",references:['Forssberg, H. et al. (1991). Development of human precision grip. Experimental Brain Research.','Von Hofsten, C. (1991). Structuring of early reaching movements. Journal of Motor Behavior.']},
  {minMonths:4,maxMonths:10,emoji:'🔄',title:"Se retourner et trouver l'équilibre",title_en:'Rolling Over and Finding Balance',summary:"Se retourner est un exploit de coordination qui ouvre un nouveau monde à votre bébé.",summary_en:"Rolling over is a coordination feat that opens a new world to your baby.",detail:"Le retournement dos-ventre apparaît vers 4–5 mois. Le passage en position assise (6–8 mois) libère les mains de votre bébé pour manipuler l'environnement.",detail_en:"Back-to-tummy rolling appears around 4–5 months. Moving to a sitting position (6–8 months) frees your baby's hands to manipulate their environment.",references:['Adolph, K. E. & Franchak, J. M. (2017). The development of motor behavior. WIREs Cognitive Science.','Bertenthal, B. I. & Von Hofsten, C. (1998). Eye, head and trunk control. Neuroscience Reviews.']},
  {minMonths:7,maxMonths:14,emoji:'🚶',title:'Vers les premiers pas',title_en:'Toward First Steps',summary:"Des quatre pattes aux premiers pas — une progression en plusieurs étapes fascinantes.",summary_en:"From crawling to first steps — a progression through fascinating stages.",detail:"La locomotion autonome suit une séquence : ramper → quatre pattes → se mettre debout → marcher en se tenant → premiers pas (9–15 mois). Laissez votre bébé marcher pieds nus dès que possible.",detail_en:"Autonomous locomotion follows a sequence: crawling → all fours → standing → cruising → first steps (9–15 months). Let your baby walk barefoot as much as possible.",references:['Adolph, K. E. et al. (2012). How do you learn to walk? Psychological Science.','Thelen, E. (1995). Motor development: A new synthesis. American Psychologist.']},
  {minMonths:9,maxMonths:18,emoji:'👣',title:'Les premiers pas',title_en:'First Steps',summary:"Marcher seul est l'une des étapes les plus célébrées — et les plus complexes neurologiquement.",summary_en:"Walking alone is one of the most celebrated milestones — and one of the most neurologically complex.",detail:"Les premiers pas indépendants apparaissent en moyenne à 12 mois (fourchette normale : 9–16 mois). Adolph et ses collègues ont calculé qu'un enfant tombe 17 fois par heure en moyenne en apprenant à marcher.",detail_en:"Independent first steps appear on average at 12 months (normal range: 9–16 months). Adolph and colleagues calculated that a child falls an average of 17 times per hour while learning to walk.",references:['Adolph, K. E. et al. (2012). How do you learn to walk? Psychological Science.','AAP (2020). Motor development milestones.']},
  {minMonths:12,maxMonths:24,emoji:'🏃',title:'Marcher, puis courir',title_en:'Walking, Then Running',summary:"La démarche s'affine rapidement — votre enfant gagne en fluidité et en vitesse.",summary_en:"Gait improves quickly — your child gains fluidity and speed.",detail:"Après les premiers pas, la marche s'améliore. Vers 18 mois vient la course. Les terrains variés (herbe, sable, escaliers) accélèrent le développement de l'équilibre.",detail_en:"After first steps, walking improves. Around 18 months comes running. Varied terrain (grass, sand, stairs) accelerates the development of balance.",references:['Sutherland, D. H. et al. (1980). The development of mature gait. Journal of Bone and Joint Surgery.','OMS (2019). Guidelines on physical activity for children under 5.']},
  {minMonths:14,maxMonths:28,emoji:'🪜',title:'Monter et descendre les escaliers',title_en:'Climbing Up and Down Stairs',summary:"Conquérir les escaliers demande planification motrice et coordination bilatérale.",summary_en:"Conquering stairs requires motor planning and bilateral coordination.",detail:"Monter les escaliers en se tenant à la rampe apparaît vers 15–18 mois ; descendre vient ensuite. La montée pied-pied alternée se développe vers 2–3 ans.",detail_en:"Climbing stairs while holding the rail appears around 15–18 months; descending comes next. Alternating foot climbing develops around ages 2–3.",references:["Frankenburg, W. K. et al. (1992). The Denver II. Pediatrics.",'Adolph, K. E. & Kretch, K. S. (2015). Affordances and action possibilities.']},
  {minMonths:16,maxMonths:30,emoji:'⚽',title:'Lancer une balle',title_en:'Throwing a Ball',summary:"Lancer coordonne la vision, le timing et la motricité globale — un beau défi pour le cerveau.",summary_en:"Throwing coordinates vision, timing and gross motor skills — a great brain challenge.",detail:"Lancer une balle requiert de coordonner l'œil, le bras, le tronc et les jambes. Les premiers lancers (vers 15–18 mois) sont approximatifs ; la précision augmente progressivement.",detail_en:"Throwing a ball requires coordinating eye, arm, trunk, and legs. First throws (around 15–18 months) are approximate; accuracy increases progressively.",references:['Haywood, K. M. & Getchell, N. (2014). Life Span Motor Development. Human Kinetics.','Payne, V. G. & Isaacs, L. D. (2017). Human Motor Development. Routledge.']},
  {minMonths:20,maxMonths:42,emoji:'✏️',title:'Tenir un crayon, empiler des cubes',title_en:'Holding a Crayon, Stacking Blocks',summary:"La motricité fine s'affine — les mains de votre enfant deviennent de véritables outils.",summary_en:"Fine motor skills sharpen — your child's hands become real tools.",detail:"La prise du crayon évolue vers la prise tripode (pouce-index-majeur) vers 3–4 ans. Empiler des cubes : 2 à 15 mois, 6 à 24 mois, 10 à 36 mois.",detail_en:"The pencil grip evolves towards the tripod grip (thumb-index-middle finger) around ages 3–4. Block stacking: 2 at 15 months, 6 at 24 months, 10 at 36 months.",references:["Exner, C. E. (2010). Development of hand skills. Occupational Therapy for Children.",'Largo, R. H. (2007). Babyjahre. Piper Verlag.']},
  {minMonths:24,maxMonths:48,emoji:'🤸',title:'Sauter, grimper, danser',title_en:'Jumping, Climbing, Dancing',summary:"L'énergie motrice déborde — votre enfant explore les limites de son corps avec joie.",summary_en:"Motor energy overflows — your child joyfully explores the limits of their body.",detail:"Entre 2 et 4 ans, les capacités motrices explosent : sauter à pieds joints (24 mois), sauter depuis une hauteur (30 mois), grimper (36 mois). L'activité physique intense produit du BDNF.",detail_en:"Between ages 2 and 4, motor abilities explode: jumping with both feet (24 months), jumping from a height (30 months), climbing (36 months). Intense physical activity produces BDNF.",references:['Ratey, J. J. (2008). Spark: Exercise and the Brain. Little, Brown.','OMS (2019). Guidelines on physical activity for children under 5.']},
  {minMonths:36,maxMonths:72,emoji:'🏀',title:'Attraper une balle en mouvement',title_en:'Catching a Moving Ball',summary:"Intercepter une balle en vol est un exploit de traitement visuo-spatial et d'anticipation.",summary_en:"Intercepting a ball in flight is a feat of visuo-spatial processing and anticipation.",detail:"Attraper une balle nécessite de prédire sa trajectoire et synchroniser la fermeture des doigts. Ces capacités se développent entre 3 et 6 ans.",detail_en:"Catching a ball requires predicting its trajectory and synchronising finger closure. These abilities develop between ages 3 and 6.",references:['Williams, H. G. (1983). Perceptual and Motor Development. Prentice-Hall.','Savelsbergh, G. J. P. et al. (1992). Effect of body orientation on reaching. JECP.']},
  {minMonths:48,maxMonths:72,emoji:'🎯',title:"L'équilibre sur un pied et la précision",title_en:'One-Foot Balance and Precision',summary:"Tenir en équilibre, viser, frapper — la précision motrice atteint un nouveau niveau.",summary_en:"Balancing, aiming, striking — motor precision reaches a new level.",detail:"Vers 4–5 ans, les enfants peuvent tenir sur un pied 5 à 10 secondes. Ces acquisitions reflètent la maturation du cervelet qui atteint 80% de sa taille adulte vers 5 ans.",detail_en:"Around ages 4–5, children can stand on one foot for 5 to 10 seconds. These acquisitions reflect the maturation of the cerebellum, which reaches 80% of its adult size by age 5.",references:['Courchesne, E. et al. (2000). Normal brain development and aging. Journal of Neuroscience.','Gallahue, D. L. & Ozmun, J. C. (2006). Understanding Motor Development. McGraw-Hill.']},

caractere:[
  {minMonths:0,maxMonths:4,emoji:'💞',title:"L'attachement se construit dès le premier jour",title_en:'Attachment Builds from Day One',summary:"Le lien d'attachement est la fondation de toute la santé émotionnelle et sociale future.",summary_en:"The attachment bond is the foundation of all future emotional and social health.",detail:"La théorie de l'attachement de John Bowlby décrit comment le bébé humain naît avec un système comportemental qui l'amène à chercher la proximité d'un adulte protecteur. Un attachement sécure est associé à une meilleure régulation émotionnelle tout au long de la vie.",detail_en:"John Bowlby's attachment theory describes how the human baby is born with a behavioural system that leads them to seek proximity to a protective adult. Secure attachment is associated with better emotional regulation throughout life.",references:['Bowlby, J. (1969). Attachment and Loss, Vol. 1. Basic Books.','Ainsworth, M. D. S. et al. (1978). Patterns of Attachment. Lawrence Erlbaum.']},
  {minMonths:1,maxMonths:5,emoji:'😊',title:'Le sourire social, un tournant',title_en:'The Social Smile: A Turning Point',summary:"Vers 6 semaines, le sourire passe de réflexe à social — votre bébé vous reconnaît.",summary_en:"Around 6 weeks, smiling shifts from reflex to social — your baby recognizes you.",detail:"Le premier sourire social est un moment transformateur. Les recherches de Tronick (1978) avec le paradigme du \"still face\" ont montré que les bébés sont extraordinairement sensibles aux expressions faciales.",detail_en:"The first social smile is a transformative moment. Tronick's (1978) research using the 'still face' paradigm showed that babies are extraordinarily sensitive to facial expressions.",references:["Tronick, E. et al. (1978). The infant's response to entrapment. Journal of the AACP.",'Johnson, M. H. et al. (1991). Preferential tracking of face-like stimuli. Cognition.']},
  {minMonths:4,maxMonths:10,emoji:'😰',title:"L'angoisse de l'étranger",title_en:'Stranger Anxiety',summary:"La méfiance face aux inconnus, vers 6–8 mois, est un signe de développement cognitif normal.",summary_en:"Wariness of strangers around 6–8 months is a sign of normal cognitive development.",detail:"Vers 6–8 mois, de nombreux bébés manifestent de l'anxiété face aux visages non-familiers. Décrite par René Spitz sous le nom d'\"angoisse du 8ème mois\", cette réaction indique que le bébé distingue le familier de l'étranger.",detail_en:"Around 6–8 months, many babies show anxiety towards unfamiliar faces. Described by René Spitz as 'eighth-month anxiety', this reaction indicates that the baby distinguishes the familiar from the stranger.",references:["Spitz, R. A. (1965). The First Year of Life. International Universities Press.",'Sroufe, L. A. (1977). Wariness of strangers and infant development. Child Development.']},
  {minMonths:7,maxMonths:16,emoji:'🤗',title:"L'angoisse de séparation",title_en:'Separation Anxiety',summary:"Les pleurs au moment des séparations révèlent un attachement fort et sain.",summary_en:"Tears at separation reveal a strong and healthy attachment.",detail:"L'angoisse de séparation culmine entre 9 et 18 mois. C'est le signe d'un attachement sain. Partez sereinement et revenez de façon prévisible : la cohérence est la clé.",detail_en:"Separation anxiety peaks between 9 and 18 months. It is a sign of healthy attachment. Leave serenely and return predictably: consistency is the key.",references:['Winnicott, D. W. (1953). Transitional objects and transitional phenomena. IJP.','Bowlby, J. (1973). Attachment and Loss, Vol. 2: Separation. Basic Books.']},
  {minMonths:10,maxMonths:20,emoji:'🪞',title:'Se reconnaître dans le miroir',title_en:'Mirror Self-Recognition',summary:"Se reconnaître dans un miroir — vers 18 mois — est le signe d'une conscience de soi émergente.",summary_en:"Recognizing themselves in a mirror — around 18 months — signals emerging self-awareness.",detail:"Le test du rouge de Lewis et Brooks-Gunn (1979) : on met une tache rouge sur le front du bébé, puis on le place face à un miroir. Avant 18 mois, la plupart touchent le miroir ; après, leur propre front.",detail_en:"The Lewis and Brooks-Gunn (1979) rouge test: a red mark is placed on the baby's forehead, then they are placed in front of a mirror. Before 18 months, most touch the mirror; after, their own forehead.",references:['Lewis, M. & Brooks-Gunn, J. (1979). Social Cognition and the Acquisition of Self. Plenum Press.','Nielsen, M. et al. (2006). Self-recognition beyond the mirror. Trends in Cognitive Sciences.']},
  {minMonths:12,maxMonths:24,emoji:'😤',title:'Les premières crises : normal et sain',title_en:'First Tantrums: Normal and Healthy',summary:"Les crises de colère ne signifient pas que votre enfant est mal élevé — elles signifient qu'il grandit.",summary_en:"Tantrums don't mean your child is badly raised — they mean they are growing.",detail:"Les crises de colère atteignent leur pic entre 18 mois et 3 ans. Le cortex préfrontal ne sera pas mature avant 25 ans. Réponse idéale : rester calme, valider l'émotion, rester disponible.",detail_en:"Tantrums peak between 18 months and 3 years. The prefrontal cortex will not be mature until age 25. Ideal response: stay calm, validate the emotion, remain available.",references:['Potegal, M. & Davidson, R. J. (2003). Temper tantrums in young children. Journal of Developmental Pediatrics.','Siegel, D. J. & Payne Bryson, T. (2011). The Whole-Brain Child. Delacorte Press.']},
  {minMonths:16,maxMonths:30,emoji:'🙅',title:'"C\'est à moi !" : la propriété et l\'identité',title_en:'"Mine!": Ownership and Identity',summary:"La possessivité de votre enfant est le reflet d'une conscience de soi en pleine construction.",summary_en:"Your child's possessiveness reflects a self-awareness that is actively being built.",detail:"Vers 18–24 mois, \"le mien !\" devient un mot-clé. La compréhension de la propriété précède la capacité à partager : vous ne pouvez partager que ce que vous savez vous appartenir.",detail_en:"Around 18–24 months, 'mine!' becomes a keyword. Understanding ownership precedes the ability to share: you can only share what you know belongs to you.",references:['Fasig, L. G. (2000). Toddlers understanding of ownership. Social Development.','Hay, D. F. (2006). Yours and mine: Toddlers talk about possessions. BJDP.']},
  {minMonths:20,maxMonths:40,emoji:'🫂',title:"L'empathie en germe",title_en:'Empathy Takes Root',summary:"Votre enfant commence à ressentir et réagir à la détresse des autres — c'est touchant et important.",summary_en:"Your child begins to feel and react to others' distress — touching and important.",detail:"Vers 18–24 mois, on observe les premières manifestations d'empathie : apporter son doudou à un adulte qui pleure. Pour favoriser l'empathie : nommez vos émotions.",detail_en:"Around 18–24 months, we see the first manifestations of empathy: bringing a comfort blanket to a crying adult. To foster empathy: name your own emotions.",references:['Zahn-Waxler, C. et al. (1992). Development of concern for others. Developmental Psychology.','Rizzolatti, G. & Craighero, L. (2004). The mirror-neuron system. Annual Review of Neuroscience.']},
  {minMonths:22,maxMonths:42,emoji:'🎭',title:"L'imitation comme moteur d'apprentissage",title_en:'Imitation as the Engine of Learning',summary:"Votre enfant apprend en vous observant — vous êtes son modèle le plus puissant.",summary_en:"Your child learns by watching you — you are their most powerful model.",detail:"Albert Bandura (1977) a montré que les enfants apprennent énormément par observation et imitation. Vous ne pouvez pas demander à votre enfant ce que vous ne faites pas vous-même.",detail_en:"Albert Bandura (1977) showed that children learn enormously through observation and imitation. You cannot ask your child to do what you do not do yourself.",references:['Bandura, A. (1977). Social Learning Theory. Prentice-Hall.','Meltzoff, A. N. (1988). Infant imitation after a 1-week delay. Developmental Psychology.']},
  {minMonths:24,maxMonths:48,emoji:'👻',title:"Les peurs et l'imaginaire",title_en:'Fears and Imagination',summary:"Les peurs (du noir, des monstres) reflètent une imagination en plein développement.",summary_en:"Fears (of the dark, of monsters) reflect an imagination in full development.",detail:"Vers 2–4 ans, les peurs de l'obscurité sont très communes. Elles correspondent au développement de l'imagination. Validez la peur, ne minimisez pas, rassurez avec présence.",detail_en:"Around ages 2–4, fears of darkness are very common. They correspond to the development of imagination. Validate the fear, do not minimise it, reassure with presence.",references:['Berk, L. E. (2009). Child Development (8th ed.). Pearson.','Muris, P. et al. (2000). Fears, worries, and scary dreams in 4–12-year-olds. JCCP.']},
  {minMonths:28,maxMonths:54,emoji:'🧸',title:'Le jeu symbolique et le faire semblant',title_en:'Symbolic Play and Pretending',summary:"Quand votre enfant \"fait semblant\", il développe des capacités cognitives de haut niveau.",summary_en:"When your child \"pretends\", they develop high-level cognitive abilities.",detail:"Le jeu symbolique s'épanouit entre 2 et 5 ans. Vygotski voyait dans le jeu la \"zone proximale de développement par excellence\" : l'enfant y agit comme s'il était plus grand.",detail_en:"Symbolic play flourishes between ages 2 and 5. Vygotsky saw in play the 'zone of proximal development par excellence': the child acts as if they were older.",references:['Vygotsky, L. S. (1978). Mind in Society. Harvard University Press.','Singer, D. G. & Singer, J. L. (2005). Imagination and Play in the Electronic Age. Harvard.']},
  {minMonths:36,maxMonths:60,emoji:'🤝',title:'Négocier, coopérer, jouer ensemble',title_en:'Negotiating, Cooperating, Playing Together',summary:"Le jeu avec les pairs devient coopératif — votre enfant apprend les règles sociales en jouant.",summary_en:"Play with peers becomes cooperative — your child learns social rules through play.",detail:"Mildred Parten (1932) a décrit l'évolution du jeu social : solitaire → parallèle → coopératif (3–4 ans). Les conflits entre enfants sont des apprentissages sociaux essentiels.",detail_en:"Mildred Parten (1932) described the evolution of social play: solitary → parallel → cooperative (ages 3–4). Conflicts between children are essential social learning experiences.",references:['Parten, M. B. (1932). Social participation among pre-school children. JASP.','Piaget, J. (1932). The Moral Judgment of the Child. Harcourt.']},
  {minMonths:48,maxMonths:72,emoji:'⚖️',title:'La conscience des règles et de la justice',title_en:'Awareness of Rules and Fairness',summary:"Votre enfant développe un sens de l'équité et des règles sociales — le début de la morale.",summary_en:"Your child develops a sense of fairness and social rules — the beginning of morality.",detail:"À 4–6 ans, les enfants développent un sens aigu de l'équité. Expliquez le \"pourquoi\" des règles — les enfants dont les parents expliquent développent une conscience morale plus robuste.",detail_en:"At ages 4–6, children develop a keen sense of fairness. Explain the 'why' of rules — children whose parents explain develop a more robust moral conscience.",references:['Kohlberg, L. (1958). The Development of Modes of Moral Thinking. U. of Chicago.','Turiel, E. (1983). The Development of Social Knowledge. Cambridge University Press.']},
],
activite:[
  {minMonths:0,maxMonths:4,emoji:'🖤',title:'Mobiles noir et blanc à faire soi-même',title_en:'DIY Black-and-White Mobiles',summary:"Les contrastes forts captivent les yeux de votre nouveau-né et stimulent son cortex visuel.",summary_en:"Strong contrasts captivate your newborn's eyes and stimulate their visual cortex.",detail:"Le système visuel du nouveau-né distingue surtout les contrastes forts dans un rayon de 20–30 cm. Découpez des formes géométriques en noir et blanc et suspendez-les à portée de regard.",detail_en:"The newborn's visual system distinguishes mainly strong contrasts within a range of 20–30 cm. Cut out geometric shapes in black and white and hang them within their line of sight.",references:['Fantz, R. L. (1961). The origin of form perception. Scientific American.','Kellman, P. J. & Arterberry, M. E. (1998). The Cradle of Knowledge. MIT Press.']},
  {minMonths:1,maxMonths:6,emoji:'🪞',title:'Jeu de visages devant le miroir',title_en:'Mirror Face Game',summary:"Faire des grimaces ensemble devant le miroir — un jeu délicieux qui stimule la cognition sociale.",summary_en:"Making faces together in the mirror — a delightful game that stimulates social cognition.",detail:"Placez-vous tous les deux devant un miroir et faites des mimiques. Votre bébé observe, puis commence à imiter certaines expressions. Ce jeu active les circuits de reconnaissance des visages.",detail_en:"Position yourselves both in front of a mirror and make faces. Your baby observes, then begins to imitate certain expressions. This game activates the face recognition circuits.",references:['Meltzoff, A. N. & Moore, M. K. (1977). Imitation of facial gestures by neonates. Science.','Field, T. M. et al. (1982). Imitation of facial expressions by neonates. Science.']},
  {minMonths:3,maxMonths:9,emoji:'👀',title:'Coucou-caché (peek-a-boo)',title_en:'Peek-a-Boo',summary:"Ce jeu universel enseigne la permanence de l'objet et provoque un fou-rire garanti.",summary_en:"This universal game teaches object permanence and guarantees giggles.",detail:"En couvrant puis découvrant votre visage, vous démontrez la permanence de l'objet. L'anticipation provoque une montée de dopamine — d'où l'hilarité. Ce jeu développe aussi la mémoire de travail.",detail_en:"By covering then uncovering your face, you demonstrate object permanence. Anticipation causes a rise in dopamine — hence the hilarity. This game also develops working memory.",references:['Piaget, J. (1954). The Construction of Reality in the Child. Basic Books.','Baillargeon, R. (1987). Object permanence in 3.5–4.5-month-old infants. Developmental Psychology.']},
  {minMonths:5,maxMonths:12,emoji:'🛁',title:'Le bain sensoriel enrichi',title_en:'Enriched Sensory Bath',summary:"Transformer le bain en aire de jeux sensorielle — une mine d'or pour le développement.",summary_en:"Turning bath time into a sensory playground — a goldmine for development.",detail:"Ajoutez au bain quelques gobelets, un entonnoir, une petite passoire. Votre bébé explore spontanément : remplir, vider, éclabousser. Ces jeux stimulent la proprioception et la compréhension cause-effet.",detail_en:"Add a few cups, a funnel, a small strainer to the bath. Your baby spontaneously explores: fill, empty, splash. These games stimulate proprioception and understanding of cause and effect.",references:["Gopnik, A. et al. (1999). The Scientist in the Crib. William Morrow.",'Piaget, J. (1952). The Origins of Intelligence in Children. International Universities Press.']},
  {minMonths:8,maxMonths:16,emoji:'🪣',title:'Remplir et vider des contenants',title_en:'Filling and Emptying Containers',summary:"Un seau, quelques objets, et voilà des heures de concentration — les bases de la physique intuitive.",summary_en:"A bucket, a few objects, and hours of focus — the basics of intuitive physics.",detail:"Donnez à votre enfant différents contenants et des objets à mettre dedans. Il remplira, videra, recommencera. La répétition consolide les apprentissages.",detail_en:"Give your child different containers and objects to put inside. They will fill, empty, start again. Repetition consolidates learning.",references:['Gibson, E. J. (1988). Exploratory behavior in development. Annual Review of Psychology.','Libertus, K. & Needham, A. (2011). Teach to reach. Vision Research.']},
  {minMonths:10,maxMonths:20,emoji:'📚',title:'Lecture interactive avec livres cartonnés',title_en:'Interactive Reading with Board Books',summary:"Lire ensemble chaque jour est l'habitude parentale ayant le plus d'impact sur le développement.",summary_en:"Reading together every day is the parenting habit with the greatest developmental impact.",detail:"La lecture quotidienne partagée est le meilleur prédicteur du vocabulaire. Pointez les images, nommez les objets, imitez les sons. Cette lecture dialogique est deux fois plus efficace que la lecture passive.",detail_en:"Daily shared reading is the best predictor of vocabulary. Point to pictures, name objects, imitate sounds. This dialogic reading is twice as effective as passive reading.",references:['Bus, A. G. et al. (1995). Joint book reading makes for success. Review of Educational Research.','Whitehurst, G. J. et al. (1988). Accelerating language development. Developmental Psychology.']},
  {minMonths:14,maxMonths:26,emoji:'🎨',title:'Peinture aux doigts',title_en:'Finger Painting',summary:"Se salir avec de la peinture n'est pas du désordre — c'est de la science et de l'art combinés.",summary_en:"Getting messy with paint isn't disorder — it's science and art combined.",detail:"La peinture aux doigts est une activité sensorielle de premier ordre. Elle développe la motricité fine, la coordination œil-main et la créativité. Utilisez des peintures non-toxiques et lavables.",detail_en:"Finger painting is a first-rate sensory activity. It develops fine motor skills, hand-eye coordination, and creativity. Use non-toxic, washable paints.",references:["Kellogg, R. (1969). Analyzing Children's Art. Mayfield.",'Malchiodi, C. A. (1998). Understanding Children\'s Drawings. Guilford Press.']},
  {minMonths:18,maxMonths:36,emoji:'🍞',title:'Pâte à modeler maison',title_en:'Homemade Play Dough',summary:"Pétrir, rouler, façonner — la pâte à modeler est un outil de développement sensoriel et cognitif.",summary_en:"Kneading, rolling, shaping — play dough is a sensory and cognitive development tool.",detail:"Recette : 2 tasses de farine, 1 tasse de sel, eau petit à petit, colorant alimentaire. La pâte à modeler développe la motricité fine et a un effet régulateur sur le système nerveux.",detail_en:"Recipe: 2 cups of flour, 1 cup of salt, water little by little, food colouring. Play dough develops fine motor skills and has a regulatory effect on the nervous system.",references:['Sheridan, M. D. (1977). Spontaneous Play in Early Childhood. Routledge.','Isbell, R. & Exelby, B. (2001). Early Learning Environments That Work. Gryphon House.']},
  {minMonths:20,maxMonths:36,emoji:'🍳',title:'Mini-cuisine : cuisiner ensemble',title_en:'Mini Kitchen: Cooking Together',summary:"Cuisiner avec votre enfant, c'est maths, science, langage et autonomie en une seule activité.",summary_en:"Cooking with your child is math, science, language, and autonomy all in one activity.",detail:"Faites participer votre enfant à la préparation de repas simples. Les enfants mangent davantage et plus sainement les aliments qu'ils ont eux-mêmes préparés.",detail_en:"Children eat more and more healthily the foods they have prepared themselves.",references:['Savage, J. S. et al. (2007). Parental influence on eating behavior. Journal of Law, Medicine & Ethics.','Montessori, M. (1912). The Montessori Method. Frederick Stokes.']},
  {minMonths:24,maxMonths:48,emoji:'🧱',title:'Construction libre avec des blocs',title_en:'Free Building with Blocks',summary:"Construire et renverser des tours développe la pensée spatiale, l'ingénierie et la résilience.",summary_en:"Building and knocking down towers develops spatial thinking, engineering skills, and resilience.",detail:"Casey et al. (2008) montrent que le jeu avec des blocs en maternelle prédit les performances en mathématiques spatiales au lycée. Guidez par des questions plutôt que de construire pour votre enfant.",detail_en:"Casey et al. (2008) show that block play in kindergarten predicts spatial maths performance in high school. Guide with questions rather than building for your child.",references:['Casey, B. M. et al. (2008). Spatial skills through interventions. Developmental Psychology.','Resnick, L. B. (1989). Developing mathematical knowledge. American Psychologist.']},
  {minMonths:30,maxMonths:54,emoji:'🔍',title:'Chasse au trésor dans la maison',title_en:'Indoor Treasure Hunt',summary:"Chercher un trésor caché développe la mémoire, la logique et le plaisir de découvrir.",summary_en:"Searching for a hidden treasure develops memory, logic, and the joy of discovery.",detail:"Cachez un petit \"trésor\" et donnez des indices progressifs. Cette activité développe la mémoire de travail, l'orientation spatiale et le raisonnement déductif.",detail_en:"Hide a small 'treasure' and give progressive clues. This activity develops working memory, spatial orientation, and deductive reasoning.",references:['Diamond, A. (2013). Executive functions. Annual Review of Psychology.','Bjorklund, D. F. (2012). Children\'s Thinking. Wadsworth.']},
  {minMonths:36,maxMonths:60,emoji:'🌱',title:'Jardinage en pot : planter une graine',title_en:'Pot Gardening: Plant a Seed',summary:"Planter et arroser une graine enseigne la patience, la biologie et la responsabilité.",summary_en:"Planting and watering a seed teaches patience, biology, and responsibility.",detail:"Plantez ensemble une graine rapide (haricot, cresson) dans un pot transparent. Confiez à votre enfant la responsabilité de l'arroser chaque jour.",detail_en:"Plant a fast-growing seed (bean, cress) together in a transparent pot. Entrust your child with the responsibility of watering it every day.",references:['Louv, R. (2005). Last Child in the Woods. Algonquin Books.','Wells, N. M. (2000). At home with nature: Effects on cognitive functioning. Environment and Behavior.']},
  {minMonths:48,maxMonths:72,emoji:'🎲',title:'Jeux de société simples',title_en:'Simple Board Games',summary:"Jouer à un jeu avec des règles développe des compétences cognitives et sociales essentielles.",summary_en:"Playing a rule-based game develops essential cognitive and social skills.",detail:"Les jeux de société simples (Memory, Uno, Dobble) développent : attendre son tour, suivre des règles, gérer la frustration de perdre. Diamond & Lee (2011) montrent que les fonctions exécutives prédisent mieux la réussite scolaire que le QI.",detail_en:"Simple board games (Memory, Uno, Dobble) develop: waiting your turn, following rules, managing the frustration of losing. Diamond & Lee (2011) show that executive functions predict academic success better than IQ.",references:['Diamond, A. & Lee, K. (2011). Interventions to aid executive function development. Science.','Lillard, A. S. et al. (2013). The impact of pretend play on development. Psychological Bulletin.']},
]};
