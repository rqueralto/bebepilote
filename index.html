    t:"Conjugue le passé (et se trompe joliment)",t_en:"Marks the past (with charming errors)",
    summary:"« Il a pati », « j'ai prendu » : ces erreurs sont la preuve qu'il applique une règle, pas qu'il l'a oubliée.",summary_en:"'He goed', 'I taked': these errors prove they are applying a rule, not forgetting one.",
    detail:"Les surrégularisations (« vous disez », « il a prendu ») sont contre-intuitivement un signe de progrès : l'enfant a extrait la règle générale et l'applique aux verbes irréguliers. Marcus a montré que ces erreurs apparaissent APRÈS que l'enfant ait d'abord dit la forme correcte — preuve qu'une vraie règle, et non l'imitation, est désormais à l'œuvre.",detail_en:"Overregularisations ('he goed', 'I taked') are counter-intuitively a sign of progress: the child has extracted the general rule and applies it to irregular verbs. Marcus showed these errors appear AFTER the child first said the correct form — evidence that a true rule, not imitation, is now at work.",
    refs:["Marcus, G. F. et al. (1992). Overregularization in Language Acquisition. SRCD Monographs.","Pinker, S. (1999). Words and Rules. Basic Books."],
    q:"Parle-t-il au passé, même avec des erreurs « logiques » (« il a prendu », « j'ai vené ») ?",q_en:"Do they speak in the past tense, even with 'logical' errors ('he taked', 'I goed')?"},

  {track:"gram",m:42,minMonths:36,maxMonths:54,
    t:"Relie ses idées avec parce que",t_en:"Links ideas with because",
    summary:"Cause, condition, opposition : il enchâsse deux idées dans une phrase — la syntaxe se complexifie.",summary_en:"Cause, condition, contrast: they embed two ideas in one sentence — syntax grows complex.",
    detail:"Dire « je pleure PARCE QUE je suis tombé » relie deux propositions par un rapport de cause. Bloom a montré que les connecteurs apparaissent dans un ordre stable (« et » puis « parce que », « mais », « si ») et que « parce que » signale une étape clé : l'enfant ne juxtapose plus, il subordonne et raisonne à voix haute.",detail_en:"Saying 'I'm crying BECAUSE I fell' links two clauses by a cause relation. Bloom showed connectives appear in a stable order ('and' then 'because', 'but', 'if') and that 'because' signals a key step: the child no longer juxtaposes but subordinates and reasons aloud.",
    refs:["Bloom, L. et al. (1980). Complex Sentences. Journal of Child Language.","Diessel, H. (2004). The Acquisition of Complex Sentences. Cambridge University Press."],
    q:"Relie-t-il deux idées avec « parce que », « mais » ou « si » dans une même phrase ?",q_en:"Do they link two ideas with 'because', 'but' or 'if' in a single sentence?"},

  {track:"gram",m:54,minMonths:44,maxMonths:66,
    t:"Parle au futur et au conditionnel",t_en:"Uses future and conditional",
    summary:"« On ira », « si je pouvais » : il manie des temps qui parlent du possible et de l'imaginaire.",summary_en:"'We will go', 'if I could': they handle tenses that speak of the possible and the imagined.",
    detail:"Employer le futur et surtout le conditionnel suppose de parler de situations non réelles — projetées ou hypothétiques. Cette maîtrise, qui se consolide vers 4-5 ans, accompagne la capacité à raisonner sur des « et si ». Elle reflète une syntaxe désormais assez souple pour détacher complètement le langage de la réalité immédiate.",detail_en:"Using the future and especially the conditional requires talking about non-real situations — projected or hypothetical. This mastery, consolidating around age 4-5, accompanies the ability to reason about 'what ifs'. It reflects a syntax now flexible enough to fully detach language from immediate reality.",
    refs:["Weist, R. M. (1986). Tense and Aspect. In Language Acquisition, Cambridge University Press.","Clark, E. V. (2009). First Language Acquisition. Cambridge University Press."],
    q:"Emploie-t-il le futur (« on ira ») et le conditionnel (« si je pouvais », « ce serait bien ») ?",q_en:"Do they use the future ('we will go') and the conditional ('if I could', 'it would be nice')?"},

  {track:"gram",m:60,minMonths:50,maxMonths:72,
    t:"Construit des phrases complexes",t_en:"Builds complex sentences",
    summary:"Subordonnées, relatives, discours rapporté : ses phrases atteignent la structure de l'adulte.",summary_en:"Subordinates, relatives, reported speech: sentences reach adult structure.",
    detail:"Vers 5 ans, l'enfant produit des phrases enchâssées (« le chien QUI court est à moi », « il a dit QU'il viendrait »). Cette syntaxe complexe, longtemps en construction, est largement en place à l'entrée à l'école. Elle ouvre la porte au langage écrit, dont les phrases sont en moyenne plus longues et plus enchâssées que celles de l'oral.",detail_en:"By age 5, the child produces embedded sentences ('the dog THAT runs is mine', 'he said THAT he would come'). This complex syntax, long under construction, is largely in place by school entry. It opens the door to written language, whose sentences are on average longer and more embedded than spoken ones.",
    refs:["Diessel, H. (2004). The Acquisition of Complex Sentences. Cambridge University Press.","Tomasello, M. (2003). Constructing a Language. Harvard University Press."],
    q:"Fait-il des phrases complexes avec des subordonnées (« le jouet que tu m'as donné », « il a dit qu'il viendrait ») ?",q_en:"Do they make complex sentences with subordinate clauses ('the toy you gave me', 'he said he would come')?"}
];
function milestoneKey(child){return (child?.firstName||'')+'|'+(child?.birthDate||'');}
function getMilestones(child){try{return (JSON.parse(localStorage.getItem('bebeMilestones')||'{}'))[milestoneKey(child)]||{};}catch(_){return{};}}
function setMilestoneStatus(child,mid,status){
  let all;try{all=JSON.parse(localStorage.getItem('bebeMilestones')||'{}');}catch(_){all={};}
  const k=milestoneKey(child);const m=all[k]||{};const prev=m[mid]||{};
  m[mid]={status,lastSeen:Date.now(),firstDone:status==='done'?(prev.firstDone||Date.now()):(prev.firstDone||null)};
  all[k]=m;localStorage.setItem('bebeMilestones',JSON.stringify(all));
}
const MOTOR_OBS=[
  {"track":"gros",m:2,minMonths:1,maxMonths:4,t:"Soulève la tête en tummy time",t_en:"Lifts head in tummy time",summary:"La première victoire contre la gravité — le tonus cervical se construit peu à peu.",summary_en:"The first victory against gravity — neck tone is building little by little.",detail:"Le tummy time quotidien est recommandé par l'AAP dès la naissance pour prévenir la plagiocéphalie et renforcer la musculature cervicale. À 2 mois, la plupart des bébés soulèvent la tête à 45° en position ventrale. Ce mouvement active la chaîne musculaire postérieure selon l'axe crânio-caudal décrit par Gesell : tout le développement moteur suit cette direction de la tête vers les pieds.",detail_en:"Daily tummy time is recommended by the AAP from birth to prevent plagiocephaly and develop neck tone. At 2 months, most babies lift their head to 45° in the prone position. This extension activates the posterior muscle chain along the cranio-caudal axis described by Gesell: all motor development follows this head-to-feet direction.",refs:["AAP (2008). Back to Sleep, Tummy to Play.","Dudek-Shriber, L. & Zelazny, S. (2007). The effects of prone positioning. Pediatric Physical Therapy."],q:"En position sur le ventre, soulève-t-il la tête, même brièvement ?",q_en:"In the prone position, do they lift their head, even briefly?"},

  {"track":"gros",m:3,minMonths:2,maxMonths:5,t:"Tient la tête stable",t_en:"Holds head steady",summary:"Tenir la tête droite quand on le tire vers la position assise — le contrôle céphalique est là.",summary_en:"Holding the head upright when pulled to sitting — head control is established.",detail:"Le contrôle de la tête est le premier jalon de la motricité globale. Vers 3 mois, quand on tire doucement bébé par les bras vers la position assise, il commence à aligner la tête avec le tronc. Prechtl (2001) décrit cela comme un marqueur fiable de la maturation des muscles cervicaux et de la myélinisation des voies motrices.",detail_en:"Head control is the first gross motor milestone. Around 3 months, when gently pulled toward sitting, the baby begins to align their head with the trunk. Prechtl (2001) describes this as a reliable marker of cervical muscle maturation and motor pathway myelination.",refs:["Prechtl, H. F. R. (2001). General movement assessment. Mental Retardation and Developmental Disabilities.","Rochat, P. (1992). Self-sitting and reaching in 5–8-month-old infants. Journal of Motor Behavior."],q:"Quand tu le tires doucement vers la position assise, maintient-il sa tête dans l'axe du corps (sans qu'elle tombe en arrière) ?",q_en:"When gently pulled toward sitting, do they hold their head in line with their body?"},

  {"track":"gros",m:4,minMonths:3,maxMonths:6,t:"Se soulève sur les avant-bras",t_en:"Pushes up on forearms",summary:"En position ventrale, il se soulève sur ses avant-bras — la tête est à 90°.",summary_en:"In the prone position, they push up on their forearms — head at 90°.",detail:"À 4 mois, le tummy time devient actif : bébé pousse sur ses avant-bras, soulève la poitrine et maintient la tête à 90°. Cette extension du tronc renforce les muscles paravertébraux et prépare la rotation (se retourner) et la position assise. C'est aussi la première ébauche d'une posture semi-verticale.",detail_en:"At 4 months, tummy time becomes active: the baby pushes on their forearms, lifts their chest, and holds their head at 90°. This trunk extension strengthens the paravertebral muscles and prepares rolling over and sitting. It's also the first sketch of a semi-upright posture.",refs:["Adolph, K. E. & Franchak, J. M. (2017). The development of motor behavior. WIREs Cognitive Science.","Bertenthal, B. I. & Von Hofsten, C. (1998). Eye, head and trunk control. Neuroscience Reviews."],q:"En position sur le ventre, se soulève-t-il sur les avant-bras avec la tête bien droite ?",q_en:"In the prone position, do they push up on their forearms with their head upright?"},

  {"track":"fin",m:5,minMonths:4,maxMonths:7,t:"Attrape un jouet tendu",t_en:"Reaches and grasps a toy",summary:"La saisie volontaire remplace le réflexe de préhension — les mains deviennent des outils.",summary_en:"Voluntary grasping replaces the palmar reflex — hands become tools.",detail:"Le passage du réflexe de préhension à la saisie volontaire est une révolution. À 4-5 mois, bébé commence à atteindre et attraper délibérément des objets. Von Hofsten (1991) a montré que ces premières saisies sont d'abord maladroites et bilatérales, puis se raffinent. Proposer des objets de textures et tailles variées accélère ce développement.",detail_en:"The shift from palmar reflex to voluntary grasping is a revolution. At 4–5 months, the baby deliberately reaches for objects. Von Hofsten (1991) showed these first reaches are initially clumsy and bilateral, then refine. Offering objects of varied textures and sizes accelerates this development.",refs:["Von Hofsten, C. (1991). Structuring of early reaching movements. Journal of Motor Behavior.","Forssberg, H. et al. (1991). Development of human precision grip. Experimental Brain Research."],q:"Tend-il le bras et attrape-t-il un jouet qu'on lui présente à portée de main ?",q_en:"Do they reach out and grasp a toy presented within reach?"},

  {"track":"gros",m:6,minMonths:5,maxMonths:8,t:"Se retourne (dos → ventre)",t_en:"Rolls back to front",summary:"Le premier grand exploit locomoteur — il se retourne tout seul.",summary_en:"The first major locomotor feat — they roll over on their own.",detail:"Le retournement dos-ventre émerge généralement entre 4 et 6 mois. Il exige de coordonner la tête, les épaules et les hanches dans un mouvement rotatif séquentiel. Adolph & Franchak (2017) le décrivent comme la première locomotion autonome et soulignent que chaque bébé développe sa propre stratégie. C'est aussi le moment de redoubler de vigilance sur la table à langer.",detail_en:"Back-to-front rolling typically emerges between 4 and 6 months. It requires coordinating the head, shoulders, and hips in a sequential rotational movement. Adolph & Franchak (2017) describe it as the first autonomous locomotion, noting each baby develops their own strategy.",refs:["Adolph, K. E. & Franchak, J. M. (2017). The development of motor behavior. WIREs Cognitive Science.","Thelen, E. (1995). Motor development: A new synthesis. American Psychologist."],q:"Se retourne-t-il spontanément du dos sur le ventre ?",q_en:"Do they spontaneously roll from back to front?"},

  {"track":"gros",m:7,minMonths:6,maxMonths:9,t:"S'assoit avec soutien",t_en:"Sits with support",summary:"Assis avec appui minimal — le tronc se fortifie, les mains commencent à explorer librement.",summary_en:"Sitting with minimal support — the trunk strengthens, hands begin to explore freely.",detail:"La position assise libère les mains pour explorer. À 6-7 mois, bébé peut s'asseoir brièvement avec peu de soutien, les bras tendus en avant pour se stabiliser (position du trépied). Bertenthal & Von Hofsten (1998) ont montré que dès que l'équilibre tronculaire se développe, la manipulation d'objets s'affine rapidement — les deux sont liés.",detail_en:"Sitting frees the hands to explore. At 6–7 months, the baby can sit briefly with little support, arms extended forward for stability (tripod position). Bertenthal & Von Hofsten (1998) showed that as trunk balance develops, object manipulation refines rapidly.",refs:["Bertenthal, B. I. & Von Hofsten, C. (1998). Eye, head and trunk control. Neuroscience Reviews.","WHO (2006). WHO Motor Development Study. Acta Paediatrica."],q:"Reste-t-il assis quelques secondes avec peu ou pas de soutien ?",q_en:"Do they stay sitting for a few seconds with little or no support?"},

  {"track":"gros",m:8,minMonths:7,maxMonths:10,t:"S'assoit seul",t_en:"Sits independently",summary:"Il s'assoit seul, stabilement, les deux mains libres pour jouer.",summary_en:"They sit alone, stably, both hands free to play.",detail:"À 8 mois, la plupart des bébés s'assoient seuls de façon stable, sans appui. Le centre de gravité bas et les bras libres, ils peuvent maintenant manipuler deux objets simultanément et explorer avec une vraie intention. C'est l'une des libérations posturales les plus importantes du développement précoce.",detail_en:"At 8 months, most babies sit alone stably without support. With a low centre of gravity and both hands free, they can now handle two objects simultaneously and explore with real intention. It's one of the most important postural liberations of early development.",refs:["Adolph, K. E. & Franchak, J. M. (2017). The development of motor behavior. WIREs Cognitive Science.","WHO (2006). WHO Motor Development Study. Acta Paediatrica."],q:"S'assoit-il seul sans les mains, de façon stable, pendant plusieurs secondes ?",q_en:"Do they sit alone without their hands, stably, for several seconds?"},

  {"track":"gros",m:9,minMonths:8,maxMonths:11,t:"Se déplace à quatre pattes",t_en:"Crawls on hands and knees",summary:"Il se déplace tout seul pour la première fois — l'exploration du monde peut commencer.",summary_en:"They move independently for the first time — world exploration can begin.",detail:"La locomotion est un tournant cognitif autant que moteur. Adolph et al. (2012) ont montré que dès qu'un bébé peut se déplacer seul, son développement spatial s'accélère : il commence à construire une carte mentale de son environnement. La forme de déplacement importe peu — sur le ventre, sur les fesses, à quatre pattes — c'est l'autonomie de mouvement qui compte.",detail_en:"Locomotion is a cognitive turning point as much as a motor one. Adolph et al. (2012) showed that as soon as a baby moves independently, their spatial development accelerates. The form of movement matters less — crawling, bottom-shuffling, on all fours — what counts is autonomous movement.",refs:["Adolph, K. E. et al. (2012). How do you learn to walk? Psychological Science.","Thelen, E. (1995). Motor development: A new synthesis. American Psychologist."],q:"Se déplace-t-il seul en rampant, sur les fesses ou à quatre pattes — même maladroitement ?",q_en:"Do they move independently by crawling, bottom-shuffling, or on hands and knees?"},

  {"track":"gros",m:10,minMonths:9,maxMonths:13,t:"Se met debout en se tenant",t_en:"Pulls to stand",summary:"Il se hisse debout en s'appuyant sur un meuble — la verticalité est en vue.",summary_en:"They pull themselves upright using furniture — the upright position is in sight.",detail:"Se hisser debout est un acte d'une audace remarquable. À 9-10 mois, bébé saisit un meuble stable et tire sur ses bras pendant que ses jambes poussent, jusqu'à trouver l'équilibre debout. Cette compétence exige de comprendre la mécanique de son corps et d'anticiper l'effet de ses gestes — un niveau de planification motrice inédit.",detail_en:"Pulling to stand is a remarkably bold act. At 9–10 months, the baby grips stable furniture and pulls on their arms while legs push, until finding standing balance. This skill requires understanding body mechanics and anticipating the effect of movements — an unprecedented level of motor planning.",refs:["Adolph, K. E. et al. (2012). How do you learn to walk? Psychological Science.","AAP (2020). Motor development milestones."],q:"Se hisse-t-il debout en s'aidant d'un meuble ou de ta main ?",q_en:"Do they pull themselves up to standing using furniture or your hand?"},

  {"track":"gros",m:11,minMonths:10,maxMonths:14,t:"Marche en se tenant aux meubles",t_en:"Cruises along furniture",summary:"Il avance latéralement en se tenant aux meubles — la marche se prépare, un pas à la fois.",summary_en:"They move sideways holding onto furniture — walking is being prepared, one step at a time.",detail:"Le cruising est la répétition motrice de la marche. Chaque pas latéral renforce les muscles stabilisateurs de la cheville et affine l'équilibre dynamique. C'est aussi une période d'exploration intense : bébé suit les objets intéressants sur la longueur d'un canapé, développant simultanément sa curiosité et sa motricité.",detail_en:"Cruising is the motor rehearsal of walking. Each sideways step strengthens the ankle stabilisers and refines dynamic balance. It's also a period of intense exploration: the baby follows interesting objects along a sofa, developing curiosity and motor skills simultaneously.",refs:["Adolph, K. E. et al. (2012). How do you learn to walk? Psychological Science.","Thelen, E. (1995). Motor development: A new synthesis. American Psychologist."],q:"Se déplace-t-il en marchant latéralement le long d'un meuble ou d'un mur, en se tenant ?",q_en:"Do they move sideways along furniture or a wall while holding on?"},

  {"track":"gros",m:12,minMonths:9,maxMonths:16,t:"Premiers pas seuls",t_en:"First independent steps",summary:"Les premiers pas seuls — une révolution qui s'annonce en quelques secondes d'équilibre.",summary_en:"First independent steps — a revolution announced in a few seconds of balance.",detail:"Les premiers pas indépendants apparaissent en moyenne à 12 mois (fourchette normale : 9-16 mois). Adolph et al. (2012) ont calculé qu'un enfant qui apprend à marcher tombe environ 17 fois par heure et parcourt l'équivalent de 7-8 terrains de foot par jour. Marcher pieds nus sur des surfaces variées accélère le développement proprioceptif.",detail_en:"Independent first steps appear on average at 12 months (normal range: 9–16 months). Adolph et al. (2012) calculated a child learning to walk falls around 17 times per hour and covers the equivalent of 7–8 football pitches per day. Walking barefoot on varied surfaces accelerates proprioceptive development.",refs:["Adolph, K. E. et al. (2012). How do you learn to walk? Psychological Science.","AAP (2020). Motor development milestones."],q:"Fait-il quelques pas seul sans se tenir — même 2 ou 3 avant de tomber ?",q_en:"Do they take a few steps alone without holding on — even 2 or 3 before falling?"},

  {"track":"equi",m:14,minMonths:12,maxMonths:18,t:"Se baisse et se relève sans tomber",t_en:"Bends to pick up and stands back up",summary:"Se pencher pour ramasser sans tomber — l'équilibre dynamique est maîtrisé.",summary_en:"Bending to pick up without falling — dynamic balance is mastered.",detail:"Se baisser sans tomber exige de déplacer son centre de gravité tout en maintenant l'équilibre sur une seule jambe. Cette compétence révèle que le cervelet et le système vestibulaire coordonnent maintenant efficacement la posture et le mouvement. C'est aussi un signe que l'enfant trouve un objet assez intéressant pour déployer cet effort.",detail_en:"Bending without falling requires shifting the centre of gravity while maintaining balance on one leg. This skill reveals that the cerebellum and vestibular system now effectively coordinate posture and movement. It's also a sign the child finds an object interesting enough to deploy this strategic effort.",refs:["Adolph, K. E. & Franchak, J. M. (2017). The development of motor behavior.","Gallahue, D. L. & Ozmun, J. C. (2006). Understanding Motor Development."],q:"Se penche-t-il pour ramasser un objet au sol sans tomber ni s'appuyer ?",q_en:"Do they bend to pick up an object from the floor without falling or leaning?"},

  {"track":"gros",m:16,minMonths:13,maxMonths:20,t:"Monte les escaliers à quatre pattes",t_en:"Climbs stairs on all fours",summary:"Sa curiosité l'emmène maintenant en hauteur — les escaliers ne l'arrêtent plus.",summary_en:"Curiosity now takes them upward — stairs are no longer a barrier.",detail:"Monter les escaliers est l'une des premières activités locomotrices planifiées : l'enfant doit évaluer la hauteur de chaque marche, coordonner les quatre membres et gérer sa peur. À 16-18 mois, la montée à quatre pattes est généralement maîtrisée. Sécuriser l'accès aux escaliers et accompagner l'exploration reste essentiel.",detail_en:"Climbing stairs is one of the first truly planned locomotor activities: the child must assess each step, coordinate all four limbs, and manage any fear. By 16–18 months, climbing on all fours is generally mastered. Securing stair access and supervising exploration remains essential.",refs:["Adolph, K. E. & Kretch, K. S. (2015). Affordances and action possibilities.","Frankenburg, W. K. et al. (1992). The Denver II. Pediatrics."],q:"Monte-t-il les escaliers à quatre pattes ou en se tenant — sans aide directe ?",q_en:"Do they climb stairs on all fours or holding the rail — without your direct help?"},

  {"track":"gros",m:18,minMonths:15,maxMonths:22,t:"Court maladroitement",t_en:"Runs (unsteadily)",summary:"Il court — rigidement, les bras levés, mais il court ! La vitesse arrive.",summary_en:"They run — stiffly, arms raised, but they run! Speed is arriving.",detail:"La course apparaît vers 15-18 mois, d'abord sous forme d'une marche très rapide. Le vrai patron de course (phase de suspension avec les deux pieds en l'air) se développe progressivement jusqu'à 3 ans. Sutherland et al. (1980) ont décrit comment la foulée s'affine avec la maturation neuromusculaire — l'exploration libre fait le travail.",detail_en:"Running appears around 15–18 months, first as very fast walking. The true running pattern (both feet off the ground) develops progressively until age 3. Sutherland et al. (1980) described how gait refines with neuromuscular maturation — free exploration does the work.",refs:["Sutherland, D. H. et al. (1980). The development of mature gait. Journal of Bone and Joint Surgery.","OMS (2019). Guidelines on physical activity for children under 5."],q:"Essaie-t-il de courir — se déplacer vite avec les bras tendus, même s'il trébuche souvent ?",q_en:"Do they try to run — move fast with arms out, even if they stumble often?"},

  {"track":"equi",m:20,minMonths:17,maxMonths:25,t:"Pousse et tire des jouets en marchant",t_en:"Pushes and pulls toys while walking",summary:"Gérer un objet tout en marchant — coordination et intention combinées.",summary_en:"Managing an object while walking — coordination and intention combined.",detail:"Pousser une poussette ou tirer un jouet à ficelle demande de gérer deux systèmes à la fois : garder son équilibre tout en contrôlant l'objet. C'est une forme de motricité bimanuellement coordonnée rare avant 18-20 mois. Ces jeux développent aussi la planification de trajectoire dans l'espace.",detail_en:"Pushing a toy pushchair or pulling a pull-along toy requires managing two systems at once: keeping balance while controlling the object. This form of bilaterally coordinated motor skill is rare before 18–20 months. These games also develop spatial path planning.",refs:["Haywood, K. M. & Getchell, N. (2014). Life Span Motor Development.","Adolph, K. E. & Franchak, J. M. (2017). The development of motor behavior."],q:"Pousse-t-il ou tire-t-il un jouet en marchant, sans tomber ?",q_en:"Do they push or pull a toy while walking, without falling?"},

  {"track":"gros",m:22,minMonths:18,maxMonths:28,t:"Monte les escaliers debout avec aide",t_en:"Climbs stairs upright with help",summary:"Debout sur les escaliers, en tenant la rampe — la station debout gagne en confiance.",summary_en:"Upright on the stairs, holding the rail — standing confidence is growing.",detail:"À 18-24 mois, la montée des escaliers debout en tenant la rampe (step-to pattern) devient possible. La descente en tenant la main apparaît vers le même âge mais reste plus difficile psychologiquement. Frankenburg et al. (1992) notent que ces compétences varient beaucoup selon l'exposition aux escaliers.",detail_en:"By 18–24 months, climbing stairs upright while holding the rail (step-to pattern) becomes possible. Descending while holding a hand appears around the same age but remains more psychologically challenging. Frankenburg et al. (1992) note these skills vary considerably with stair exposure.",refs:["Frankenburg, W. K. et al. (1992). The Denver II. Pediatrics.","Adolph, K. E. & Kretch, K. S. (2015). Affordances and action possibilities."],q:"Monte-t-il les escaliers debout en tenant la rampe ou ta main ?",q_en:"Do they climb stairs upright holding the rail or your hand?"},

  {"track":"gros",m:24,minMonths:20,maxMonths:30,t:"Saute à pieds joints",t_en:"Jumps with both feet",summary:"Les deux pieds quittent le sol en même temps — une prouesse neuromusculaire.",summary_en:"Both feet leave the ground at the same time — a neuromuscular feat.",detail:"Le saut à pieds joints exige de plier les deux genoux simultanément et de pousser assez fort pour décoller tout en atterrissant en équilibre. À 24 mois, la plupart y parviennent. Entre 2 et 4 ans, les capacités motrices explosent en parallèle avec la production de BDNF stimulée par l'activité physique intense.",detail_en:"Jumping with both feet requires bending both knees simultaneously and pushing hard enough to lift off while landing in balance. By 24 months, most children manage it. Between ages 2 and 4, motor abilities explode alongside BDNF production stimulated by intense physical activity.",refs:["Ratey, J. J. (2008). Spark: Exercise and the Brain. Little, Brown.","OMS (2019). Guidelines on physical activity for children under 5."],q:"Saute-t-il à pieds joints — les deux pieds quittant le sol en même temps — sur place ?",q_en:"Do they jump with both feet — both feet leaving the ground simultaneously — on the spot?"},

  {"track":"fin",m:27,minMonths:22,maxMonths:33,t:"Empile 6 cubes ou plus",t_en:"Stacks 6 or more blocks",summary:"Empiler sans faire tomber — motricité fine et attention visuelle deviennent précises.",summary_en:"Stacking without toppling — fine motor skills and visual attention are becoming precise.",detail:"La tour de cubes est un test classique de motricité fine et d'attention. À 24 mois : 4-6 cubes ; à 36 mois : 8-10. Exner (2010) décrit comment cette tâche révèle la précision de la prise et la capacité à inhiber les mouvements parasites. C'est aussi de l'ingénierie : l'enfant planifie et ajuste chaque cube en fonction du précédent.",detail_en:"The block tower is a classic test of fine motor skills and attention. At 24 months: 4–6 blocks; at 36 months: 8–10. Exner (2010) describes how this task reveals the precision of the developing grasp and the ability to inhibit extraneous movements. It's also engineering: planning and adjusting each block based on the previous.",refs:["Exner, C. E. (2010). Development of hand skills. In Occupational Therapy for Children.","Largo, R. H. (2007). Babyjahre. Piper Verlag."],q:"Empile-t-il 6 cubes ou plus sans les faire tomber ?",q_en:"Do they stack 6 or more blocks without knocking them over?"},

  {"track":"gros",m:30,minMonths:24,maxMonths:38,t:"Saute depuis une marche",t_en:"Jumps off a step",summary:"Un vrai saut depuis une hauteur — audace et atterrissage contrôlé.",summary_en:"A real jump from a height — boldness and controlled landing.",detail:"Sauter depuis une marche est qualitativement différent du saut sur place : il faut vaincre la peur, calculer la distance et amortir l'atterrissage. Gallahue & Ozmun (2006) observent que cette compétence émerge vers 30 mois et varie beaucoup selon les expériences d'escalade et de saut autorisées.",detail_en:"Jumping off a step is qualitatively different from jumping on the spot: the child must overcome fear, calculate the distance, and absorb the landing. Gallahue & Ozmun (2006) observe this skill emerges around 30 months, varying considerably based on permitted experiences.",refs:["Gallahue, D. L. & Ozmun, J. C. (2006). Understanding Motor Development.","Payne, V. G. & Isaacs, L. D. (2017). Human Motor Development."],q:"Saute-t-il depuis une marche ou un rebord bas en atterrissant sur ses deux pieds ?",q_en:"Do they jump off a step or low ledge, landing on both feet?"},

  {"track":"gros",m:36,minMonths:28,maxMonths:46,t:"Pédale sur un tricycle",t_en:"Pedals a tricycle",summary:"Pédaler — coordination bilatérale alternée, guidon et équilibre combinés.",summary_en:"Pedalling — alternating bilateral coordination, steering and balance combined.",detail:"Pédaler exige de coordonner les deux jambes en alternance tout en maintenant l'équilibre et en guidant le guidon. C'est l'une des premières activités motrices véritablement asymétriques et cycliques. Haywood & Getchell (2014) notent que cette compétence, acquise vers 3 ans, prédit bien les capacités de coordination bilatérale futures.",detail_en:"Pedalling requires coordinating both legs alternately while maintaining balance and steering. It's one of the first truly asymmetric and cyclical motor activities. Haywood & Getchell (2014) note this skill, acquired around age 3, predicts future bilateral coordination abilities.",refs:["Haywood, K. M. & Getchell, N. (2014). Life Span Motor Development.","Payne, V. G. & Isaacs, L. D. (2017). Human Motor Development."],q:"Pédale-t-il seul sur un tricycle ou une draisienne (avec pédales) sur une courte distance ?",q_en:"Do they pedal a tricycle or pedal bike on their own over a short distance?"},

  {"track":"equi",m:42,minMonths:36,maxMonths:52,t:"Saut à cloche-pied",t_en:"Hops on one foot",summary:"Sautiller sur un seul pied — une prouesse d'équilibre dynamique.",summary_en:"Hopping on one foot — a feat of dynamic balance.",detail:"Sauter à cloche-pied exige de maintenir l'équilibre sur un seul pied tout en se propulsant verticalement — une coordination fine du cervelet et du système vestibulaire. Ce jalon, typique vers 3,5-4 ans, marque la maturité du contrôle postural unipodal.",detail_en:"Hopping on one foot requires maintaining balance on a single foot while propelling vertically — fine coordination of the cerebellum and vestibular system. This milestone, typical around 3.5–4 years, marks the maturity of single-leg postural control.",refs:["Williams, H. G. (1983). Perceptual and Motor Development.","Gallahue, D. L. & Ozmun, J. C. (2006). Understanding Motor Development."],q:"Sautille-t-il sur un seul pied — au moins 2-3 fois de suite — sans tomber ?",q_en:"Do they hop on one foot — at least 2–3 times in a row — without falling?"},

  {"track":"equi",m:48,minMonths:40,maxMonths:60,t:"Attrape une balle en mouvement",t_en:"Catches a moving ball",summary:"Intercepter une balle en vol — anticipation visuelle et coordination main-œil.",summary_en:"Catching a ball in flight — visual anticipation and hand-eye coordination.",detail:"Attraper une balle en vol est un exploit de traitement visuo-spatial : il faut prédire la trajectoire et synchroniser la fermeture des doigts. Savelsbergh et al. (1992) ont montré que ces capacités se développent entre 3 et 6 ans et mobilisent les mêmes circuits que la lecture de trajectoires sociales.",detail_en:"Catching a ball is a feat of visuo-spatial processing: predict the trajectory and synchronise finger closure. Savelsbergh et al. (1992) showed these abilities develop between ages 3 and 6 and mobilise the same circuits as reading social trajectories.",refs:["Savelsbergh, G. J. P. et al. (1992). Effect of body orientation on reaching. JECP.","Williams, H. G. (1983). Perceptual and Motor Development."],q:"Attrape-t-il une grosse balle molle lancée doucement à 1-2 mètres ?",q_en:"Do they catch a large soft ball thrown gently from 1–2 metres?"},

  {track:"gros",m:54,minMonths:44,maxMonths:66,
    t:"Court vite et freine bien",t_en:"Runs fast and stops well",
    summary:"Il accélère, change de direction et s'arrête net — le contrôle de la vitesse est acquis.",summary_en:"They accelerate, change direction and stop suddenly — speed control is now mastered.",
    detail:"Vers 4-5 ans, l'enfant ne court plus « comme il peut » mais gère sa vitesse selon l'espace et les obstacles. Gallahue et Ozmun parlent de phase « mature » de la course : patron locomoteur efficace, bras coordonnés, réception sur l'avant-pied. Ce contrôle ouvre les jeux collectifs (chat, football) qui demandent d'anticiper les autres.",detail_en:"Around age 4-5, children no longer run 'as best they can' but manage speed according to space and obstacles. Gallahue and Ozmun describe the 'mature' running phase: efficient locomotor pattern, coordinated arms, forefoot landing. This control opens up team games (tag, football) that require anticipating others.",
    refs:["Gallahue, D. L. & Ozmun, J. C. (2006). Understanding Motor Development. McGraw-Hill."],
    q:"Court-il vite en contrôlant bien sa direction et ses freinages ?",q_en:"Do they run fast with good direction control and braking?"},

  {track:"gros",m:60,minMonths:50,maxMonths:72,
    t:"Saute à la corde, enjambe des obstacles",t_en:"Jumps rope, steps over obstacles",
    summary:"Rythme, anticipation, coordination bilatérale : les habiletés locomotrices sont au niveau préscolaire.",summary_en:"Rhythm, anticipation, bilateral coordination: locomotor skills are at pre-school level.",
    detail:"Sauter à la corde demande de synchroniser le saut avec une contrainte externe (la corde), ce que Haywood & Getchell appellent la coordination « perceptivo-motrice ». Enjamber des obstacles mobilise le contrôle de la trajectoire du pied. Ces deux habiletés prédisent la réussite sportive et la sécurité motrice à l'école élémentaire.",detail_en:"Jumping rope requires synchronising the jump with an external constraint (the rope), what Haywood & Getchell call 'perceptuo-motor' coordination. Stepping over obstacles mobilises foot trajectory control. Both skills predict sports success and motor safety in primary school.",
    refs:["Haywood, K. M. & Getchell, N. (2014). Life Span Motor Development. Human Kinetics."],
    q:"Enjambe-t-il des obstacles, attrape-t-il un rythme de saut simple à la corde ?",q_en:"Do they step over obstacles and catch a simple jumping-rope rhythm?"},

  {track:"fin",m:20,minMonths:16,maxMonths:26,
    t:"Tourne les pages d'un livre",t_en:"Turns book pages",
    summary:"Une page à la fois — la pince fine s'affine au service de l'objet culturel.",summary_en:"One page at a time — the fine pinch refines in service of a cultural object.",
    detail:"Tourner une page nécessite une pince précise et un contrôle de la force : trop fort, on froisse ; trop léger, on n'attrape rien. Vers 18-24 mois, les enfants isolent ce geste et en font quelque chose de délibéré. C'est aussi le signe d'un intérêt pour les livres comme objets à manipuler, précurseur de la lecture.",detail_en:"Turning a page requires a precise pinch and force control: too hard, it crumples; too light, nothing grips. Around 18-24 months, children isolate this gesture and make it deliberate. It also signals interest in books as objects to handle, a precursor to reading.",
    refs:["Case-Smith, J. (2005). Occupational Therapy for Children. Mosby."],
    q:"Tourne-t-il les pages d'un livre une par une, sans les déchirer ?",q_en:"Do they turn book pages one at a time without tearing them?"},

  {track:"fin",m:24,minMonths:20,maxMonths:30,
    t:"Tient un crayon et gribouille intentionnellement",t_en:"Holds a crayon and scribbles with intent",
    summary:"Le gribouillage n'est plus aléatoire — il dirige le tracé, recommence, regarde ce qu'il fait.",summary_en:"Scribbling is no longer random — they direct the line, repeat it, look at what they make.",
    detail:"Vers 2 ans, l'enfant entre dans la phase de gribouillage intentionnel décrite par Kellogg : les marques ne sont plus accidentelles, l'enfant surveille et répète des formes (boucles, zigzags). Ce stade précède les figures géométriques et le dessin représentatif. La tenue du crayon reste souvent en poing, mais évolue vers la prise tripode dans les mois suivants.",detail_en:"Around age 2, the child enters the intentional scribbling phase described by Kellogg: marks are no longer accidental, the child monitors and repeats shapes (loops, zigzags). This stage precedes geometric figures and representational drawing. The crayon grip often remains a fist grip but evolves toward a tripod grip in the following months.",
    refs:["Kellogg, R. (1970). Analyzing Children's Art. Mayfield Publishing.","Beery, K. E. (2010). VMI: Developmental Test of Visual-Motor Integration."],
    q:"Tient-il un crayon et laisse-t-il des traces intentionnelles sur une feuille, en regardant ce qu'il trace ?",q_en:"Do they hold a crayon and leave intentional marks on paper, watching what they draw?"},

  {track:"fin",m:30,minMonths:26,maxMonths:38,
    t:"Copie un trait vertical et un cercle",t_en:"Copies a vertical line and a circle",
    summary:"Reproduire une forme vue — la main suit un modèle mental, pas seulement la liberté.",summary_en:"Reproducing a seen shape — the hand follows a mental model, not just free movement.",
    detail:"Copier (et non juste dessiner) suppose une boucle perception-action : l'enfant regarde le modèle, encode la forme, puis guide son tracé. Le Beery VMI situe la copie d'une ligne verticale vers 2-2.5 ans et du cercle vers 3 ans. Ces capacités prédisent les habiletés pré-graphiques de l'écriture.",detail_en:"Copying (not just drawing) involves a perception-action loop: the child looks at the model, encodes the shape, then guides the stroke. The Beery VMI places copying of a vertical line around age 2-2.5 and a circle around age 3. These abilities predict pre-graphical writing skills.",
    refs:["Beery, K. E. (2010). VMI: Developmental Test of Visual-Motor Integration. Pearson.","Rosenblum, S. (2013). Handwriting Measures as Reflectors of Executive Functions."],
    q:"Copie-t-il un trait vertical et un cercle (pas forcément parfaits) quand tu lui montres le modèle ?",q_en:"Do they copy a vertical line and a circle (imperfect is fine) when you show them the model?"},

  {track:"fin",m:36,minMonths:30,maxMonths:46,
    t:"Utilise des ciseaux (coupe une ligne droite)",t_en:"Uses scissors (cuts along a straight line)",
    summary:"Deux mains, deux actions coordonnées — couper une ligne demande de la séquencer et de la diriger.",summary_en:"Two hands, two coordinated actions — cutting a line means sequencing and directing.",
    detail:"Couper avec des ciseaux mobilise une coordination bimanuelle : une main tient le papier et le fait avancer, l'autre ouvre et ferme les ciseaux. Vers 3-4 ans, la plupart des enfants peuvent couper en suivant une ligne droite. Cette habileté requiert une stabilité du poignet et une force des intrinsèques de la main qui se développent progressivement.",detail_en:"Cutting with scissors mobilises bimanual coordination: one hand holds and feeds the paper, the other opens and closes the scissors. By age 3-4, most children can cut along a straight line. This skill requires wrist stability and intrinsic hand strength that develop progressively.",
    refs:["Exner, C. E. (2005). Development of Hand Skills. In Occupational Therapy for Children.","Schneck, C. M. & Henderson, A. (1990). Descriptive Analysis of Developmental Progression of Grip Position."],
    q:"Utilise-t-il des ciseaux adaptés et peut-il couper une bande de papier en suivant à peu près une ligne droite ?",q_en:"Do they use child scissors and cut a paper strip roughly along a straight line?"},

  {track:"fin",m:48,minMonths:40,maxMonths:60,
    t:"Copie des lettres et dessine un bonhomme",t_en:"Copies letters and draws a stick figure",
    summary:"Le dessin représentatif arrive — il met un humain en image, puis des lettres.",summary_en:"Representational drawing arrives — they put a human in an image, then letters.",
    detail:"Le « bonhomme têtard » (tête avec jambes directement) est une étape décrite par Kellogg vers 4 ans ; le bonhomme complet avec tronc apparaît vers 5 ans. La copie de lettres mobilise la planification du tracé et la mémoire visuelle des formes. Ces deux capacités sont des prédicteurs solides de la réussite en écriture à l'école.",detail_en:"The 'tadpole man' (head with legs directly) is a stage described by Kellogg around age 4; the full figure with torso appears around age 5. Copying letters mobilises stroke planning and visual shape memory. Both abilities are strong predictors of writing success at school.",
    refs:["Kellogg, R. (1970). Analyzing Children's Art. Mayfield.","Beery, K. E. (2010). VMI. Pearson."],
    q:"Dessine-t-il un bonhomme reconnaissable (tête, yeux, bras, jambes) et copie-t-il quelques lettres ?",q_en:"Do they draw a recognisable figure (head, eyes, arms, legs) and copy a few letters?"},

  {track:"equi",m:26,minMonths:22,maxMonths:34,
    t:"Marche en équilibre sur une ligne",t_en:"Walks along a line",
    summary:"Poser les pieds l'un devant l'autre sur une ligne — l'équilibre dynamique devient précis.",summary_en:"Placing feet one in front of the other on a line — dynamic balance becomes precise.",
    detail:"Marcher « en funambule » sur une ligne au sol demande de contrôler son centre de gravité en déplacement latéral minimal. Vers 2 ans, la plupart des enfants peuvent faire quelques pas ; vers 3 ans la performance est régulière. Payne & Isaacs montrent que cette habileté accompagne la maturation du cervelet et du système vestibulaire.",detail_en:"Walking 'tightrope-style' along a floor line requires controlling the centre of gravity with minimal lateral displacement. By age 2, most children can take a few steps; by age 3 the performance is consistent. Payne & Isaacs show this skill accompanies cerebellar and vestibular maturation.",
    refs:["Payne, V. G. & Isaacs, L. D. (2017). Human Motor Development. Routledge."],
    q:"Marche-t-il en posant les pieds l'un devant l'autre sur une ligne au sol, même sur quelques pas ?",q_en:"Do they walk placing feet one in front of the other on a floor line, even for a few steps?"},

  {track:"equi",m:36,minMonths:30,maxMonths:46,
    t:"Tient en équilibre sur un pied",t_en:"Balances on one foot",
    summary:"Rester sur un pied quelques secondes — le système proprioceptif coordonne posture et équilibre statique.",summary_en:"Standing on one foot for a few seconds — the proprioceptive system coordinates posture and static balance.",
    detail:"Tenir debout sur un pied mobilise la proprioception, le système vestibulaire et des ajustements posturaux rapides. Le Denver II situe cet item (2 secondes) vers 3-3.5 ans, et (5 secondes) vers 4 ans. La stabilité statique prédit les performances sportives et de danse, et la sécurité lors des transitions de surface.",detail_en:"Standing on one foot mobilises proprioception, the vestibular system and rapid postural adjustments. The Denver II places this item (2 seconds) around age 3-3.5, and (5 seconds) around age 4. Static stability predicts sports and dance performance, and safety during surface transitions.",
    refs:["Frankenburg, W. K. et al. (1992). The Denver II. Pediatrics.","Payne, V. G. & Isaacs, L. D. (2017). Human Motor Development."],
    q:"Tient-il debout sur un pied au moins 2-3 secondes sans s'appuyer ?",q_en:"Do they stand on one foot for at least 2-3 seconds without support?"},

  {track:"equi",m:48,minMonths:40,maxMonths:60,
    t:"Lance et attrape une balle (à deux mains)",t_en:"Throws and catches a ball (two hands)",
    summary:"Lancer haut et recevoir — coordination oculo-manuelle et anticipation de trajectoire.",summary_en:"Throwing up and catching — eye-hand coordination and trajectory anticipation.",
    detail:"Attraper une balle lancée demande d'anticiper la trajectoire et de positionner ses mains avant le contact. Gallahue montre que la phase mature d'attrapage (bras fléchis devant, ajustement des mains au vol) s'installe entre 5 et 6 ans. Cette habileté dépend de la coordination oculo-manuelle et de la vitesse de traitement visuel.",detail_en:"Catching a thrown ball requires anticipating the trajectory and positioning the hands before contact. Gallahue shows the mature catching phase (arms bent in front, hands adjusting in flight) develops between ages 5 and 6. This skill depends on eye-hand coordination and visual processing speed.",
    refs:["Gallahue, D. L. & Ozmun, J. C. (2006). Understanding Motor Development.","Haywood, K. M. & Getchell, N. (2014). Life Span Motor Development."],
    q:"Lance-t-il une balle vers le haut et la rattrape-t-il à deux mains ?",q_en:"Do they throw a ball up and catch it with two hands?"},

  {track:"equi",m:60,minMonths:50,maxMonths:72,
    t:"Fait du vélo sans stabilisateurs",t_en:"Rides a bike without stabilisers",
    summary:"Pédale, dirige et s'équilibre en même temps — la coordination tri-tâche est là.",summary_en:"Pedals, steers and balances simultaneously — three-task coordination is achieved.",
    detail:"Faire du vélo sans stabilisateurs est l'une des tâches motrices les plus complexes de l'enfance : équilibre dynamique sur 2 roues, pédalage alterné, guidon. Adolph & Franchak (2017) montrent que la maîtrise du vélo marque une étape dans l'autonomie locomotrice — l'enfant peut désormais se déplacer vite et loin de façon autonome.",detail_en:"Riding a bike without stabilisers is one of the most complex motor tasks of childhood: dynamic balance on 2 wheels, alternating pedalling, steering. Adolph & Franchak (2017) show that bike mastery marks a step in locomotor autonomy — the child can now move fast and far independently.",
    refs:["Adolph, K. E. & Franchak, J. M. (2017). The Development of Motor Behavior. WIREs Cognitive Science."],
    q:"Roule-t-il à vélo sans stabilisateurs sur quelques mètres, même en débutant ?",q_en:"Do they ride a bike without stabilisers for a few metres, even as a beginner?"}
];
const CHAR_OBS=[
  {"track":"att",m:2,minMonths:1,maxMonths:4,t:"Premier sourire social",t_en:"First social smile",summary:"Vers 6 semaines, le sourire passe du réflexe au social — il te reconnaît et répond.",summary_en:"Around 6 weeks, smiling shifts from reflex to social — they recognise you and respond.",detail:"Le premier sourire social est un moment fondateur. Avant 6 semaines, les sourires sont réflexes. Le sourire social implique la reconnaissance d'un visage familier et une réponse intentionnelle. Tronick et al. (1978), avec le paradigme du still face, ont montré que les bébés de 6 semaines sont déjà capables de détecter et de réagir à l'absence de réponse émotionnelle.",detail_en:"The first social smile is a founding moment. Before 6 weeks, smiles are reflex. The social smile involves recognising a familiar face and an intentional response. Tronick et al. (1978), using the still face paradigm, showed 6-week-old babies can already detect and react to the absence of emotional response.",refs:["Tronick, E. et al. (1978). The infant's response to entrapment. Journal of the AACP.","Johnson, M. H. et al. (1991). Preferential tracking of face-like stimuli. Cognition."],q:"Sourit-il clairement en réponse à ton visage ou à ta voix — pas juste après avoir mangé ou pendant le sommeil ?",q_en:"Do they smile clearly in response to your face or voice — not just after feeding or during sleep?"},

  {"track":"att",m:3,minMonths:2,maxMonths:5,t:"Rit aux éclats",t_en:"Laughs out loud",summary:"Le rire du bébé — une récompense évolutive qui renforce le lien d'attachement.",summary_en:"Baby laughter — an evolutionary reward that strengthens the attachment bond.",detail:"Le rire aux éclats émerge vers 3-4 mois, souvent déclenché par les jeux physiques. Panksepp (1998) a montré que le rire chez les mammifères active les circuits du PLAY — un système émotionnel primaire. Ces moments de jeu partagé renforcent simultanément le lien d'attachement et la résistance au stress.",detail_en:"Laughter emerges around 3–4 months, often triggered by physical play. Panksepp (1998) showed that laughter in mammals activates the PLAY circuits — a primary emotional system. These shared play moments simultaneously strengthen the attachment bond and stress resilience.",refs:["Panksepp, J. (1998). Affective Neuroscience. Oxford University Press.","Stern, D. N. (1985). The Interpersonal World of the Infant. Basic Books."],q:"Rit-il aux éclats — un vrai rire sonore — en réponse à un jeu ou à ta voix ?",q_en:"Do they laugh out loud — a real audible laugh — in response to play or your voice?"},

  {"track":"emo",m:4,minMonths:3,maxMonths:6,t:"Joie et frustration distinctes",t_en:"Joy and frustration are distinct",summary:"Il exprime maintenant clairement deux émotions différentes — la vie intérieure s'étoffe.",summary_en:"They now clearly express two distinct emotions — inner life is developing.",detail:"À 3-4 mois, les bébés différencient leurs expressions émotionnelles. Izard (1991) a identifié que ces émotions de base sont universelles. Leur reconnaissance par les parents est le premier outil de régulation émotionnelle de l'enfant — nommer ce qu'on voit aide l'enfant à construire une représentation de ses propres états internes.",detail_en:"At 3–4 months, babies begin differentiating their emotional expressions. Izard (1991) identified these basic emotions as universal. Parental recognition of them is the child's first emotional regulation tool — naming what you see helps the child build a representation of their own internal states.",refs:["Izard, C. E. (1991). The Psychology of Emotions. Plenum Press.","Tronick, E. (2007). The Neurobehavioral and Social-Emotional Development of Infants."],q:"Exprime-t-il clairement deux émotions différentes — par exemple la joie (sourires, agitation) et la frustration (pleurs de protestation distincts) ?",q_en:"Do they clearly express two distinct emotions — e.g. joy (smiles, wriggling) and frustration (distinct protest cries)?"},

  {"track":"att",m:6,minMonths:5,maxMonths:9,t:"Préférence pour les proches",t_en:"Clear preference for familiar people",summary:"Il préfère nettement ses proches aux étrangers — l'attachement se structure.",summary_en:"They clearly prefer familiar people over strangers — attachment is structuring.",detail:"Vers 5-6 mois, la préférence pour les figures d'attachement devient visible. Bowlby (1969) a décrit ce stade comme la phase de 'discrimination active' : le bébé a maintenant une représentation interne de ses caregivers et les cherche activement.",detail_en:"Around 5–6 months, the preference for attachment figures becomes visible. Bowlby (1969) described this stage as the 'active discrimination' phase: the baby now has an internal representation of their caregivers and actively seeks them.",refs:["Bowlby, J. (1969). Attachment and Loss, Vol. 1. Basic Books.","Ainsworth, M. D. S. et al. (1978). Patterns of Attachment."],q:"Montre-t-il clairement de la joie ou de l'excitation quand il te voit — plus que pour une personne inconnue ?",q_en:"Do they clearly show joy or excitement when they see you — more than for an unfamiliar person?"},

  {"track":"att",m:8,minMonths:6,maxMonths:11,t:"Angoisse de l'étranger",t_en:"Stranger anxiety",summary:"La méfiance envers les inconnus n'est pas un problème — c'est un signe de développement cognitif.",summary_en:"Wariness of strangers is not a problem — it's a sign of cognitive development.",detail:"L'angoisse de l'étranger (décrite par Spitz comme 'l'angoisse du 8ème mois') signale que le bébé a une représentation stable de ses proches et peut comparer un visage inconnu à ce modèle interne. Sroufe (1977) a montré que l'intensité varie selon le tempérament — certains bébés la traversent à peine, d'autres de façon intense. Aucun des deux n'est anormal.",detail_en:"Stranger anxiety (described by Spitz as 'eighth-month anxiety') signals that the baby has a stable representation of their close people and can compare an unfamiliar face to this internal model. Sroufe (1977) showed intensity varies by temperament — some babies barely experience it, others intensely. Neither is abnormal.",refs:["Spitz, R. A. (1965). The First Year of Life. International Universities Press.","Sroufe, L. A. (1977). Wariness of strangers. Child Development."],q:"Montre-t-il une méfiance visible (se raidit, détourne le regard, pleure) face à une personne inconnue ?",q_en:"Do they show visible wariness (stiffen, look away, cry) with an unfamiliar person?"},

  {"track":"att",m:10,minMonths:8,maxMonths:14,t:"Angoisse de séparation",t_en:"Separation anxiety",summary:"Les pleurs au moment du départ révèlent un attachement fort — et une mémoire des absences.",summary_en:"Tears at departure reveal a strong attachment — and a memory of absences.",detail:"L'angoisse de séparation culmine entre 9 et 18 mois. Elle indique que l'attachement est solide et que la permanence de l'objet est partielle — il sait que tu existes quand tu pars, mais ne peut pas encore prédire ton retour. Winnicott (1953) a décrit comment l'objet transitionnel aide l'enfant à traverser ces séparations.",detail_en:"Separation anxiety peaks between 9 and 18 months. It signals that attachment is solid and object permanence is partial — they know you exist when you leave, but can't yet predict your return. Winnicott (1953) described how the transitional object helps the child through these separations.",refs:["Bowlby, J. (1973). Attachment and Loss, Vol. 2: Separation. Basic Books.","Winnicott, D. W. (1953). Transitional objects and transitional phenomena. IJP."],q:"Pleure-t-il ou proteste-t-il clairement quand tu quittes la pièce ou le laisses avec quelqu'un d'autre ?",q_en:"Do they cry or clearly protest when you leave the room or leave them with someone else?"},

  {"track":"att",m:12,minMonths:10,maxMonths:16,t:"Affection spontanée",t_en:"Spontaneous affection",summary:"Il vient te faire un câlin de lui-même — sans qu'on le lui demande.",summary_en:"They come to give you a hug on their own — without being asked.",detail:"L'affection spontanée, vers 10-14 mois, est qualitativement différente de l'affection réciproque. L'enfant initie lui-même le contact affectueux — un câlin, un bisou, poser sa tête sur l'épaule — sans y être invité. C'est un signe de sécurité affective : il est suffisamment à l'aise pour exprimer ses émotions positives.",detail_en:"Spontaneous affection around 10–14 months is qualitatively different from reciprocal affection. The child initiates affectionate contact — a hug, a kiss, resting their head on your shoulder — without being invited. It's a sign of emotional security: they're comfortable enough to express positive emotions.",refs:["Ainsworth, M. D. S. et al. (1978). Patterns of Attachment.","Harlow, H. (1958). The nature of love. American Psychologist."],q:"Vient-il spontanément te faire un câlin ou te donner un bisou — sans que tu le demandes ?",q_en:"Do they spontaneously come to hug you or give you a kiss — without being asked?"},

  {"track":"jeu",m:13,minMonths:11,maxMonths:18,t:"Imitation différée",t_en:"Deferred imitation",summary:"Il reproduit quelque chose qu'il a vu faire hier — la mémoire épisodique s'éveille.",summary_en:"They reproduce something seen yesterday — episodic memory is awakening.",detail:"L'imitation différée est une preuve que le bébé a une mémoire épisodique fonctionnelle. Meltzoff (1988) a montré que des bébés de 14 mois se souviennent et imitent des actions vues 24 heures plus tôt. Quand ton enfant fait semblant de passer l'aspirateur après t'avoir regardé faire, c'est cette mémoire-là qui s'exprime.",detail_en:"Deferred imitation proves the baby has functional episodic memory. Meltzoff (1988) showed 14-month-olds remember and imitate actions seen 24 hours earlier. When your child pretends to vacuum after watching you, it's this memory expressing itself.",refs:["Meltzoff, A. N. (1988). Infant imitation after a 1-week delay. Developmental Psychology.","Bandura, A. (1977). Social Learning Theory."],q:"Imite-t-il des actions de la vie quotidienne qu'il a observées (faire semblant de téléphoner, de donner à manger) ?",q_en:"Do they imitate everyday actions they've observed (pretend to phone, feed a doll)?"},

  {"track":"reg",m:15,minMonths:13,maxMonths:20,t:"Premières crises de colère",t_en:"First tantrums",summary:"Les crises ne signifient pas qu'il est mal élevé — elles signifient que son cerveau grandit.",summary_en:"Tantrums don't mean they're badly raised — they mean their brain is growing.",detail:"Les crises de colère atteignent leur pic entre 18 mois et 3 ans. Le cortex préfrontal ne sera pas mature avant 25 ans. Quand ton enfant est submergé par la frustration, c'est une tempête neurologique réelle. Siegel & Payne Bryson (2011) recommandent de rester calme, valider l'émotion et rester présent jusqu'à ce que la tempête passe.",detail_en:"Tantrums peak between 18 months and 3 years. The prefrontal cortex won't be mature until age 25. When your child is overwhelmed by frustration, it's a real neurological storm. Siegel & Payne Bryson (2011) recommend staying calm, validating the emotion, and remaining present until the storm passes.",refs:["Potegal, M. & Davidson, R. J. (2003). Temper tantrums in young children. Journal of Developmental Pediatrics.","Siegel, D. J. & Payne Bryson, T. (2011). The Whole-Brain Child."],q:"A-t-il des crises de colère ou des explosions émotionnelles quand il est frustré ou contrarié ?",q_en:"Do they have tantrums or emotional outbursts when frustrated or thwarted?"},

  {"track":"emo",m:18,minMonths:15,maxMonths:23,t:"Se reconnaît dans le miroir",t_en:"Recognises themselves in the mirror",summary:"Toucher son propre front plutôt que le miroir — la conscience de soi est là.",summary_en:"Touching their own forehead rather than the mirror — self-awareness is here.",detail:"Le test du rouge de Lewis & Brooks-Gunn (1979) : on place une tache rouge sur le front de l'enfant et on l'observe devant un miroir. Avant 18 mois, la plupart touchent le miroir ; après, leur propre front. Cette reconnaissance de soi n'existe que chez quelques espèces animales et chez les humains à partir de 18-24 mois.",detail_en:"The Lewis & Brooks-Gunn (1979) rouge test: a red mark is placed on the forehead and they're observed in a mirror. Before 18 months, most touch the mirror; after, their own forehead. This self-recognition only exists in a few animal species and in humans from 18–24 months.",refs:["Lewis, M. & Brooks-Gunn, J. (1979). Social Cognition and the Acquisition of Self.","Nielsen, M. et al. (2006). Self-recognition beyond the mirror. Trends in Cognitive Sciences."],q:"Quand il se voit dans un miroir avec quelque chose d'inhabituel sur le visage, touche-t-il son propre visage (plutôt que le miroir) ?",q_en:"When they see themselves in a mirror with something unusual on their face, do they touch their own face (rather than the mirror)?"},

  {"track":"emo",m:19,minMonths:16,maxMonths:25,t:"Empathie naissante",t_en:"Emerging empathy",summary:"Il apporte son doudou à quelqu'un qui pleure — l'empathie émerge, touchante et maladroite.",summary_en:"They bring their blanket to someone crying — empathy emerges, touching and clumsy.",detail:"Les premiers comportements empathiques apparaissent vers 18-24 mois : réagir à la détresse d'autrui par des comportements de réconfort. Zahn-Waxler et al. (1992) ont montré que ces comportements sont plus fréquents quand les parents nomment leurs propres émotions — ce qu'on appelle le 'coaching émotionnel'.",detail_en:"The first empathic behaviours appear around 18–24 months: reacting to another's distress with comforting behaviours. Zahn-Waxler et al. (1992) showed these behaviours are more frequent when parents name their own emotions — what is called 'emotional coaching'.",refs:["Zahn-Waxler, C. et al. (1992). Development of concern for others. Developmental Psychology.","Rizzolatti, G. & Craighero, L. (2004). The mirror-neuron system. Annual Review of Neuroscience."],q:"Réagit-il à la détresse de quelqu'un en essayant de le réconforter ou en l'approchant avec une expression soucieuse ?",q_en:"Do they react to someone's distress by trying to comfort them or approaching with a concerned expression?"},

  {"track":"emo",m:21,minMonths:17,maxMonths:28,t:"C'est à moi !",t_en:"Mine!",summary:"La possessivité vers 18-24 mois est cognitive : on ne peut partager que ce qu'on sait posséder.",summary_en:"Possessiveness at 18–24 months is cognitive: you can only share what you know you own.",detail:"La compréhension de la propriété précède et conditionne la capacité à partager. Fasig (2000) a montré que les enfants qui maîtrisent le concept d'appartenance commencent à partager spontanément plus tôt. Le 'c'est à moi !' n'est pas un problème à corriger — c'est une étape cognitive à traverser.",detail_en:"Understanding ownership precedes and conditions the ability to share. Fasig (2000) showed that children who master the concept of ownership begin sharing spontaneously earlier. 'Mine!' is not a problem to correct — it's a cognitive stage to pass through.",refs:["Fasig, L. G. (2000). Toddlers' understanding of ownership. Social Development.","Hay, D. F. (2006). Yours and mine: Toddlers talk about possessions. BJDP."],q:"Dit-il ou montre-t-il clairement que des objets lui appartiennent — en les reprenant ou en disant 'à moi' ?",q_en:"Do they clearly assert ownership of objects — taking them back or saying 'mine'?"},

  {"track":"jeu",m:24,minMonths:20,maxMonths:32,t:"Jeu de faire-semblant",t_en:"Pretend play",summary:"Quand il fait semblant de donner du café à sa peluche, il développe des capacités cognitives de haut niveau.",summary_en:"When they pretend to give coffee to their teddy, they're developing high-level cognitive abilities.",detail:"Le jeu symbolique s'épanouit entre 2 et 5 ans. Vygotsky (1978) voyait dans le jeu la 'zone proximale de développement par excellence' : l'enfant y agit 'comme s'il était plus grand'. Leslie (1987) a montré que le jeu symbolique exige un 'découplage représentationnel' — la même capacité qui sous-tend la théorie de l'esprit.",detail_en:"Symbolic play flourishes between ages 2 and 5. Vygotsky (1978) saw in play the 'zone of proximal development par excellence': the child acts 'as if they were older'. Leslie (1987) showed symbolic play requires 'representational decoupling' — the same ability that underlies theory of mind.",refs:["Vygotsky, L. S. (1978). Mind in Society. Harvard University Press.","Leslie, A. M. (1987). Pretense and representation. Psychological Review."],q:"Joue-t-il à faire semblant — donner à manger à une peluche, faire semblant de téléphoner, rejouer des scènes du quotidien ?",q_en:"Do they engage in pretend play — feeding a stuffed animal, pretending to phone, replaying everyday scenes?"},

  {"track":"emo",m:25,minMonths:21,maxMonths:34,t:"Nomme ses émotions",t_en:"Names their emotions",summary:"Dire 'je suis content' ou 'j'ai peur' est une compétence de régulation, pas juste de vocabulaire.",summary_en:"Saying 'I'm happy' or 'I'm scared' is a regulation skill, not just vocabulary.",detail:"Nommer ses émotions réduit leur intensité — ce que les neuroscientifiques appellent 'affect labeling'. Lieberman et al. (2007) ont montré que nommer une émotion diminue l'activation de l'amygdale et augmente celle du cortex préfrontal. Quand tu aides ton enfant à mettre des mots sur ce qu'il ressent, tu lui apprends à réguler son système nerveux.",detail_en:"Naming emotions reduces their intensity — what neuroscientists call 'affect labelling'. Lieberman et al. (2007) showed naming an emotion reduces amygdala activation and increases prefrontal cortex activation. When you help your child put words to their feelings, you're teaching them to regulate their nervous system.",refs:["Lieberman, M. D. et al. (2007). Putting feelings into words. Psychological Science.","Gottman, J. & DeClaire, J. (1997). The Heart of Parenting."],q:"Utilise-t-il des mots pour nommer ses émotions — même 2 ou 3 (content, triste, en colère, peur) ?",q_en:"Do they use words to name their emotions — even just 2 or 3 (happy, sad, angry, scared)?"},

  {"track":"jeu",m:28,minMonths:23,maxMonths:38,t:"Jeu en parallèle avec les pairs",t_en:"Parallel play with peers",summary:"Jouer côte à côte sans vraiment interagir — la première forme de sociabilité avec les pairs.",summary_en:"Playing side by side without truly interacting — the first form of sociability with peers.",detail:"Mildred Parten (1932) a décrit l'évolution du jeu social : solitaire → parallèle → associatif → coopératif. Le jeu en parallèle — jouer à côté d'un autre enfant sans l'inclure directement — est une étape, pas un manque de sociabilité. Il montre que l'enfant est conscient de l'autre et s'ajuste à sa présence.",detail_en:"Mildred Parten (1932) described the evolution of social play: solitary → parallel → associative → cooperative. Parallel play — playing beside another child without directly including them — is a stage, not a lack of sociability. It shows the child is aware of the other and adjusts to their presence.",refs:["Parten, M. B. (1932). Social participation among pre-school children. JASP.","Howes, C. (1988). Peer interaction of young children. Monographs SRCD."],q:"Joue-t-il à côté d'un autre enfant sans vraiment interagir — conscient de l'autre mais chacun dans son jeu ?",q_en:"Do they play beside another child without truly interacting — aware of the other but each in their own play?"},

  {"track":"reg",m:30,minMonths:24,maxMonths:40,t:"Peurs imaginaires",t_en:"Imaginary fears",summary:"Les peurs du noir et des monstres reflètent une imagination en plein développement.",summary_en:"Fears of the dark and monsters reflect an imagination in full development.",detail:"Les peurs nocturnes et imaginaires sont très fréquentes entre 2 et 5 ans. Elles correspondent au développement de l'imagination : l'enfant peut maintenant se représenter des choses absentes, y compris menaçantes. Muris et al. (2000) ont montré que 73% des enfants de 4-12 ans rapportent des peurs spécifiques. Valider la peur sans la minimiser tout en rassurant est plus efficace que raisonner.",detail_en:"Nocturnal and imaginary fears are very common between ages 2 and 5. They correspond to imagination development: the child can now represent absent things, including threatening ones. Muris et al. (2000) showed 73% of 4–12-year-olds report specific fears. Validating the fear without minimising it while reassuring is more effective than reasoning.",refs:["Muris, P. et al. (2000). Fears, worries, and scary dreams in 4–12-year-olds. JCCP.","Berk, L. E. (2009). Child Development (8th ed.). Pearson."],q:"Manifeste-t-il des peurs imaginaires — du noir, des monstres, d'un bruit inexpliqué ?",q_en:"Do they show imaginary fears — of the dark, monsters, unexplained noises?"},

  {"track":"jeu",m:36,minMonths:28,maxMonths:48,t:"Jeu coopératif",t_en:"Cooperative play",summary:"Jouer vraiment avec un autre enfant — négocier, se distribuer des rôles, suivre des règles.",summary_en:"Truly playing with another child — negotiating, assigning roles, following rules.",detail:"Le jeu coopératif (vers 3-4 ans) marque l'entrée dans la socialisation active. L'enfant doit simultanément maintenir son intention, comprendre celle de l'autre, négocier et parfois se soumettre à des règles. Piaget (1932) a montré que les conflits entre enfants, gérés sans intervention excessive, sont des apprentissages sociaux essentiels.",detail_en:"Cooperative play (around 3–4 years) marks entry into active socialisation. The child must simultaneously maintain their intention, understand the other's, negotiate, and sometimes submit to rules. Piaget (1932) showed conflicts between children, managed without excessive intervention, are essential social learning.",refs:["Parten, M. B. (1932). Social participation. JASP.","Piaget, J. (1932). The Moral Judgment of the Child."],q:"Joue-t-il vraiment avec un autre enfant — en se répartissant des rôles, en négociant, en suivant les mêmes règles ?",q_en:"Do they truly play with another child — distributing roles, negotiating, following the same play rules?"},

  {"track":"jeu",m:40,minMonths:32,maxMonths:52,t:"Comprend et respecte son tour",t_en:"Understands and respects taking turns",summary:"Attendre son tour sans exploser — une victoire de la régulation émotionnelle.",summary_en:"Waiting their turn without falling apart — a victory of emotional regulation.",detail:"Comprendre et accepter la notion de tour exige d'inhiber l'impulsion d'agir et de tolérer la frustration d'attendre. Diamond & Lee (2011) ont montré que ces fonctions exécutives prédisent mieux la réussite scolaire que le QI à 5 ans. Les jeux de société simples sont l'entraînement le plus naturel pour ces compétences.",detail_en:"Understanding and accepting taking turns requires inhibiting the impulse to act and tolerating the frustration of waiting. Diamond & Lee (2011) showed these executive functions predict academic success better than IQ at age 5. Simple board games are the most natural training for these skills.",refs:["Diamond, A. & Lee, K. (2011). Interventions to aid executive function. Science.","Lillard, A. S. et al. (2013). The impact of pretend play. Psychological Bulletin."],q:"Attend-il son tour dans un jeu sans avoir besoin d'être rappelé à l'ordre à chaque fois ?",q_en:"Do they wait their turn in a game without needing to be reminded every time?"},

  {"track":"jeu",m:48,minMonths:38,maxMonths:60,t:"Distingue réel et imaginaire",t_en:"Distinguishes real from imaginary",summary:"Il sait que les dragons n'existent pas — mais ça ne suffit pas toujours à dissiper la peur.",summary_en:"They know dragons don't exist — but that's not always enough to dispel the fear.",detail:"Vers 4 ans, les enfants développent la capacité à distinguer le réel de l'imaginaire. Sharon & Woolley (2004) ont montré que même des enfants de 5-6 ans peuvent 'contagieusement' traiter des créatures imaginaires comme réelles dans certains contextes émotionnels — c'est la base même de la fiction et du jeu d'imagination.",detail_en:"Around age 4, children develop the ability to distinguish real from imaginary. Sharon & Woolley (2004) showed even 5–6-year-olds can 'contagiously' treat imaginary creatures as real in certain emotional contexts — this is the very foundation of fiction and imaginative play.",refs:["Sharon, T. & Woolley, J. D. (2004). Do monsters dream? British Journal of Developmental Psychology.","Taylor, M. (1999). Imaginary Companions and the Children Who Create Them."],q:"Comprend-il que certaines choses (les monstres, les personnages de dessins animés) ne sont pas réelles ?",q_en:"Do they understand that some things (monsters, cartoon characters) aren't real?"},

  {"track":"reg",m:54,minMonths:44,maxMonths:66,t:"Sens de l'équité",t_en:"Sense of fairness",summary:"C'est pas juste ! — il développe une conscience morale naissante.",summary_en:"That's not fair! — they are developing a nascent moral conscience.",detail:"Entre 4 et 6 ans, les enfants développent un sens aigu de l'équité. Sloane et al. (2012) ont montré que des enfants de 15 mois protestent déjà quand une distribution est inégale. À 5 ans, certains refuseront un avantage pour eux-mêmes s'il implique une injustice. Expliquer le 'pourquoi' des règles développe une conscience morale plus robuste.",detail_en:"Between ages 4 and 6, children develop a keen sense of fairness. Sloane et al. (2012) showed 15-month-olds already protest when distribution is unequal. By age 5, some children refuse an advantage for themselves if it involves injustice. Explaining the 'why' of rules develops more robust moral conscience.",refs:["Sloane, S. et al. (2012). Do infants have a sense of fairness? Psychological Science.","Kohlberg, L. (1958). The Development of Modes of Moral Thinking."],q:"Réagit-il aux situations qu'il juge inéquitables (partage inégal, règle enfreinte) avec une vraie indignation ?",q_en:"Do they react to situations they judge unfair (unequal sharing, a rule broken) with genuine indignation?"},

  {"track":"reg",m:60,minMonths:50,maxMonths:72,t:"Régulation émotionnelle",t_en:"Emotional self-regulation",summary:"Il commence à gérer ses émotions seul — sans fondre en larmes à chaque frustration.",summary_en:"They're beginning to manage their emotions alone — without melting down at every frustration.",detail:"La régulation émotionnelle fait un bond visible vers 5-6 ans avec la maturation du cortex préfrontal. Eisenberg et al. (2003) ont montré que les enfants qui régulent bien leurs émotions à 5 ans ont de meilleures relations sociales et de meilleures performances scolaires à l'adolescence. Les jeux physiques, le sommeil suffisant et la co-régulation parentale sont les leviers les plus puissants.",detail_en:"Emotional regulation makes a visible leap around ages 5–6 with prefrontal cortex maturation. Eisenberg et al. (2003) showed children who regulate emotions well at age 5 have better social relationships and academic performance in adolescence. Physical play, sufficient sleep, and parental co-regulation are the most powerful levers.",refs:["Eisenberg, N. et al. (2003). Longitudinal relations among parenting and effortful control. Developmental Psychology.","Thompson, R. A. (1994). Emotion regulation: A theme in search of definition. Monographs SRCD."],q:"Parvient-il à se calmer seul après une contrariété — sans intervention adulte nécessaire à chaque fois ?",q_en:"Can they calm themselves after an upset — without adult intervention needed every time?"},

  {track:"emo",m:22,minMonths:18,maxMonths:30,
    t:"Fière de lui / d'elle — cherche l'approbation",t_en:"Proud of themselves — seeks approval",
    summary:"Après un exploit, il se retourne et attend ton regard — la honte et la fierté émergent.",summary_en:"After a feat, they turn around and wait for your look — shame and pride are emerging.",
    detail:"La fierté et la honte sont des « émotions autoconscientes » qui supposent un sens de soi et une représentation du regard d'autrui. Lewis (1992) a montré qu'elles n'apparaissent pas avant 18-24 mois, précisément parce qu'elles nécessitent la conscience de soi (test du miroir). Chercher l'approbation parentale après un exploit est un signe de santé développementale, pas de dépendance.",detail_en:"Pride and shame are 'self-conscious emotions' that require a sense of self and a representation of others' gaze. Lewis (1992) showed they do not appear before 18-24 months precisely because they need self-awareness (mirror test). Seeking parental approval after an achievement is a sign of developmental health, not dependence.",
    refs:["Lewis, M. (1992). Shame: The Exposed Self. Free Press.","Lewis, M. et al. (1989). Self-Development and Self-Conscious Emotions. Child Development."],
    q:"Se retourne-t-il vers toi après un exploit (monter tout seul, faire une construction) pour voir ta réaction ?",q_en:"Do they turn to you after a feat (climbing alone, making a tower) to see your reaction?"},

  {track:"att",m:26,minMonths:22,maxMonths:34,
    t:"Comprend que tu reviens — angoisse de séparation qui s'apaise",t_en:"Understands you return — separation anxiety easing",
    summary:"« Maman part, maman revient » : la permanence de l'adulte aimant est intégrée.",summary_en:"'Mummy leaves, mummy comes back': the permanence of the loving adult is integrated.",
    detail:"Ainsworth a montré que l'attachement sécure se manifeste par une détresse modérée au départ et un retour au jeu rapide au retour. Entre 18 et 30 mois, la plupart des enfants qui avaient une angoisse intense à 12 mois développent une représentation interne de la disponibilité du parent — ce que Bowlby appelait le « modèle opérant interne ». Les séparations courtes avec rituel prévisible y contribuent.",detail_en:"Ainsworth showed that secure attachment manifests as moderate distress at departure and quick return to play on reunion. Between 18 and 30 months, most children who had intense anxiety at 12 months develop an internal representation of parental availability — what Bowlby called the 'internal working model'. Short separations with a predictable ritual help build this.",
    refs:["Bowlby, J. (1969). Attachment and Loss. Basic Books.","Ainsworth, M. D. S. et al. (1978). Patterns of Attachment."],
    q:"S'apaise-t-il assez vite quand tu pars en lui disant que tu reviens, et retrouve-t-il le jeu ?",q_en:"Do they calm fairly quickly when you leave telling them you'll return, and get back to play?"},

  {track:"jeu",m:30,minMonths:26,maxMonths:40,
    t:"Joue avec d'autres enfants (et pas juste à côté)",t_en:"Plays with other children (not just next to them)",
    summary:"L'échange, la négociation, le « on fait comme ça ? » — le jeu associatif émerge.",summary_en:"Exchange, negotiation, 'shall we do this?' — associative play emerges.",
    detail:"Parten (1932) a décrit une séquence de participation sociale au jeu : solitaire → parallèle → associatif → coopératif. Le jeu associatif (échanger des matériaux, suivre les activités des pairs sans règle commune) apparaît vers 2.5-3 ans. Il précède le jeu coopératif (rôles, règles) mais marque un tournant social décisif.",detail_en:"Parten (1932) described a sequence of social participation in play: solitary → parallel → associative → cooperative. Associative play (sharing materials, following peers' activities without common rules) appears around age 2.5-3. It precedes cooperative play (roles, rules) but marks a decisive social turning point.",
    refs:["Parten, M. B. (1932). Social Participation Among Pre-School Children. Journal of Abnormal and Social Psychology.","Howes, C. (1988). Peer Interaction of Young Children. SRCD Monographs."],
    q:"Joue-t-il vraiment avec d'autres enfants — partage des jouets, suit leurs initiatives, propose les siennes ?",q_en:"Do they genuinely play with other children — sharing toys, following their initiatives, proposing their own?"},

  {track:"reg",m:34,minMonths:28,maxMonths:46,
    t:"Attend son tour sans se désorganiser",t_en:"Waits their turn without falling apart",
    summary:"La frustration de l'attente — tenir deux minutes sans crise, c'est de l'inhibition motrice en action.",summary_en:"The frustration of waiting — holding two minutes without a meltdown is motor inhibition in action.",
