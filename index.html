    detail:"Attendre son tour mobilise l'inhibition de la réponse motrice (ne pas prendre le jouet), la mémorisation de la règle et la tolérance à la frustration. Zelazo a montré que ces fonctions exécutives se développent rapidement entre 3 et 5 ans avec la maturation du cortex préfrontal. Les jeux de tour (dé, cartes) sont l'un des meilleurs entraînements naturels.",detail_en:"Waiting for a turn mobilises motor response inhibition (not grabbing the toy), rule memorisation and frustration tolerance. Zelazo showed these executive functions develop rapidly between ages 3 and 5 with prefrontal cortex maturation. Turn-taking games (dice, cards) are one of the best natural training grounds.",
    refs:["Zelazo, P. D. et al. (2003). The Development of Executive Function in Early Childhood. SRCD Monographs.","Diamond, A. (2013). Executive Functions. Annual Review of Psychology."],
    q:"Attend-il son tour dans un jeu simple (rouler un ballon, lancer un dé) sans se jeter sur l'objet ?",q_en:"Do they wait their turn in a simple game (rolling a ball, throwing a die) without grabbing?"},

  {track:"emo",m:38,minMonths:32,maxMonths:50,
    t:"Comprend qu'on peut ressentir deux émotions à la fois",t_en:"Understands that two feelings can coexist",
    summary:"« Je suis content ET un peu triste que tu partes » — la complexité émotionnelle s'ouvre.",summary_en:"'I'm happy AND a little sad you're leaving' — emotional complexity opens up.",
    detail:"La compréhension des émotions mixtes, étudiée par Donaldson & Westerman, émerge vers 4-5 ans. Elle suppose de tenir deux états internes contradictoires en même temps — une capacité liée au développement de la mémoire de travail et de la flexibilité cognitive. C'est une étape clé vers l'empathie complexe et la gestion des situations ambiguës.",detail_en:"The understanding of mixed emotions, studied by Donaldson & Westerman, emerges around age 4-5. It requires holding two contradictory internal states simultaneously — a capacity linked to working memory and cognitive flexibility development. It is a key step toward complex empathy and managing ambiguous situations.",
    refs:["Donaldson, S. K. & Westerman, M. A. (1986). Development of Children's Understanding of Ambivalence. Developmental Psychology.","Harter, S. & Buddin, B. J. (1987). Children's Understanding of the Simultaneity of Two Emotions."],
    q:"Exprime-t-il parfois deux émotions contradictoires (« je suis content mais j'ai un peu peur ») ou les nomme-t-il chez un personnage ?",q_en:"Do they sometimes express two conflicting feelings ('I'm happy but a little scared') or name them in a character?"},

  {track:"jeu",m:44,minMonths:36,maxMonths:56,
    t:"Invente des règles de jeu avec les autres",t_en:"Invents game rules with others",
    summary:"Il propose, négocie, impose — le jeu coopératif avec règles partagées est en place.",summary_en:"They propose, negotiate, impose — cooperative play with shared rules is established.",
    detail:"Piaget distinguait le jeu de règles du jeu symbolique : il implique un accord mutuel et la capacité à subordonner ses impulsions à un cadre collectif. Vers 4-5 ans, les enfants inventent leurs propres règles et les font respecter — parfois avec véhémence. Ce « législateur du jeu » est à la fois un progrès social et un exercice de contrôle exécutif.",detail_en:"Piaget distinguished rule games from symbolic play: they involve mutual agreement and the ability to subordinate impulses to a collective framework. By age 4-5, children invent their own rules and enforce them — sometimes vehemently. This 'playground legislator' is both a social advance and an executive control exercise.",
    refs:["Piaget, J. (1965). The Moral Judgment of the Child. Free Press.","Vygotsky, L. S. (1978). Mind in Society. Harvard University Press."],
    q:"Invente-t-il des règles de jeu avec d'autres enfants et s'assure-t-il qu'elles sont respectées ?",q_en:"Do they invent game rules with other children and ensure they are followed?"},

  {track:"reg",m:50,minMonths:42,maxMonths:62,
    t:"Se calme seul après une contrariété",t_en:"Calms themselves after a setback",
    summary:"Il identifie son état et trouve une stratégie — respirer, s'éloigner, parler de ce qu'il ressent.",summary_en:"They identify their state and find a strategy — breathe, step away, talk about what they feel.",
    detail:"La régulation émotionnelle autonome — sans intervention parentale — se construit progressivement entre 3 et 6 ans. Gross distingue les stratégies de réévaluation cognitive (changer sa lecture d'une situation) des stratégies de suppression (masquer l'émotion). Les premières sont plus saines à long terme. L'enfant qui dit « je suis en colère, je vais respirer » est en train de les apprendre.",detail_en:"Autonomous emotional regulation — without parental intervention — builds gradually between ages 3 and 6. Gross distinguishes cognitive reappraisal strategies (changing one's reading of a situation) from suppression strategies (masking the emotion). The former are healthier long-term. The child who says 'I'm angry, I'll breathe' is learning them.",
    refs:["Gross, J. J. (2015). Emotion Regulation: Current Status and Future Prospects. Psychological Inquiry.","Eisenberg, N. et al. (2010). Relations of Effortful Control and Impulsivity to Children's Adjustment."],
    q:"Réussit-il parfois à se calmer seul après une contrariété, sans que tu aies besoin d'intervenir tout de suite ?",q_en:"Do they sometimes manage to calm down on their own after a setback, without you having to intervene straight away?"},

  {track:"att",m:56,minMonths:46,maxMonths:68,
    t:"Choisit ses amis et parle d'eux",t_en:"Chooses friends and talks about them",
    summary:"Il nomme ses amis, parle d'eux à la maison, préfère certains enfants — l'amitié élective commence.",summary_en:"They name their friends, talk about them at home, prefer certain children — elective friendship begins.",
    detail:"Hartup a montré que les premières amitiés réciproques apparaissent vers 4-5 ans, bien avant l'école. Elles se fondent sur la similitude (goûts, tempérament) et la réciprocité. La capacité à nommer un ami, à s'inquiéter de son absence ou à se souvenir d'une activité partagée reflète l'émergence de la représentation mentale d'autrui comme individu distinct.",detail_en:"Hartup showed that first reciprocal friendships appear around age 4-5, well before school. They are based on similarity (tastes, temperament) and reciprocity. The ability to name a friend, worry about their absence or recall a shared activity reflects the emergence of mental representation of others as distinct individuals.",
    refs:["Hartup, W. W. (1983). Peer Relations. In Handbook of Child Psychology. Wiley.","Howes, C. (1996). The Earliest Friendships. In The Company They Keep, Cambridge."],
    q:"Nomme-t-il un ou deux amis, parle-t-il d'eux spontanément à la maison ?",q_en:"Do they name one or two friends and spontaneously talk about them at home?"}
];
const ACT_OBS=[
  {"track":"sens",m:2,minMonths:0,maxMonths:4,t:"Mobile noir et blanc DIY",t_en:"DIY black-and-white mobile",summary:"Les forts contrastes captivent le regard de votre nouveau-né et stimulent son cortex visuel.",summary_en:"Strong contrasts captivate your newborn's gaze and stimulate their visual cortex.",detail:"Le système visuel du nouveau-né distingue surtout les contrastes forts dans un rayon de 20-30 cm. Fantz (1961) a montré que les bébés regardent préférentiellement les patterns complexes aux couleurs unies dès la naissance. Découpez des formes géométriques en papier noir et blanc et suspendez-les : c'est l'un des rares jouets pour lesquels la complexité du motif a un impact démontré sur l'attention visuelle précoce.",detail_en:"The newborn's visual system primarily distinguishes strong contrasts within a 20–30 cm range. Fantz (1961) showed babies look preferentially at complex patterns over plain colours from birth. Cut out black-and-white geometric shapes and hang them: it's one of the few toys for which pattern complexity has a demonstrated impact on early visual attention.",refs:["Fantz, R. L. (1961). The origin of form perception. Scientific American.","Kellman, P. J. & Arterberry, M. E. (1998). The Cradle of Knowledge. MIT Press."],q:"Avez-vous accroché un mobile contrasté (noir et blanc, formes géométriques) dans son champ de vision ?",q_en:"Have you hung a high-contrast mobile (black and white, geometric shapes) within their field of vision?"},

  {"track":"sens",m:3,minMonths:2,maxMonths:6,t:"Jeu de grimaces au miroir",t_en:"Mirror face game",summary:"Faire des mimiques ensemble devant le miroir — un jeu délicieux qui stimule la cognition sociale.",summary_en:"Making faces together in the mirror — a delightful game that stimulates social cognition.",detail:"Meltzoff & Moore (1977) ont montré que les nouveau-nés imitent les expressions faciales. Placez-vous tous les deux devant un miroir et faites des grimaces exagérées. Votre bébé observe puis tente l'imitation. Ce jeu active les circuits de reconnaissance des visages et de l'imitation sociale — et vous fait souvent rire tous les deux.",detail_en:"Meltzoff & Moore (1977) showed newborns imitate facial expressions. Position yourselves in front of a mirror and make exaggerated faces. Your baby observes then attempts imitation. This game activates face-recognition and social imitation circuits — and often makes you both laugh.",refs:["Meltzoff, A. N. & Moore, M. K. (1977). Imitation of facial gestures by neonates. Science.","Field, T. M. et al. (1982). Imitation of facial expressions by neonates. Science."],q:"Avez-vous joué à vous faire des grimaces face à face ou devant un miroir ?",q_en:"Have you played at making faces at each other, face-to-face or in a mirror?"},

  {"track":"sens",m:5,minMonths:3,maxMonths:8,t:"Coucou-caché",t_en:"Peek-a-boo",summary:"Ce jeu universel enseigne la permanence de l'objet et déclenche un fou-rire garanti.",summary_en:"This universal game teaches object permanence and guarantees giggles.",detail:"En couvrant puis découvrant votre visage, vous démontrez la permanence de l'objet. Piaget (1954) a décrit comment cette compréhension se construit progressivement entre 4 et 12 mois. L'anticipation avant le 'coucou' provoque une montée de dopamine qui explique l'hilarité. Ce jeu développe aussi la mémoire de travail.",detail_en:"By covering then uncovering your face, you demonstrate object permanence. Piaget (1954) described how this understanding builds progressively between 4 and 12 months. Anticipation before 'peek-a-boo' causes a dopamine surge that explains the hilarity. This game also develops working memory.",refs:["Piaget, J. (1954). The Construction of Reality in the Child.","Baillargeon, R. (1987). Object permanence in 3.5–4.5-month-old infants. Developmental Psychology."],q:"Avez-vous joué à coucou-caché — cacher votre visage puis réapparaître — régulièrement ?",q_en:"Have you played peek-a-boo — hiding your face then reappearing — regularly?"},

  {"track":"sens",m:7,minMonths:5,maxMonths:12,t:"Bain sensoriel enrichi",t_en:"Enriched sensory bath",summary:"Transformer le bain en espace de jeu sensoriel — une mine d'or pour le développement.",summary_en:"Turning bath time into a sensory playground — a goldmine for development.",detail:"Ajoutez au bain des gobelets, un entonnoir, une petite passoire. Gopnik et al. (1999) décrivent ces explorations comme des 'expériences scientifiques' : compréhension cause-effet, proprioception, physique intuitive. La résistance de l'eau développe aussi la force et la coordination.",detail_en:"Add cups, a funnel, a small strainer to the bath. Gopnik et al. (1999) describe these explorations as 'scientific experiments': cause-and-effect understanding, proprioception, intuitive physics. Water resistance also develops strength and coordination.",refs:["Gopnik, A. et al. (1999). The Scientist in the Crib.","Piaget, J. (1952). The Origins of Intelligence in Children."],q:"Avez-vous enrichi le bain avec des récipients, entonnoirs ou jouets à verser ?",q_en:"Have you enriched bath time with cups, funnels, or pouring toys?"},

  {"track":"cogn",m:10,minMonths:7,maxMonths:16,t:"Remplir et vider des contenants",t_en:"Filling and emptying containers",summary:"Un seau, quelques objets — des heures de concentration et les bases de la physique intuitive.",summary_en:"A bucket, a few objects — hours of focus and the foundations of intuitive physics.",detail:"Donner à votre enfant différents contenants et des objets à y mettre génère une exploration spontanée intense. Gibson (1988) a montré que ce jeu exploratoire auto-dirigé développe la compréhension des affordances — ce qu'un objet permet de faire. La répétition n'est pas de l'ennui : c'est le mécanisme de la consolidation.",detail_en:"Giving your child different containers and objects to put inside generates intense spontaneous exploration. Gibson (1988) showed this self-directed exploratory play develops understanding of affordances — what an object allows you to do. Repetition isn't boredom: it's the consolidation mechanism.",refs:["Gibson, E. J. (1988). Exploratory behavior in development. Annual Review of Psychology.","Libertus, K. & Needham, A. (2011). Teach to reach. Vision Research."],q:"Avez-vous proposé des boîtes, seaux et petits objets à mettre dedans — à la maison ou dans un bac de jeu ?",q_en:"Have you offered boxes, buckets, and small objects to put inside — at home or in a play bin?"},

  {"track":"cogn",m:12,minMonths:8,maxMonths:20,t:"Lecture interactive quotidienne",t_en:"Daily interactive reading",summary:"Lire ensemble chaque jour est l'habitude parentale avec le plus d'impact sur le vocabulaire.",summary_en:"Reading together every day is the parenting habit with the greatest vocabulary impact.",detail:"Bus et al. (1995) ont calculé que la lecture partagée quotidienne est le prédicteur le plus puissant du vocabulaire à 5 ans. La clé n'est pas de lire le texte mais d'interagir : pointer les images, les nommer, imiter les sons. Whitehurst et al. (1988) appellent ça la 'lecture dialogique' — deux fois plus efficace pour le vocabulaire que la lecture passive.",detail_en:"Bus et al. (1995) calculated that daily shared reading is the most powerful predictor of vocabulary at age 5. The key isn't reading the text but interacting: pointing at pictures, naming them, imitating sounds. Whitehurst et al. (1988) call this 'dialogic reading' — twice as effective for vocabulary as passive reading.",refs:["Bus, A. G. et al. (1995). Joint book reading makes for success. Review of Educational Research.","Whitehurst, G. J. et al. (1988). Accelerating language development. Developmental Psychology."],q:"Lisez-vous des livres ensemble régulièrement — en pointant les images et en interagissant, pas juste en lisant le texte ?",q_en:"Do you read books together regularly — pointing at pictures and interacting, not just reading the text?"},

  {"track":"phys",m:15,minMonths:12,maxMonths:24,t:"Danser et bouger sur de la musique",t_en:"Dancing and moving to music",summary:"Musique et danse ensemble développent le rythme, la coordination et le lien affectif.",summary_en:"Music and dancing together develop rhythm, coordination, and the affective bond.",detail:"Anvari et al. (2002) ont montré un lien fort entre les compétences musicales précoces et le développement du langage — les deux mobilisent les mêmes circuits de traitement temporel. Pas besoin de compétences : taper dans les mains, faire des rondes, bouger ensemble — l'important est le partage de l'expérience rythmique.",detail_en:"Anvari et al. (2002) showed a strong link between early musical skills and language development — both mobilise the same temporal processing circuits. No skills needed: clapping, circle games, moving together — what matters is sharing the rhythmic experience.",refs:["Anvari, S. H. et al. (2002). Relations among musical skills and early reading ability. JECP.","Trainor, L. J. (2005). Are there critical periods for musical development? Developmental Psychobiology."],q:"Dansez-vous ou faites-vous de la musique ensemble — chanter, taper dans les mains, bouger sur une chanson ?",q_en:"Do you dance or make music together — singing, clapping, moving to a song?"},

  {"track":"creat",m:17,minMonths:14,maxMonths:26,t:"Peinture aux doigts",t_en:"Finger painting",summary:"Se salir avec de la peinture n'est pas du désordre — c'est de la science et de l'art combinés.",summary_en:"Getting messy with paint isn't disorder — it's science and art combined.",detail:"La peinture aux doigts développe la motricité fine, la coordination œil-main, la créativité et la tolérance sensorielle. Malchiodi (1998) décrit les premières traces intentionnelles comme des 'explorations de l'impact' : l'enfant découvre qu'il peut marquer le monde — le début de l'expression graphique.",detail_en:"Finger painting develops fine motor skills, hand-eye coordination, creativity, and sensory tolerance. Malchiodi (1998) describes the first intentional marks as 'impact explorations': the child discovers they can mark the world — the beginning of graphic expression.",refs:["Kellogg, R. (1969). Analyzing Children's Art.","Malchiodi, C. A. (1998). Understanding Children's Drawings. Guilford."],q:"Avez-vous fait de la peinture aux doigts ensemble — avec des peintures non toxiques et lavables ?",q_en:"Have you done finger painting together — with non-toxic, washable paints?"},

  {"track":"phys",m:19,minMonths:15,maxMonths:28,t:"Parcours moteur maison",t_en:"Indoor motor course",summary:"Coussins à escalader, tunnel à traverser — un terrain de jeu maison qui développe l'audace motrice.",summary_en:"Cushions to climb, tunnels to crawl — a homemade playground developing motor boldness.",detail:"Adolph et al. (2012) ont montré que les enfants qui explorent des environnements variés (surfaces irrégulières, hauteurs) développent un meilleur contrôle moteur que ceux qui évoluent dans des espaces uniformes. Empilez des coussins, retournez la pouf, improvisez un tunnel : l'enfant grimpe, saute, se faufile spontanément.",detail_en:"Adolph et al. (2012) showed children who explore varied environments (irregular surfaces, heights) develop better motor control than those in uniform spaces. Pile up cushions, flip the beanbag, improvise a tunnel: the child spontaneously climbs, jumps, squeezes through.",refs:["Adolph, K. E. et al. (2012). How do you learn to walk? Psychological Science.","Fjørtoft, I. (2001). The natural environment as a playground. Early Childhood Education Journal."],q:"Avez-vous créé un parcours moteur à la maison avec des coussins, une pouf ou un tunnel de fortune ?",q_en:"Have you created a motor course at home with cushions, a beanbag, or an improvised tunnel?"},

  {"track":"creat",m:21,minMonths:17,maxMonths:30,t:"Pâte à modeler maison",t_en:"Homemade play dough",summary:"Pétrir, rouler, façonner — motricité fine et régulation du système nerveux.",summary_en:"Kneading, rolling, shaping — fine motor skills and nervous system regulation.",detail:"Recette simple : 2 tasses de farine, 1 tasse de sel, eau progressivement, colorant alimentaire. La manipulation régulière de matières malléables développe la motricité fine et a un effet régulateur sur le système nerveux — pétrir est universellement trouvé apaisant via la stimulation proprioceptive intense.",detail_en:"Simple recipe: 2 cups of flour, 1 cup of salt, water gradually, food colouring. Regular manipulation of malleable materials develops fine motor skills and has a regulatory effect on the nervous system — kneading is universally found soothing via intense proprioceptive stimulation.",refs:["Sheridan, M. D. (1977). Spontaneous Play in Early Childhood.","Exner, C. E. (2010). Development of hand skills. In Occupational Therapy for Children."],q:"Avez-vous joué avec de la pâte à modeler ensemble — maison ou du commerce ?",q_en:"Have you played with play dough together — homemade or store-bought?"},

  {"track":"cogn",m:22,minMonths:17,maxMonths:32,t:"Trier formes et couleurs",t_en:"Sorting shapes and colours",summary:"Classer, trier, apparier — les premières opérations logico-mathématiques.",summary_en:"Classifying, sorting, matching — the first logico-mathematical operations.",detail:"Le tri et le classement sont les premières opérations logico-mathématiques décrites par Piaget (1952). Vers 18-24 mois, les enfants commencent à trier spontanément. Proposer des jouets de tri simples nourrit ce besoin naturel de catégoriser — c'est de la pensée mathématique à l'état pur, avant même les chiffres.",detail_en:"Sorting and classifying are the first logico-mathematical operations described by Piaget (1952). Around 18–24 months, children begin sorting spontaneously. Offering simple sorting toys feeds this natural need to categorise — it's pure mathematical thinking, even before numbers.",refs:["Piaget, J. (1952). The Origins of Intelligence in Children.","Gopnik, A. et al. (1999). The Scientist in the Crib."],q:"Avez-vous joué à trier des objets par couleur ou forme — cubes, bagues, ou objets du quotidien ?",q_en:"Have you played at sorting objects by colour or shape — blocks, rings, or everyday objects?"},

  {"track":"creat",m:24,minMonths:20,maxMonths:36,t:"Cuisiner une recette simple",t_en:"Cooking a simple recipe",summary:"Mélanger, verser, goûter — maths, science, langage et autonomie en une seule activité.",summary_en:"Mixing, pouring, tasting — maths, science, language, and autonomy in one activity.",detail:"Faire participer votre enfant à la cuisine développe la mesure et les quantités (proto-mathématiques), la compréhension des transformations, le vocabulaire spécifique et l'autonomie. Des études montrent que les enfants mangent plus volontiers les aliments qu'ils ont préparés.",detail_en:"Involving your child in cooking develops measurement and quantities (proto-mathematics), understanding of transformations, specific vocabulary, and autonomy. Studies show children eat more willingly the foods they have prepared.",refs:["Montessori, M. (1912). The Montessori Method.","Savage, J. S. et al. (2007). Parental influence on eating behavior. Journal of Law, Medicine & Ethics."],q:"Avez-vous cuisiné ensemble une recette simple — biscuits, salade, soupe — en laissant votre enfant participer vraiment ?",q_en:"Have you cooked a simple recipe together — biscuits, salad, soup — letting your child truly participate?"},

  {"track":"creat",m:27,minMonths:22,maxMonths:40,t:"Marionnettes et histoires inventées",t_en:"Puppets and made-up stories",summary:"Inventer une histoire avec des marionnettes — imagination, langage et théorie de l'esprit combinées.",summary_en:"Inventing a story with puppets — imagination, language, and theory of mind combined.",detail:"Le jeu de marionnettes force l'enfant à prendre le point de vue d'un personnage (théorie de l'esprit naissante) et à construire une narration. Singer & Singer (2005) ont montré que les enfants qui jouent régulièrement à des jeux d'imagination ont un vocabulaire plus riche et une meilleure régulation émotionnelle.",detail_en:"Puppet play forces the child to take a character's perspective (nascent theory of mind) and build a narrative. Singer & Singer (2005) showed children who regularly engage in imaginative play have richer vocabulary and better emotional regulation.",refs:["Singer, D. G. & Singer, J. L. (2005). Imagination and Play in the Electronic Age.","Vygotsky, L. S. (1978). Mind in Society."],q:"Avez-vous joué avec des marionnettes ou inventé des histoires ensemble — même très simples ?",q_en:"Have you played with puppets or made up stories together — even very simple ones?"},

  {"track":"cogn",m:30,minMonths:24,maxMonths:44,t:"Construction libre avec des blocs",t_en:"Free building with blocks",summary:"Construire et renverser des tours développe la pensée spatiale et la résilience.",summary_en:"Building and knocking down towers develops spatial thinking and resilience.",detail:"Casey et al. (2008) ont montré que le jeu avec des blocs en maternelle prédit les performances en mathématiques spatiales au lycée. Proposer des défis ouverts développe la planification et la géométrie intuitive. Laissez-le construire sans intervenir — même si la tour s'effondre.",detail_en:"Casey et al. (2008) showed block play in nursery school predicts spatial maths performance in high school. Offering open challenges develops planning and intuitive geometry. Let them build without intervening — even if the tower falls.",refs:["Casey, B. M. et al. (2008). Spatial skills through interventions. Developmental Psychology.","Resnick, L. B. (1989). Developing mathematical knowledge."],q:"Jouez-vous à construire librement avec des blocs en bois, des Lego Duplo ou des boîtes ?",q_en:"Do you play at free building with wooden blocks, Lego Duplo, or boxes?"},

  {"track":"sens",m:33,minMonths:27,maxMonths:48,t:"Jeux d'eau et de sable",t_en:"Water and sand play",summary:"L'eau et le sable — les matières les plus riches pour l'exploration sensorielle et la physique intuitive.",summary_en:"Water and sand — the richest materials for sensory exploration and intuitive physics.",detail:"Remplir, vider, filtrer, faire des empreintes — l'eau et le sable génèrent des centaines d'expériences auto-dirigées. Hughes (2003) décrit ce type de jeu comme fondamental pour les concepts scientifiques : densité, volume, viscosité. Le jeu dans l'eau et le sable a aussi des effets régulateurs démontrés sur l'anxiété.",detail_en:"Filling, emptying, filtering, making prints — water and sand generate hundreds of self-directed experiences. Hughes (2003) describes this type of play as fundamental for scientific concepts: density, volume, viscosity. Water and sand play also has demonstrated regulatory effects on anxiety.",refs:["Hughes, B. (2003). A Playworker's Taxonomy of Play Types.","Bjorklund, D. F. (2012). Children's Thinking."],q:"Avez-vous joué ensemble avec de l'eau ou du sable — plage, bac à sable, bac d'eau à la maison ?",q_en:"Have you played together with water or sand — beach, sandbox, water tray at home?"},

  {"track":"cogn",m:37,minMonths:30,maxMonths:52,t:"Chasse au trésor avec indices",t_en:"Treasure hunt with clues",summary:"Chercher un trésor caché avec des indices développe la mémoire, la logique et le plaisir de découvrir.",summary_en:"Searching for hidden treasure with clues develops memory, logic, and the joy of discovery.",detail:"Une chasse au trésor simple (3-4 indices) développe la mémoire de travail, le raisonnement déductif et l'orientation spatiale. Diamond (2013) montre que ces fonctions exécutives développées entre 3 et 6 ans prédisent mieux la réussite scolaire que le QI.",detail_en:"A simple treasure hunt (3–4 clues) develops working memory, deductive reasoning, and spatial orientation. Diamond (2013) shows these executive functions developed between ages 3 and 6 predict academic success better than IQ.",refs:["Diamond, A. (2013). Executive functions. Annual Review of Psychology.","Bjorklund, D. F. (2012). Children's Thinking."],q:"Avez-vous organisé une chasse au trésor avec de vrais indices — même très simple avec 2-3 étapes ?",q_en:"Have you organised a treasure hunt with real clues — even a simple one with 2–3 steps?"},

  {"track":"phys",m:42,minMonths:36,maxMonths:56,t:"Jardinage en pot",t_en:"Pot gardening",summary:"Planter, arroser, observer — la responsabilité d'une plante enseigne la patience et la biologie.",summary_en:"Planting, watering, observing — the responsibility of a plant teaches patience and biology.",detail:"Plantez ensemble une graine rapide (haricot, cresson) dans un pot transparent : l'enfant voit les racines se développer. Wells (2000) a montré que les enfants en contact régulier avec les plantes ont de meilleures capacités attentionnelles. Louv (2005) nomme 'déficit nature' l'absence de ce contact.",detail_en:"Plant a quick-growing seed (bean, cress) together in a transparent pot: the child sees the roots develop. Wells (2000) showed children in regular contact with plants have better attentional capacities. Louv (2005) names 'nature deficit disorder' the absence of this contact.",refs:["Louv, R. (2005). Last Child in the Woods.","Wells, N. M. (2000). At home with nature. Environment and Behavior."],q:"Avez-vous planté quelque chose ensemble et suivi sa croissance régulièrement ?",q_en:"Have you planted something together and followed its growth regularly?"},

  {"track":"creat",m:48,minMonths:40,maxMonths:62,t:"Dessin et collage libres",t_en:"Free drawing and collage",summary:"Dessiner et coller librement — l'expression artistique révèle le développement cognitif.",summary_en:"Free drawing and collaging — artistic expression reveals cognitive development.",detail:"Kellogg (1969) a identifié une séquence universelle dans le dessin d'enfant : gribouillages → formes de base → combinaisons → représentations reconnaissables. Chaque étape reflète une avancée de la planification motrice et de la représentation spatiale. Laisser l'enfant dessiner sans modèle imposé est fondamental.",detail_en:"Kellogg (1969) identified a universal sequence in children's drawing: scribbles → basic shapes → combinations → recognisable representations. Each stage reflects an advance in motor planning and spatial representation. Letting children draw without an imposed model is fundamental.",refs:["Kellogg, R. (1969). Analyzing Children's Art.","Winner, E. (1982). Invented Worlds: The Psychology of the Arts."],q:"Proposez-vous régulièrement des séances de dessin et collage libres — sans sujet imposé, juste du matériel et du temps ?",q_en:"Do you regularly offer free drawing and collage sessions — no imposed subject, just materials and time?"},

  {"track":"cogn",m:54,minMonths:46,maxMonths:68,t:"Jeux de société simples",t_en:"Simple board games",summary:"Attendre son tour, accepter de perdre, suivre des règles — un entraînement aux fonctions exécutives.",summary_en:"Waiting your turn, accepting defeat, following rules — training executive functions.",detail:"Des jeux simples comme Memory, Uno junior ou Dobble développent : l'attention, la mémoire de travail, l'inhibition et la gestion de la frustration. Diamond & Lee (2011) ont montré que les fonctions exécutives entraînées par les jeux de règle prédisent mieux la réussite scolaire que le QI à 5 ans.",detail_en:"Simple games like Memory, Junior Uno or Dobble develop: attention, working memory, inhibition, and frustration management. Diamond & Lee (2011) showed executive functions trained by rule-based games predict academic success better than IQ at age 5.",refs:["Diamond, A. & Lee, K. (2011). Interventions to aid executive function. Science.","Lillard, A. S. et al. (2013). The impact of pretend play. Psychological Bulletin."],q:"Avez-vous joué ensemble à un jeu de société simple avec des règles — Memory, Uno junior, Dobble ou similaire ?",q_en:"Have you played together at a simple board game with rules — Memory, Junior Uno, Dobble or similar?"},

  {"track":"creat",m:60,minMonths:50,maxMonths:72,t:"Cuisine créative",t_en:"Creative cooking",summary:"Décorer des biscuits, faire de la limonade — la cuisine créative combine science, maths et créativité.",summary_en:"Decorating biscuits, making lemonade — creative cooking combines science, maths, and creativity.",detail:"À 5 ans, les recettes plus complexes permettent d'aborder des concepts élaborés : fractions, transformations irréversibles, proportions et goût. Montessori (1912) voyait dans ces activités de vie pratique la fondation de l'autonomie intellectuelle. L'enfant qui cuisine régulièrement développe une confiance en ses capacités.",detail_en:"At age 5, more complex recipes allow tackling elaborate concepts: fractions, irreversible transformations, proportions and taste. Montessori (1912) saw in these practical life activities the foundation of intellectual autonomy. The child who cooks regularly develops confidence in their abilities.",refs:["Montessori, M. (1912). The Montessori Method.","Gopnik, A. (2016). The Gardener and the Carpenter. FSG."],q:"Avez-vous cuisiné quelque chose de plus créatif ensemble — décorer des biscuits, faire une limonade, préparer un dessert ?",q_en:"Have you cooked something more creative together — decorating biscuits, making lemonade, preparing a dessert?"},

  {track:"sens",m:26,minMonths:22,maxMonths:38,
    t:"Exploration de textures naturelles",t_en:"Natural texture exploration",
    summary:"Mousse, écorce, terre, herbe : laisser les mains et les pieds rencontrer la nature.",summary_en:"Moss, bark, earth, grass: letting hands and feet meet nature.",
    detail:"L'exploration sensorielle en plein air active des récepteurs tactiles rarement sollicités dans un environnement domestique. Sensory Processing Research (Dunn, 1999) suggère que la variété sensorielle précoce contribue à un système de traitement sensoriel plus robuste. Les enfants qui jouent régulièrement dans des espaces naturels montrent aussi de meilleures capacités d'attention.",detail_en:"Outdoor sensory exploration activates tactile receptors rarely stimulated in a home environment. Sensory Processing Research (Dunn, 1999) suggests early sensory variety contributes to a more robust sensory processing system. Children who regularly play in natural spaces also show better attention capacities.",
    refs:["Dunn, W. (1999). The Sensory Profile. Psychological Corporation.","Kuo, F. E. & Taylor, A. F. (2004). A Potential Natural Treatment for ADHD. American Journal of Public Health."],
    q:"A-t-il exploré des textures naturelles (mousse, sable, terre, feuilles, eau) avec les mains ou les pieds ?",q_en:"Have they explored natural textures (moss, sand, earth, leaves, water) with hands or feet?"},

  {track:"phys",m:28,minMonths:24,maxMonths:40,
    t:"Escalade et grimpe en sécurité",t_en:"Climbs safely",
    summary:"Structure de jeu, arbre bas, rocher : grimper développe la force, la confiance et l'évaluation du risque.",summary_en:"Play structure, low tree, rock: climbing builds strength, confidence and risk assessment.",
    detail:"L'escalade active les muscles profonds du tronc, améliore la proprioception et développe la confiance en ses capacités physiques. Des études nordiques montrent que les enfants avec accès régulier à des espaces de jeu « risqués » (mais supervisés) développent de meilleures capacités d'évaluation du danger et moins de comportements anxieux.",detail_en:"Climbing activates deep trunk muscles, improves proprioception and develops confidence in physical abilities. Nordic studies show that children with regular access to 'risky' (but supervised) play spaces develop better danger assessment abilities and fewer anxious behaviours.",
    refs:["Sandseter, E. B. H. (2009). Risky Play. Journal of Adventure Education and Outdoor Learning.","Brussoni, M. et al. (2015). What is the Relationship Between Risky Outdoor Play and Health in Children?"],
    q:"A-t-il la possibilité de grimper sur des structures adaptées, des rochers bas ou un arbre avec supervision ?",q_en:"Do they get to climb on appropriate structures, low rocks or a tree with supervision?"},

  {track:"creat",m:32,minMonths:27,maxMonths:44,
    t:"Collage thématique",t_en:"Themed collage",
    summary:"Choisir, découper (ou déchirer), coller selon un thème — planification et esthétique naissantes.",summary_en:"Choosing, cutting (or tearing), gluing according to a theme — nascent planning and aesthetics.",
    detail:"Le collage mobilise la motricité fine (découper, manipuler les petits morceaux) mais aussi la planification (choisir ce qui va ensemble) et l'esthétique naissante. Eisner a montré que les activités d'art visuel structuré développent la pensée spatiale et la capacité à résoudre des problèmes ouverts — compétences qui transfèrent vers les sciences et les mathématiques.",detail_en:"Collage mobilises fine motor skills (cutting, handling small pieces) but also planning (choosing what goes together) and nascent aesthetics. Eisner showed that structured visual art activities develop spatial thinking and the ability to solve open problems — skills that transfer to science and mathematics.",
    refs:["Eisner, E. W. (2002). The Arts and the Creation of Mind. Yale University Press."],
    q:"A-t-il fait un collage en choisissant et arrangeant des éléments selon une intention (animaux, couleurs, famille…) ?",q_en:"Have they made a collage choosing and arranging elements with an intention (animals, colours, family…)?"},

  {track:"cogn",m:36,minMonths:30,maxMonths:48,
    t:"Jeux de tri et classement",t_en:"Sorting and classifying games",
    summary:"Trier par couleur puis par forme puis par taille — les catégories se hiérarchisent.",summary_en:"Sorting by colour then by shape then by size — categories become hierarchical.",
    detail:"Classer des objets selon plusieurs critères successifs mobilise la flexibilité cognitive et la pensée logique. Inhelder & Piaget ont décrit la maîtrise de la classification multiple vers 5-7 ans. Des jeux simples (cartes, objets du quotidien) permettent de l'observer et de l'entraîner naturellement. C'est un précurseur direct des mathématiques ensemblistes.",detail_en:"Sorting objects by several successive criteria mobilises cognitive flexibility and logical thinking. Inhelder & Piaget described mastery of multiple classification around age 5-7. Simple games (cards, everyday objects) allow it to be observed and practised naturally. It is a direct precursor of set mathematics.",
    refs:["Inhelder, B. & Piaget, J. (1964). The Early Growth of Logic in the Child. Harper & Row."],
    q:"A-t-il joué à trier des objets selon deux critères différents (d'abord la couleur, puis la forme par exemple) ?",q_en:"Have they played at sorting objects by two different criteria (first colour, then shape for example)?"},

  {track:"phys",m:40,minMonths:34,maxMonths:52,
    t:"Parcours de yoga ou d'éveil corporel",t_en:"Yoga or body awareness circuit",
    summary:"Poser l'arbre, imiter l'animal, respirer ensemble — conscience du corps par le jeu.",summary_en:"Tree pose, animal imitation, breathing together — body awareness through play.",
    detail:"Le yoga enfant combine conscience corporelle, régulation respiratoire et vocabulaire émotionnel (imiter un ours en colère vs une tortue calme). Des études montrent qu'une pratique courte régulière améliore l'attention, réduit les comportements impulsifs et augmente la conscience intéroceptive — la capacité à percevoir ses propres états internes.",detail_en:"Children's yoga combines body awareness, breathing regulation and emotional vocabulary (imitating an angry bear vs a calm tortoise). Studies show that regular short practice improves attention, reduces impulsive behaviours and increases interoceptive awareness — the ability to perceive one's own internal states.",
    refs:["Butzer, B. et al. (2016). Yoga in School Settings. Advances in School Mental Health Promotion.","Khalsa, S. B. S. et al. (2012). Yoga Reduces Performance Anxiety in Adolescents."],
    q:"A-t-il essayé quelques postures de yoga simples ou un jeu de mime d'animaux en mouvement (ours, serpent, oiseau) ?",q_en:"Have they tried a few simple yoga poses or an animal movement mime game (bear, snake, bird)?"},

  {track:"creat",m:44,minMonths:38,maxMonths:56,
    t:"Théâtre de marionnettes improvisé",t_en:"Improvised puppet theatre",
    summary:"Fabriquer, mettre en scène, donner une voix — le récit devient spectacle.",summary_en:"Make, stage, give a voice — storytelling becomes performance.",
    detail:"Fabriquer et faire jouer des marionnettes intègre création (fabrication), narration (écriture du « scénario »), expression orale et théorie de l'esprit (donner une intention à chaque personnage). Singer & Singer ont montré que le jeu de rôle et de marionnettes à cet âge prédisent la créativité, le langage narratif et les compétences sociales à l'école primaire.",detail_en:"Making and playing with puppets integrates creation (making), narration (scripting), oral expression and theory of mind (giving each character an intention). Singer & Singer showed that role and puppet play at this age predicts creativity, narrative language and social skills in primary school.",
    refs:["Singer, J. L. & Singer, D. G. (1990). The House of Make-Believe. Harvard University Press."],
    q:"A-t-il fabriqué ou utilisé des marionnettes pour inventer une histoire ou un petit spectacle ?",q_en:"Have they made or used puppets to invent a story or a little show?"},

  {track:"cogn",m:50,minMonths:42,maxMonths:62,
    t:"Jeux de mémoire et de logique (memory, dominos)",t_en:"Memory and logic games (memory, dominoes)",
    summary:"Retourner les paires, associer les points — concentration, mémoire visuelle, règle partagée.",summary_en:"Flipping pairs, matching dots — concentration, visual memory, shared rule.",
    detail:"Les jeux de memory mobilisent la mémoire à court terme et l'inhibition (ne pas retourner la mauvaise carte). Les dominos introduisent la correspondance numérique et la planification à deux pas. Diamond a montré que les jeux avec règles simples et contrainte de mémoire sont parmi les entraînements les plus efficaces des fonctions exécutives chez l'enfant de 4-6 ans.",detail_en:"Memory games mobilise short-term memory and inhibition (not flipping the wrong card). Dominoes introduce numerical correspondence and two-step planning. Diamond showed that games with simple rules and memory demands are among the most effective executive function training for children aged 4-6.",
    refs:["Diamond, A. (2013). Executive Functions. Annual Review of Psychology.","Bierman, K. L. et al. (2008). Promoting Academic and Social-Emotional School Readiness."],
    q:"A-t-il joué à un jeu de memory ou de dominos en respectant les règles jusqu'au bout ?",q_en:"Have they played a memory or dominoes game following the rules through to the end?"},

  {track:"sens",m:56,minMonths:46,maxMonths:68,
    t:"Cuisine sensorielle : pétrir, malaxer, goûter",t_en:"Sensory cooking: kneading, mixing, tasting",
    summary:"Pain, pâte à cookies, smoothie : le corps et les sens travaillent au service du résultat.",summary_en:"Bread, cookie dough, smoothie: body and senses work toward an outcome.",
    detail:"La cuisine engage simultanément tous les sens, la motricité fine (pétrir, verser), la patience, et une compréhension intuitive des transformations (farine + eau = pâte). Montessori valorisait les activités de « vie pratique » précisément pour ça : l'enfant voit un résultat concret de son action, ce qui renforce la persévérance et le sentiment d'efficacité personnelle.",detail_en:"Cooking simultaneously engages all senses, fine motor skills (kneading, pouring), patience, and an intuitive understanding of transformations (flour + water = dough). Montessori valued 'practical life' activities precisely for this: the child sees a concrete result of their action, strengthening perseverance and self-efficacy.",
    refs:["Montessori, M. (1912/1964). The Montessori Method. Schocken Books.","Bandura, A. (1997). Self-Efficacy: The Exercise of Control. Freeman."],
    q:"A-t-il participé à une recette en malaxant, mélangeant ou versant des ingrédients de façon active ?",q_en:"Have they participated in a recipe by kneading, mixing or pouring ingredients actively?"},

  {track:"creat",m:60,minMonths:50,maxMonths:72,
    t:"Carnet de dessin libre : projet personnel",t_en:"Free drawing journal: personal project",
    summary:"Un carnet rien qu'à lui, qu'il remplit à son rythme — l'intention artistique s'autonomise.",summary_en:"A notebook just for them, filled at their own pace — artistic intention becomes autonomous.",
    detail:"Tenir un carnet de dessin personnel développe l'initiative, la continuité d'un projet dans le temps et l'identité créative. Csikszentmihalyi a décrit l'état de « flow » — absorption totale dans une activité créative — comme particulièrement fréquent chez les enfants qui ont un espace de création non évalué. Ce carnet est cet espace.",detail_en:"Keeping a personal drawing journal develops initiative, project continuity over time and creative identity. Csikszentmihalyi described the 'flow' state — total absorption in a creative activity — as particularly frequent in children who have an unevaluated creative space. This journal is that space.",
    refs:["Csikszentmihalyi, M. (1990). Flow: The Psychology of Optimal Experience. Harper & Row.","Runco, M. A. (2007). Creativity: Theories and Themes. Elsevier."],
    q:"A-t-il un carnet ou espace de dessin qu'il utilise de sa propre initiative, sans qu'on lui demande ?",q_en:"Do they have a drawing notebook or creative space they use on their own initiative, without being asked?"}

// Échelle d'une piste donnée, triée par âge typique
function getTrackLadder(sid,trackKey){return getLadder(sid).filter(x=>(x.e.track||'')===trackKey).sort((a,b)=>a.e.m-b.e.m);}
function confirmEarlier(child,sid,upto){
  let all;try{all=JSON.parse(localStorage.getItem('bebeMilestones')||'{}');}catch(_){all={};}
  const k=milestoneKey(child);const m=all[k]||{};
  getLadder(sid).forEach(x=>{if(x.i<upto&&m[x.mid]?.status!=='done')m[x.mid]={status:'done',lastSeen:Date.now(),firstDone:null};});
  all[k]=m;localStorage.setItem('bebeMilestones',JSON.stringify(all));
}
// Marque "acquis" toutes les étapes d'une piste situées avant uptoMid (par âge)
function confirmEarlierTrack(child,sid,trackKey,uptoMid){
  let all;try{all=JSON.parse(localStorage.getItem('bebeMilestones')||'{}');}catch(_){all={};}
  const k=milestoneKey(child);const m=all[k]||{};
  const lad=getTrackLadder(sid,trackKey);const pos=lad.findIndex(x=>x.mid===uptoMid);
  lad.forEach((x,i)=>{if(i<pos&&m[x.mid]?.status!=='done')m[x.mid]={status:'done',lastSeen:Date.now(),firstDone:null};});
  all[k]=m;localStorage.setItem('bebeMilestones',JSON.stringify(all));
}
// Sélecteur de frontière générique, appliqué à une échelle (section entière ou piste)
function pickFocus(ladder,child,months){
  if(!ladder.length)return null;
  const st=getMilestones(child);
  const status=x=>st[x.mid]?.status;const seen=x=>st[x.mid]?.lastSeen||0;
  const open=arr=>arr.find(x=>status(x)==='unsure')
    ||arr.find(x=>status(x)!=='done'&&!(status(x)==='pending'&&Date.now()-seen(x)<2592e5))
    ||arr.find(x=>status(x)!=='done');
  const inBand=ladder.filter(x=>months>=x.e.minMonths&&months<=x.e.maxMonths);
  let pick=open(inBand);
  if(!pick){const up=ladder.find(x=>months<x.e.minMonths&&status(x)!=='done');if(up)pick={...up,upcoming:true};}
  if(!pick)pick=open(ladder.filter(x=>months>x.e.maxMonths&&status(x)!=='done'));
  if(!pick)pick=ladder[ladder.length-1];
  return pick;
}
function getFocus(child,months,sid){const ladder=getLadder(sid);return ladder.length?pickFocus(ladder,child,months):undefined;}
function getTrackFocus(child,months,sid,trackKey){const lad=getTrackLadder(sid,trackKey);return lad.length?{...pickFocus(lad,child,months),track:trackKey}:null;}
// Frontière "à la une" d'une section : tourne entre les pistes vivantes selon le jour (fraîcheur quotidienne)
function getSectionFocus(child,months,sid,doy){
  const tracks=getTracks(sid);
  if(!tracks.length)return getFocus(child,months,sid);
  const st=getMilestones(child);
  const focs=tracks.map(tk=>{const f=getTrackFocus(child,months,sid,tk.key);return f?{...f,trackKey:tk.key,trackLabel:tk.label,trackLabel_en:tk.label_en}:null;}).filter(Boolean);
  if(!focs.length)return getFocus(child,months,sid);
  // une piste est "vivante" si sa frontière n'est pas une étape déjà acquise et dépassée
  const live=focs.filter(f=>!(st[f.mid]?.status==='done'&&months>f.e.maxMonths));
  const pool=live.length?live:focs;
  return pool[(doy||0)%pool.length];
}
function langLadder(){return getLadder('langage');}
function confirmEarlierLang(child,upto){confirmEarlier(child,'langage',upto);}
function getLangFocus(child,months){return getFocus(child,months,'langage');}
// ──
// Sélectionne l'étape "du moment" : on vise la frontière développementale de l'enfant,
// pas le tout début de l'échelle. Piloté par l'état réel + l'âge.
function getLangFocus(child,months){
  const st=getMilestones(child);const ladder=langLadder();
  const status=x=>st[x.mid]?.status;const seen=x=>st[x.mid]?.lastSeen||0;
  // Dans une liste : "pas sûr" d'abord, puis ouverte non-relancée <3j, puis n'importe quelle ouverte
  const open=arr=>arr.find(x=>status(x)==='unsure')
    ||arr.find(x=>status(x)!=='done'&&!(status(x)==='pending'&&Date.now()-seen(x)<2592e5))
    ||arr.find(x=>status(x)!=='done');
  const inBand=ladder.filter(x=>months>=x.e.minMonths&&months<=x.e.maxMonths);
  // 1. Étape dont la tranche d'âge contient l'enfant (la frontière du moment)
  let pick=open(inBand);
  // 2. Sinon on anticipe la prochaine étape à venir
  if(!pick){const up=ladder.find(x=>months<x.e.minMonths&&status(x)!=='done');if(up){pick={...up,upcoming:true};}}
  // 3. Sinon une étape déjà dépassée mais jamais confirmée (à cocher rétroactivement)
  if(!pick)pick=open(ladder.filter(x=>months>x.e.maxMonths&&status(x)!=='done'));
  if(!pick)pick=ladder[ladder.length-1];
  return pick;
}

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// Markdown → safe HTML (for AI-generated text: bold, italic, line breaks)
function md(s){
  if(!s)return'';
  return e(s)
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}
// Full markdown renderer for chat messages and dive blocks (handles lists, headings, inline code)
function mdFull(s){
  if(!s)return'';
  const esc=t=>t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline=t=>esc(t)
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
    .replace(/`([^`\n]+)`/g,'<code style="background:var(--c-bg2);padding:1px 4px;border-radius:4px;font-size:.88em;font-family:monospace">$1</code>');
  const lines=s.split('\n');
  const parts=[];
  let listType='',inList=false;
  const closeList=()=>{if(inList){parts.push(`</${listType}>`);inList=false;listType='';}};
  for(const line of lines){
    const trimmed=line.trim();
    // Headings
    const hm=trimmed.match(/^(#{1,3})\s+(.+)/);
    if(hm){closeList();const sz=['1rem','0.9375rem','0.875rem'][hm[1].length-1];parts.push(`<p style="font-weight:700;font-size:${sz};margin:10px 0 3px;color:var(--c-ink)">${inline(hm[2])}</p>`);continue;}
    // Bullet list
    const bm=trimmed.match(/^[-*]\s+(.+)/);
    if(bm){if(!inList||listType!=='ul'){closeList();parts.push('<ul style="margin:5px 0 5px 18px;padding:0;list-style:disc">');inList=true;listType='ul';}parts.push(`<li style="margin-bottom:3px;line-height:1.6">${inline(bm[1])}</li>`);continue;}
    // Numbered list
    const nm=trimmed.match(/^(\d+)\.\s+(.+)/);
    if(nm){if(!inList||listType!=='ol'){closeList();parts.push('<ol style="margin:5px 0 5px 18px;padding:0">');inList=true;listType='ol';}parts.push(`<li style="margin-bottom:3px;line-height:1.6">${inline(nm[2])}</li>`);continue;}
    // Horizontal rule
    if(/^[-*_]{3,}$/.test(trimmed)){closeList();parts.push('<hr style="border:none;border-top:1px solid var(--c-bd);margin:10px 0">');continue;}
    // Empty line → paragraph break
    if(!trimmed){closeList();parts.push('<br>');continue;}
    // Regular line
    closeList();parts.push(inline(line)+'<br>');
  }
  closeList();
  return parts.join('').replace(/(<br>\s*){3,}/g,'<br><br>').replace(/^(<br>)+|(<br>)+$/g,'');
}
// Renders the bridge field (2-part "Observer / Essayer") with SVG icons
function renderBridge(txt,fs){
  if(!txt)return'';
  const sw='stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"';
  const iconObs=`<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" ${sw}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const iconEss=`<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" ${sw}><path d="M5 12h14M13 6l6 6-6 6"/></svg>`;
  const sections=[
    {re:/^Observer\s*:\s*/i,label:'Observer',icon:iconObs,color:'#2D4A8A'},
    {re:/^Essayer\s*:\s*/i,  label:'Essayer', icon:iconEss,color:'#3A5E38'},
  ];
  const fontSize=fs||'0.8125rem';
  return txt.split(/\n\n+/).filter(Boolean).map((seg,i)=>{
    const match=sections.find(s=>s.re.test(seg.replace(/^\*\*?/,'')));
    const clean=seg.replace(/^\*?\*?\w[\w ]*\*?\*?\s*:\s*/,'');
    if(match){
      return `<div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:5px;color:${match.color};margin-bottom:5px">${match.icon}<span style="font-size:0.625rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase">${match.label}</span></div><div style="font-size:${fontSize};color:var(--c-t2);line-height:1.65">${md(clean)}</div></div>`;
    }
    return `<div style="font-size:${fontSize};color:var(--c-t2);line-height:1.65;margin-bottom:8px">${md(seg)}</div>`;
  }).join('');
}

function migrateFavIds(){
  // Strip old daily-date suffix from IDs (format: ...|YYYY-MM-DD) and deduplicate
  let favs;try{favs=JSON.parse(localStorage.getItem('bebeFavorites')||'[]');}catch{favs=[];}
  const dateRe=/\|\d{4}-\d{2}-\d{2}$/;
  const seen=new Set();const out=[];let changed=false;
  for(const f of favs){
    const newId=(f.id||'').replace(dateRe,'');
    if(seen.has(newId)){changed=true;continue;}// drop duplicate
    seen.add(newId);
    if(newId!==f.id){changed=true;out.push({...f,id:newId});}else{out.push(f);}
  }
  if(changed)localStorage.setItem('bebeFavorites',JSON.stringify(out));
}

// ── Generic canvas share card ──
async function shareCardCanvas(child,{headerBg,accentColor,categoryLabel,title,body,ageLabel}){
  const cv=document.createElement('canvas');
  const W=600,H=720,dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  await document.fonts.ready;
  // Background
  ctx.fillStyle='#F2F0EB';ctx.fillRect(0,0,W,H);
  // Header
  ctx.fillStyle=headerBg||'#3D5570';ctx.beginPath();ctx.roundRect(0,0,W,190,0);ctx.fill();
  // Deco circle
  ctx.save();ctx.globalAlpha=.08;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(540,10,160,0,Math.PI*2);ctx.fill();ctx.restore();
  // Category label
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='600 11px "DM Sans",sans-serif';
  ctx.textAlign='left';ctx.fillText((categoryLabel||'').toUpperCase(),40,62);
  // Child name
  ctx.fillStyle='#fff';ctx.font='600 18px "DM Sans",sans-serif';
  ctx.fillText(child.firstName+(ageLabel?' · '+ageLabel:''),40,92);
  // White card
  ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(30,160,W-60,H-195,16);ctx.fill();
  // Title
  ctx.fillStyle=accentColor||'#1A1918';ctx.font='500 22px "Cormorant Garamond",serif';
  ctx.textAlign='left';
  const words=title.split(' ');let line='',y=212,lh=30;
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>W-100&&line){ctx.fillText(line,56,y);line=w;y+=lh;}else line=t;}
  ctx.fillText(line,56,y);y+=lh+10;
  // Divider
  ctx.strokeStyle='#F0EDE8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(56,y);ctx.lineTo(W-56,y);ctx.stroke();y+=18;
  // Body text
  ctx.fillStyle='#5C5752';ctx.font='14px "DM Sans",sans-serif';
  const bwords=body.split(' ');let bl='',by=y;
  for(const w of bwords){const t=bl?bl+' '+w:w;if(ctx.measureText(t).width>W-112&&bl){ctx.fillText(bl,56,by);bl=w;by+=22;}else bl=t;if(by>H-90)break;}
  ctx.fillText(bl,56,by);
  // Footer
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.font='600 11px "DM Sans",sans-serif';
  ctx.textAlign='center';ctx.fillText('BébéPilote',W/2,H-28);
  // Share
  cv.toBlob(async blob=>{
    const file=new File([blob],'bebecard.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare?.({files:[file]})){
      try{await navigator.share({files:[file],title:'BébéPilote'});}catch{
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bebecard.png';a.click();
      }
    }else{
      const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download='bebecard.png';a.click();
    }
  },'image/png');
}

// Génère la controverse structurée selon le moteur choisi
async function aiControverse(sys,userMsg){
  userMsg=userMsg||'Génère la controverse du jour.';
  if(S.provider==='anthropic'){
    if(!S.anthropicKey)throw new Error('Clé Claude manquante (Paramètres).');
    // Non-streaming. max_tokens=1600 : ~1100-1200 tokens réels + marge
    const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),60000);
    let res;
    try{res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:anthropicHeaders(),
      signal:ac.signal,
      body:JSON.stringify({
        model:ANTHROPIC_MODEL,max_tokens:1800,stream:false,system:sys,
        messages:[{role:'user',content:userMsg}],
        tools:[{name:'controverse',description:'Renvoie la controverse du jour, structurée.',input_schema:CTRV_TOOL_SCHEMA}],
        tool_choice:{type:'tool',name:'controverse'}
      })
    });}catch(e){clearTimeout(tid);if(e.name==='AbortError')throw new Error('Délai dépassé (60s) — réessaie.');throw new TypeError(e.message);}
    clearTimeout(tid);
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`Erreur ${res.status}`);}
    let j;
    try{j=await res.json();}catch(e){throw new Error(`Réponse tronquée — réessaie. (${e.message})`);}
    if(j.stop_reason==='max_tokens')throw new Error('Réponse trop longue (max_tokens atteint) — réessaie.');
    const toolBlock=(j.content||[]).find(b=>b.type==='tool_use');
    if(!toolBlock?.input)throw new Error('Réponse Claude sans données (tool_use absent)');
    return toolBlock.input;
  }
  if(!S.apiKey)throw new Error('Clé Gemini manquante (Paramètres).');
  const ac2=new AbortController();const tid2=setTimeout(()=>ac2.abort(),55000);
  let res;
  try{res=await fetch(geminiUrl('generateContent'),{
    method:'POST',headers:{'Content-Type':'application/json'},signal:ac2.signal,
    body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:[{role:'user',parts:[{text:userMsg}]}],generationConfig:{responseMimeType:'application/json',responseSchema:CTRV_SCHEMA,temperature:1.05}})
  });}catch(e){clearTimeout(tid2);console.error('[aiControverse Gemini]',e);if(e.name==='AbortError')throw new Error('Délai dépassé — réessaie.');throw new TypeError(e.message);}
  clearTimeout(tid2);
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`Erreur ${res.status}`);}
  const j=await res.json();
  const txt=j.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!txt)throw new Error('Réponse vide du modèle');
  return JSON.parse(txt);
}

function buildObsCatalog(child,months){

    if(!SECTION_MS[sid])return;
    getLadder(sid).forEach(x=>{
      const ev=x.e;

    });
  });

// Réponse de deep-dive (texte + sources) selon le moteur, avec ou sans recherche web
async function aiDeepDive(sys,q,grounded){
  if(S.provider==='anthropic'){
    if(!S.anthropicKey)throw new Error('Clé Claude manquante (Paramètres).');
    const body={model:ANTHROPIC_MODEL,max_tokens:1500,system:sys,messages:[{role:'user',content:q}]};
    if(grounded)body.tools=[{type:'web_search_20250305',name:'web_search',max_uses:3}];
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:anthropicHeaders(),body:JSON.stringify(body)});
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`Erreur ${res.status}`);}
    const j=await res.json();
    const text=(j.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    let sources=[];
    if(grounded){
      const seen=new Set();
      (j.content||[]).forEach(b=>{if(b.type==='web_search_tool_result'&&Array.isArray(b.content)){b.content.forEach(r=>{if(r.url&&!seen.has(r.url)){seen.add(r.url);sources.push({uri:r.url,title:r.title||r.url});}});}});
      sources=sources.slice(0,6);
    }
    if(!text)throw new Error('Réponse vide du modèle');
    return{text,sources};
  }
  const body={systemInstruction:{parts:[{text:sys}]},contents:[{role:'user',parts:[{text:q}]}]};
  if(grounded)body.tools=[{google_search:{}}];
  const res=await fetch(geminiUrl('generateContent'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||`Erreur ${res.status}`);}
  const j=await res.json();const cand=j.candidates?.[0];
  const text=(cand?.content?.parts||[]).map(p=>p.text||'').join('').trim();
  if(!text)throw new Error('Réponse vide du modèle');
  let sources=[];
  if(grounded){const chunks=cand?.groundingMetadata?.groundingChunks||[];const seen=new Set();sources=chunks.filter(c=>c.web?.uri).map(c=>({uri:c.web.uri,title:c.web.title||c.web.uri})).filter(s=>{if(seen.has(s.uri))return false;seen.add(s.uri);return true;}).slice(0,6);}
  return{text,sources};
}

async function generateControverse(child,data,force){
  if(S.controverse.loading)return; // prevent concurrent calls
  if(S.provider==='anthropic'){if(!S.anthropicKey){S.controverse.error=S.lang==='en'?'Add your Claude key in Settings.':'Ajoute ta clé Claude dans les Paramètres.';S.controverse.childKey=ctrvIdent(child);render();return;}}

  S.controverse.dive={open:false,items:[],loading:false,error:null};
  const ck=ctrvCacheKey(child);
  if(!force){const cached=localStorage.getItem(ck);if(cached){try{const p=JSON.parse(cached);if(p&&p.bridge){S.controverse.data=p;S.controverse.childKey=ctrvIdent(child);S.controverse.error=null;render();return;}else{localStorage.removeItem(ck);}}catch{}}}
  S.controverse.loading=true;S.controverse.error=null;S.controverse.childKey=ctrvIdent(child);render();
  const hist=getCtrvHistory();
  const recent=[...new Set(hist.slice(0,20).map(x=>x.question))];
  const liked=[...new Set(hist.filter(x=>x.signal==='learned').map(x=>x.topic))];
  const disliked=[...new Set(hist.filter(x=>x.signal==='skip').map(x=>x.topic))];
  const _cen=S.lang==='en';
  const sibs=getSiblings(S.children.indexOf(child));
  let sibCtx='';
  if(sibs.length){
    const childDate=new Date(child.birthDate+'T12:00:00');
    const lines=sibs.map(sib=>{
      const unborn=isUnborn(sib);
      const sibDate=new Date(sib.birthDate+'T12:00:00');

function parseDiveAnswer(txt){
  const re=/(◆\s*FAIT|◇\s*INTERPR[ÉE]TATION|○\s*POSITION|⚠\s*S[ÉE]CURIT[ÉE])\s*:?\s*/gi;
  const idxs=[];let m;
  while((m=re.exec(txt))){idxs.push({tag:m[1].toUpperCase(),start:m.index,end:re.lastIndex});}
  if(!idxs.length)return[{type:'plain',text:txt.trim()}];
  const out=[];
  const pre=txt.slice(0,idxs[0].start).trim();
  if(pre)out.push({type:'plain',text:pre});
  for(let i=0;i<idxs.length;i++){
    const cur=idxs[i],next=idxs[i+1];
    const body=txt.slice(cur.end,next?next.start:undefined).trim();
    let type='position';
    if(cur.tag.includes('FAIT'))type='fait';
    else if(cur.tag.includes('INTERPR'))type='interp';
    else if(cur.tag.includes('POSITION'))type='position';
    else type='safety';
    if(body)out.push({type,text:body});
  }
  return out;
}

function ctrvFullText(d){
  const L=['CONTROVERSE — '+d.topic,'',d.question,'',d.why_now,'','— LES CAMPS —'];
  (d.camps||[]).forEach(c=>{
    L.push('','▸ '+c.name,c.logic);
    (c.pros||[]).forEach(p=>L.push('  + '+p));
    (c.cons||[]).forEach(p=>L.push('  − '+p));
  });
  L.push('','— CE QU\'ON SAIT —',d.known,'','— CE QU\'ON CROIT (pas un fait) —',d.believed,'','— CE QU\'ON NE SAIT PAS —',d.unknown,'','— ET POUR BÉBÉ ? —',d.bridge,'','— BébéPilote');
  return L.join('\n');
}
function diveFullText(it){
  const labels={fait:'FAIT ÉTABLI',interp:'INTERPRÉTATION',position:'POSITION',safety:'SÉCURITÉ',plain:''};
  const L=['CREUSER — '+it.q,''];
  (it.blocks||[]).forEach(b=>{const lb=labels[b.type];if(lb)L.push('['+lb+']');L.push(b.text,'');});
  if(it.sources&&it.sources.length){L.push('Sources :');it.sources.forEach(s=>L.push('- '+s.title+' '+s.uri));L.push('');}
  L.push('— BébéPilote');
  return L.join('\n');
}
function toast(msg){

  el.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(20,18,16,.92);color:#fff;padding:10px 16px;border-radius:10px;font-size:0.8125rem;font-weight:500;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:80%;text-align:center';

}
async function shareTextContent(title,text){
  if(navigator.share){try{await navigator.share({title,text});return;}catch(err){if(err&&err.name==='AbortError')return;}}
  try{await navigator.clipboard.writeText(text);toast('Texte copié dans le presse-papier');}
  catch{toast('Impossible de copier');}
}

function obsRelTime(ts,en){const d=Math.floor((Date.now()-ts)/86400000);if(d<=0)return en?'today':'aujourd\'hui';if(d===1)return en?'yesterday':'hier';if(d<7)return en?`${d} days ago`:`il y a ${d} jours`;const w=Math.floor(d/7);if(w<5)return en?`${w}w ago`:`il y a ${w} sem.`;const mo=Math.floor(d/30.44);return en?`${mo}mo ago`:`il y a ${mo} mois`;}

        :`<button class="obs-check-btn" data-obs-check="${m.mid}" style="flex-shrink:0;font-size:0.75rem;font-weight:600;color:#fff;background:${col};border-radius:8px;padding:7px 12px">${en?'Confirm':'Confirmer'}</button>`}

function renderNeuronChart(c,ageInDays){
  const pts=getNeuronHistory(c,ageInDays);
  const vals=pts.map(p=>p.v);
  const mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
  const W=300,H=80,pL=2,pR=2,pT=6,pB=22;
  const cW=W-pL-pR,cH=H-pT-pB;
  const px=i=>pL+(i/(pts.length-1))*cW;
  const py=v=>pT+cH-((v-mn)/range)*cH;
  const lp=pts.map((p,i)=>`${i===0?'M':'L'}${px(i).toFixed(1)},${py(p.v).toFixed(1)}`).join(' ');
  const ap=lp+` L${px(pts.length-1).toFixed(1)},${(pT+cH).toFixed(1)} L${pL},${(pT+cH).toFixed(1)} Z`;
  const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const fd=pts[0].ds.slice(5).replace('-','/');
  return`<div class="neuron-chart">
  <p style="font-size:0.6875rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#9C9790;margin-bottom:10px">${t('neuron_14')}</p>
  <svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible;display:block">
    <defs>
      <linearGradient id="ng${c.birthDate.replace(/-/g,'')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3D5570" stop-opacity=".22"/>
        <stop offset="100%" stop-color="#3D5570" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="${pL}" y1="${py(mn+(range*.5)).toFixed(1)}" x2="${W-pR}" y2="${py(mn+(range*.5)).toFixed(1)}" stroke="#F2F0EB" stroke-width="1"/>
    <path d="${ap}" fill="url(#ng${c.birthDate.replace(/-/g,'')})"/>
    <path d="${lp}" fill="none" stroke="#3D5570" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map((p,i)=>i===pts.length-1?`<circle cx="${px(i).toFixed(1)}" cy="${py(p.v).toFixed(1)}" r="4" fill="#3D5570"/><circle cx="${px(i).toFixed(1)}" cy="${py(p.v).toFixed(1)}" r="6.5" fill="#3D5570" opacity=".15"/>`:`<circle cx="${px(i).toFixed(1)}" cy="${py(p.v).toFixed(1)}" r="2" fill="#fff" stroke="#3D5570" stroke-width="1.2"/>`).join('')}
    <text x="${pL}" y="${H-1}" font-size="9" fill="#C4BFB8" font-family="DM Sans,sans-serif">${fd}</text>
    <text x="${W-pR}" y="${H-1}" font-size="9" fill="#9C9790" text-anchor="end" font-family="DM Sans,sans-serif">${t('neuron_today')}</text>
  </svg>
  <div style="display:flex;gap:16px;margin-top:10px">
    <span style="font-size:0.75rem;color:#9C9790">${t('neuron_peak')} <strong style="color:#3D5570">+${fmt(mx)}</strong></span>
    <span style="font-size:0.75rem;color:#9C9790">${t('neuron_avg')} <strong style="color:#5C5752">+${fmt(avg)}</strong></span>
  </div>
</div>`;
}

      cat:S.lang==='en'?'⚡ Right now':'⚡ Maintenant',

      sosLabel:s.label,
    })),
  ];

  const followups=[t('chat_followup_1'),t('chat_followup_2'),t('chat_followup_3'),t('chat_followup_4')];

        </div>
      </div>

      <!-- Accordéon -->
      <div class="chat-acc">${(()=>{
        const chev=`<svg class="chat-acc-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
        const icoNow=`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;const icoExplore=`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;const icoCtrv=`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="10"/></svg>`;
        const open=S.chat.openSections;
        const sections=[
          {
            id:'now',
            icon:icoNow,
            label:S.lang==='en'?'Right now':'Là, maintenant',
            chips:getCoachSituations(ageInDays).map(s=>({txt:s.label,q:S.lang==='en'?`Tough moment right now with ${child.firstName}: ${s.label}. Help me concretely — what can I do in the next 30 seconds?`:`Moment difficile avec ${child.firstName} là maintenant : ${s.label}. Aide-moi concrètement — qu'est-ce que je peux faire dans les 30 prochaines secondes ?`}))
          },
          {
            id:'explore',
            icon:icoExplore,
            label:S.lang==='en'?'Explore':'Explorer',
            chips:chips.filter(c=>!c.sos).map(c=>({txt:c.label,q:c.label,tpl:c.template}))
          },
          {
            id:'ctrv',
            icon:icoCtrv,
            label:S.lang==='en'?'Controversy of the day':'Controverse du jour',
            chips:S.controverse.data?(S.lang==='en'?[
              {txt:`Summary of positions: "${e(S.controverse.data.question).substring(0,55)}…"`,q:`Summarise the different positions on the following debate: "${S.controverse.data.question}"`},
              ...( S.controverse.data.camps||[]).slice(0,2).map(c=>({txt:`Defend the camp: "${c.name}"`,q:`Defend the camp "${c.name}" on the question: "${S.controverse.data.question}". Explain its logic and strongest arguments.`})),
              {txt:`What we really know about: ${S.controverse.data.topic}`,q:`What do we really know, with certainty and scientific backing, about: ${S.controverse.data.topic}? Separate established facts from beliefs.`},
            ]:[
              {txt:`Résume-moi les camps : « ${e(S.controverse.data.question).substring(0,55)}… »`,q:`Résume-moi les différentes positions sur la controverse suivante : « ${S.controverse.data.question} »`},
              ...( S.controverse.data.camps||[]).slice(0,2).map(c=>({txt:`Défends le camp : "${c.name}"`,q:`Défends le camp "${c.name}" sur la question : « ${S.controverse.data.question} ». Explique sa logique et ses arguments les plus solides.`})),
              {txt:`Ce qu'on sait vraiment sur : ${S.controverse.data.topic}`,q:`Qu'est-ce qu'on sait vraiment, de façon certaine et scientifiquement établie, sur : ${S.controverse.data.topic} ? Sépare les faits établis des croyances.`},
            ]):[{txt:S.lang==='en'?'Generate today\'s controversy first →':'Génère d\'abord la controverse du jour →',q:'',disabled:true}]
          },
        ];
        return sections.map(sec=>{
          const isOpen=open.includes(sec.id);
          return`<div>
            <button class="chat-acc-btn${isOpen?' open':''}" data-acc="${sec.id}">
              <span class="chat-acc-lbl">${sec.icon}${e(sec.label)}</span>
              ${chev}
            </button>
            ${isOpen?`<div class="chat-acc-body">
              ${sec.chips.map(c=>c.disabled?`<span style="font-size:0.8125rem;color:var(--c-t4);font-style:italic;padding:4px 2px">${e(c.txt)}</span>`:`<button class="chat-acc-chip" data-q="${e(c.q)}"${c.tpl?' data-tpl="1"':''}>${e(c.txt)}</button>`).join('')}
            </div>`:''}
          </div>`;
        }).join('');
      })()}</div>

    </div>`:`
    ${msgs.map((m,i)=>renderMsgBlock(m,i,child,data)).join('')}
    ${loading||stream?`<div class="msg-block">
      ${stream
        ?`<div class="msg-bot">${mdFull(stream)}</div>`
        :`<div style="display:flex;gap:5px;padding:8px 0;align-items:center"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`}
    </div>`:''}
    ${showFollowups?`<div style="display:flex;flex-wrap:wrap;gap:6px;padding:2px 0 4px">
      ${followups.map(q=>`<button class="chip-btn" data-q="${e(q)}" style="font-size:0.75rem;background:var(--c-card);border-color:var(--c-bd2);color:var(--c-t3)">${e(q)}</button>`).join('')}
    </div>`:''}
    <div id="chat-end"></div>`}
  </div>

  <!-- Input -->
  <div class="chat-pill-wrap">
    <div class="chat-pill">
      <textarea id="chat-in" class="chat-pill-in" rows="1"
        placeholder="${S.apiKey?t('chat_placeholder_key'):t('chat_placeholder_nokey')}"
        ${loading?'disabled':''}></textarea>
      <button class="chat-pill-send" id="chat-send" ${loading?'disabled':''}>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>

</div>`;
}
