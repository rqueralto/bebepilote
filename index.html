  {minM:0,maxM:20,category:'Moins de 20 mois',category_en:'Under 20 months',title:'Trop jeune pour anticiper',body:'Avant 20 mois, la notion de "bébé qui arrive" est abstraite. Inutile de faire des discours — il captera l\'agitation émotionnelle de la maison. Maintenez rituels et stabilité. Les régressions (biberon, couches) sont normales et transitoires.',tip:'Montrez des photos de lui bébé. Nommez le futur bébé. Gardez son rythme intact autant que possible.',title_en:'Too young to anticipate',body_en:'Before 20 months, the concept of "a baby coming" is abstract. No need for long talks — they\'ll pick up on the emotional excitement in the house. Maintain routines and stability. Regressions (bottle, diapers) are normal and temporary.',tip_en:'Show them photos of themselves as a baby. Name the future baby. Keep their routine as intact as possible.'},
  {minM:20,maxM:48,category:'20 mois – 4 ans',category_en:'20 months – 4 years',title:'Préparer concrètement',body:'À cet âge, la jalousie est inévitable et saine. Préparez-le avec des livres illustrés sur les bébés. Impliquez-le : il peut choisir un doudou, "aider" à plier les bodies. Expliquez honnêtement : "Le bébé pleurera beaucoup, mangera, dormira — et toi tu pourras faire des choses qu\'il ne sait pas encore faire."',tip:'Réservez un temps exclusif quotidien avec lui après la naissance. 15 min de jeu sans bébé, sans téléphone.',title_en:'Prepare concretely',body_en:'At this age, jealousy is inevitable and healthy. Prepare them with illustrated books about babies. Involve them: they can choose a stuffed animal, "help" fold onesies. Be honest: "The baby will cry a lot, eat, sleep — and you\'ll be able to do things they can\'t yet."',tip_en:'Reserve daily exclusive time with them after the birth. 15 minutes of play without the baby, without phones.'},
  {minM:48,maxM:96,category:'4 – 8 ans',category_en:'4 – 8 years',title:'Lui donner un rôle',body:'Il comprend la grossesse. Impliqué dans les préparatifs, il devient acteur et non victime. Parlez-lui des émotions à venir : "Tu auras peut-être parfois envie que je m\'occupe juste de toi — dis-le moi." La jalousie nommée est moins envahissante.',tip:'Emmenez-le à une échographie si possible. Laissez-le sentir les coups de pied. Il devient grand frère / grande sœur — valorisez ce statut.',title_en:'Give them a role',body_en:'They understand the pregnancy. Involved in the preparations, they become an actor, not a bystander. Talk about upcoming emotions: "You might sometimes want me to look after only you — tell me." Named jealousy is less overwhelming.',tip_en:'Take them to an ultrasound if possible. Let them feel the kicks. They\'re becoming a big brother/sister — celebrate that status.'},
  {minM:96,maxM:999,category:'8 ans et plus',category_en:'8 years and over',title:'Un allié potentiel',body:'Un enfant de 8 ans ou plus peut comprendre les enjeux de la grossesse avec nuance. Discutez franchement : ce que ça va changer à la maison, la répartition de votre attention, vos propres émotions. Il a besoin de se sentir inclus dans la décision de la famille, pas juste informé.',tip:'Encouragez les questions, même inconfortables. "Est-ce que tu voulais un petit frère ?" mérite une vraie réponse, pas un "bien sûr que oui".',title_en:'A potential ally',body_en:'A child of 8+ can understand the stakes of the pregnancy with nuance. Discuss openly: what will change at home, how attention will be divided, your own emotions. They need to feel included in the family decision, not just informed.',tip_en:'Encourage questions, even uncomfortable ones. "Did you want a little brother?" deserves a real answer, not a "of course yes".'},

  {minG:0,maxG:20,category:'Écart < 20 mois',category_en:'Gap < 20 months',title:'Deux bébés simultanément',body:'Un écart très court signifie que l\'aîné est encore dans sa propre petite enfance. Il ne peut pas vraiment "s\'occuper" du bébé — gérez les deux individuellement. Les crises de l\'aîné sont amplifiées par sa propre immaturité, pas de la malveillance.',tip:'Distinguez clairement leurs besoins. Évitez les comparaisons. Chaque enfant a besoin d\'un temps seul avec vous chaque jour.',title_en:'Two babies at once',body_en:'A very short gap means the eldest is still in their own early childhood. They can\'t really "look after" the baby — manage both individually. The eldest\'s tantrums are amplified by their own immaturity, not malice.',tip_en:'Clearly distinguish their needs. Avoid comparisons. Each child needs one-on-one time with you every day.'},
  {minG:20,maxG:48,category:'Écart 20 mois – 4 ans',category_en:'Gap 20 months – 4 years',title:'La période la plus complexe',body:'L\'aîné comprend que le bébé "vole" l\'attention mais manque de mots pour l\'exprimer. Les régressions (pipi au lit, conduites bébé) sont des appels. Répondez sans punir. La relation fraternelle peut être très intense — belle et conflictuelle à la fois.',tip:'Nommez les émotions de l\'aîné : "Tu es en colère parce que je donne le sein au bébé." Ça désamorce souvent. Laissez l\'aîné "apprendre" des choses au bébé — même bêtes.',title_en:'The most complex period',body_en:'The eldest understands that the baby is "stealing" attention but lacks the words to express it. Regressions (bedwetting, baby behavior) are calls for help. Respond without punishing. The sibling relationship can be very intense — beautiful and conflictual at the same time.',tip_en:'Name the eldest\'s emotions: "You\'re angry because I\'m feeding the baby." This often defuses things. Let the eldest "teach" things to the baby — even silly things.'},
  {minG:48,maxG:84,category:'Écart 4 – 7 ans',category_en:'Gap 4 – 7 years',title:'Le grand frère / la grande sœur',body:'L\'aîné peut être un vrai relais affectif pour le bébé. Il capte ses expressions, le fait rire, lui parle. Cette relation est précieuse — encouragez-la sans en faire une obligation. Risque : l\'aîné devient trop responsable ("parentifié"). Restez attentif.',tip:'Donnez-lui des responsabilités symboliques choisies par lui, pas imposées. "Tu veux lui montrer comment faire des bulles ?" vaut mieux que "Surveille ton frère."',title_en:'The big brother/sister',body_en:'The eldest can be a real emotional anchor for the baby. They catch their expressions, make them laugh, talk to them. This relationship is precious — encourage it without making it an obligation. Risk: the eldest becomes too responsible ("parentified"). Stay attentive.',tip_en:'"Do you want to show them how to blow bubbles?" is better than "Watch your brother."'},
  {minG:84,maxG:999,category:'Écart 7 ans et plus',category_en:'Gap 7 years and over',title:'Deux générations dans la même famille',body:'Un grand écart crée deux dynamiques presque indépendantes. L\'aîné est souvent fasciné par le bébé et naturellement protecteur. Il peut aussi ressentir une gêne sociale (un bébé à la maison quand ses amis n\'en ont pas). Validez ces deux réalités.',tip:'Associez l\'aîné aux décisions pratiques : quel prénom il aurait choisi, comment décorer la chambre. Il a des idées pertinentes et se sent respecté.',title_en:'Two generations in one family',body_en:'A large gap creates two almost independent dynamics. The eldest is often fascinated by the baby and naturally protective. They may also feel social awkwardness (a baby at home when their friends don\'t have one). Validate both realities.',tip_en:'Involve the eldest in practical decisions: what name they would have chosen, how to decorate the room. They have relevant ideas and feel respected.'},

const carolineData=[
  {minMonths:0,maxMonths:3,pool:[
    {topic:"Les pleurs sont un langage, pas une manipulation",topic_en:"Crying is a language, not manipulation",advice:"Avant 3 mois, chaque pleur traduit un besoin réel — faim, inconfort, besoin de contact. Répondre systématiquement ne crée aucune mauvaise habitude : c'est exactement ce qui construit la sécurité affective. Un nourrisson ne peut pas encore « faire semblant ».",advice_en:"Before 3 months, every cry reflects a real need — hunger, discomfort, need for contact. Responding consistently creates no bad habits: it's exactly what builds emotional security. A newborn cannot yet 'pretend'.",tip:"Règle simple : avant 3 mois, on répond. Toujours. Sans culpabilité.",tip_en:"Simple rule: before 3 months, you respond. Always. Without guilt.",ref:{label:"Attachement sécure",detail:"Goldman s'appuie sur les travaux de Bowlby et Ainsworth : la disponibilité inconditionnelle du parent en période néonatale est le socle de la confiance en soi future. Dans ses conférences, elle insiste : on ne peut pas gâter un bébé de 2 mois en le prenant dans les bras.",detail_en:"Goldman draws on Bowlby and Ainsworth: unconditional parental availability in the neonatal period is the foundation of future self-confidence. In her talks she stresses: you cannot spoil a 2-month-old by picking them up."}},
    {topic:"Le portage est utile — mais pas une obligation",topic_en:"Babywearing is useful — but not mandatory",advice:"Le contact peau-à-peau est précieux, mais un bébé posé sur son tapis se développe parfaitement aussi. Ce qui compte n'est pas la durée continue du contact, c'est sa qualité : échanges de regards, voix, réponse aux signaux. 10 minutes de jeu attentif valent mieux qu'une heure de portage distrait.",advice_en:"Skin-to-skin contact is precious, but a baby placed on their play mat develops perfectly too. What matters is not the continuous duration of contact, but its quality: eye contact, voice, response to signals. Ten minutes of attentive play are worth more than an hour of distracted babywearing.",tip:"Quelques minutes seul sur son tapis, c'est déjà une mini-expérience d'autonomie.",tip_en:"A few minutes alone on the mat is already a mini experience of autonomy.",ref:{label:"Autonomie précoce",detail:"Goldman déconseille de confondre quantité et qualité de présence. Dès les premières semaines, des micro-moments d'exploration seul participent à la construction du sentiment de compétence du bébé.",detail_en:"Goldman advises against confusing quantity and quality of presence. From the first weeks, micro-moments of solo exploration help build the baby's sense of competence."}},
    {topic:"Votre stress se transmet — et c'est gérable",topic_en:"Your stress is contagious — and manageable",advice:"Les nouveau-nés sont extrêmement sensibles à la tension émotionnelle de leurs parents. Ce n'est pas une critique : c'est neurologique. Prendre soin de vous — sommeil, soutien social, exprimer vos émotions — bénéficie directement à votre bébé. Parentalité et bien-être parental vont de pair.",advice_en:"Newborns are extremely sensitive to their parents' emotional tension. This is not a criticism — it's neurological. Taking care of yourself — sleep, social support, expressing your emotions — directly benefits your baby. Parenting and parental well-being go hand in hand.",tip:"Demander de l'aide n'est pas un aveu d'échec. C'est un acte de compétence parentale.",tip_en:"Asking for help is not an admission of failure. It is an act of parental competence.",ref:{label:"Régulation émotionnelle partagée",detail:"Goldman insiste sur la notion de « parent suffisamment bon » (Winnicott) : l'objectif n'est pas la perfection, mais la régularité et la disponibilité. Un parent qui prend soin de lui est plus disponible pour son enfant.",detail_en:"Goldman emphasises the concept of the 'good enough parent' (Winnicott): the goal is not perfection but regularity and availability. A parent who takes care of themselves is more available for their child."}},
  ]},
  {minMonths:3,maxMonths:6,pool:[
    {topic:"Les routines : un cadeau pour le cerveau de votre bébé",topic_en:"Routines: a gift for your baby's brain",advice:"Entre 3 et 6 mois, le cerveau du bébé cherche activement des patterns — des séquences prévisibles qui lui permettent d'anticiper. Un bain à la même heure, une comptine avant le biberon, une lumière tamisée au coucher : ces rituels signalent la sécurité. La prévisibilité réduit le stress et favorise le sommeil.",advice_en:"Between 3 and 6 months, your baby's brain is actively searching for patterns — predictable sequences that allow it to anticipate. A bath at the same time, a nursery rhyme before the bottle, dimmed lights at bedtime: these rituals signal safety. Predictability reduces stress and promotes sleep.",tip:"3 à 4 rituels récurrents suffisent. L'irrégularité chronique, elle, épuise le bébé.",tip_en:"3 to 4 recurring rituals are enough. Chronic irregularity, on the other hand, exhausts the baby.",ref:{label:"Importance des rituels",detail:"Goldman explique que le jeune bébé ne comprend pas encore le langage mais lit les séquences comportementales. Les routines sont le premier « contrat de confiance » entre parent et enfant. Cf. ses interventions sur l'importance du cadre prévisible dès le 4e mois.",detail_en:"Goldman explains that the young baby does not yet understand language but reads behavioural sequences. Routines are the first 'trust contract' between parent and child."}},
    {topic:"Le sourire social n'est pas une performance",topic_en:"Social smiling is not a performance",advice:"Vers 2–3 mois apparaît le sourire social : une réponse réelle à votre présence, pas un réflexe. Ne cherchez pas à le « déclencher » à tout prix — laissez les échanges se faire naturellement. Ce qui compte, c'est votre disponibilité de regard, pas votre entrain.",advice_en:"Around 2–3 months the social smile appears: a genuine response to your presence, not a reflex. Don't try to 'trigger' it at all costs — let exchanges happen naturally. What matters is your availability of gaze, not your enthusiasm.",tip:"Parler à voix normale à votre bébé est plus enrichissant que le « langage bébé » exagéré.",tip_en:"Talking to your baby in a normal voice is more enriching than exaggerated 'baby talk'.",ref:{label:"Proto-dialogue",detail:"Goldman s'appuie sur les recherches de Daniel Stern sur la « syntonie affective » : ce n'est pas ce que vous dites à votre bébé qui compte, mais la qualité de votre accordage émotionnel — être là, regarder, répondre.",detail_en:"Goldman draws on Daniel Stern's research on 'affective attunement': it's not what you say to your baby that matters, but the quality of your emotional attunement — being there, looking, responding."}},
    {topic:"Commencer à espacer les nuits : ça se prépare",topic_en:"Starting to space out nights: preparation counts",advice:"C'est vers 3–6 mois que la biologie du sommeil du bébé permet des nuits plus longues. Goldman est claire : attendre qu'un enfant de 18 mois s'endorme seul « naturellement » est beaucoup plus difficile que d'instaurer de bonnes conditions dès maintenant. Coucher éveillé, rituel court, pièce sombre.",advice_en:"It is around 3–6 months that baby's sleep biology allows for longer nights. Goldman is clear: waiting for an 18-month-old to fall asleep alone 'naturally' is much harder than establishing good conditions now. Put down awake, short ritual, dark room.",tip:"La capacité à s'endormir seul s'apprend. Comme toute compétence, elle s'enseigne.",tip_en:"The ability to fall asleep alone is learned. Like any skill, it can be taught.",ref:{label:"Sommeil du nourrisson",detail:"Goldman distingue nettement le besoin de présence (légitime) et l'association endormissement-parent (qu'on peut déconditionner sans traumatisme dès 4 mois, si les parents le souhaitent). Elle rappelle que le manque de sommeil parental a des effets documentés sur la qualité de l'attachement.",detail_en:"Goldman clearly distinguishes the need for presence (legitimate) from the sleep-parent association (which can be deconditioned without trauma from 4 months, if parents wish). She notes that parental sleep deprivation has documented effects on attachment quality."}},
  ]},
  {minMonths:6,maxMonths:12,pool:[
    {topic:"L'angoisse de séparation : universelle et saine",topic_en:"Separation anxiety: universal and healthy",advice:"Vers 8–10 mois, votre bébé peut pleurer intensément quand vous quittez la pièce — même 30 secondes. C'est la preuve que l'attachement fonctionne, pas un problème à résoudre. Cette étape est neurologique : le bébé a acquis la permanence de l'objet (vous existez hors de sa vue) mais pas encore la confiance dans votre retour.",advice_en:"Around 8–10 months, your baby may cry intensely when you leave the room — even for 30 seconds. This is proof that attachment is working, not a problem to solve. This stage is neurological: the baby has acquired object permanence (you exist out of sight) but not yet confidence in your return.",tip:"Partir en disant au revoir — même si ça pleure — est préférable à partir en douce. La prévisibilité rassure.",tip_en:"Leaving with a goodbye — even if they cry — is preferable to sneaking away. Predictability reassures.",ref:{label:"Angoisse du 8ème mois",detail:"Goldman explique en conférences que partir sans prévenir aggrave l'angoisse sur le long terme : le bébé ne sait plus quand vous pouvez disparaître. Annoncer son départ, même brièvement, et revenir de façon prévisible construit la confiance dans votre retour.",detail_en:"Goldman explains that leaving without warning worsens anxiety over time: the baby no longer knows when you might disappear. Announcing your departure, even briefly, and returning predictably builds trust in your return."}},
    {topic:"Les premiers « non » : poser le cadre sans dramatiser",topic_en:"First 'no's: setting boundaries without drama",advice:"Vers 8–10 mois, votre bébé commence à comprendre l'interdiction comme signal social — pas encore comme règle abstraite. Un « non » ferme, calme et répété est plus efficace qu'un long discours. Inutile de s'énerver : la régularité fait le travail, pas l'intensité.",advice_en:"Around 8–10 months, your baby starts to understand prohibition as a social signal — not yet as an abstract rule. A firm, calm, repeated 'no' is more effective than a long speech. There is no need to get angry: regularity does the work, not intensity.",tip:"Non aux prises de risques physiques : systématique, calme, bref. Non aux tout petits désagréments : choisissez vos batailles.",tip_en:"No to physical risks: systematic, calm, brief. No to minor annoyances: pick your battles.",ref:{label:"Limites précoces",detail:"Goldman insiste : les premiers « non » ne sont pas une punition mais une information. Ce que le bébé apprend, c'est que le monde a des contours — et que ce cadre est géré par un adulte fiable. C'est sécurisant, pas répressif.",detail_en:"Goldman insists: the first 'nos' are not a punishment but information. What the baby learns is that the world has boundaries — and that this framework is managed by a reliable adult. That is reassuring, not repressive."}},
    {topic:"Diversification et goût : ne pas forcer, mais proposer",topic_en:"Weaning and taste: don't force, but offer",advice:"Le rejet d'un aliment à cet âge n'est pas un caprice — c'est de la néophobie alimentaire, un mécanisme évolutif normal. Goldman rappelle qu'il faut en moyenne 10–15 expositions répétées avant qu'un enfant accepte un nouvel aliment. Forcer crée de l'aversion ; proposer sans pression laisse la porte ouverte.",advice_en:"Rejecting a food at this age is not a fussy phase — it is food neophobia, a normal evolutionary mechanism. Goldman points out that on average 10–15 repeated exposures are needed before a child accepts a new food. Forcing creates aversion; offering without pressure keeps the door open.",tip:"Proposez, ne forcez pas. Mangez vous-même l'aliment rejeté avec plaisir devant lui.",tip_en:"Offer, don't force. Eat the rejected food yourself with obvious enjoyment in front of them.",ref:{label:"Néophobie alimentaire",detail:"Ce phénomène est bien documenté en psychologie du développement. Goldman le cite régulièrement pour dédramatiser : un enfant qui refuse les haricots verts à 9 mois n'est pas un enfant difficile, c'est un enfant normal.",detail_en:"This phenomenon is well documented in developmental psychology. Goldman cites it regularly to normalise: a child who refuses green beans at 9 months is not a difficult child — they are a normal child."}},
  ]},
  {minMonths:12,maxMonths:20,pool:[
    {topic:"La frustration saine : ce n'est pas votre ennemi",topic_en:"Healthy frustration: it's not your enemy",advice:"Entre 12 et 20 mois, tolérer une petite frustration est une compétence qui s'apprend — comme marcher. Un enfant qui ne supporte aucune attente, aucun refus, sera en grande difficulté à l'école. Ne pas répondre immédiatement à chaque demande n'est pas un manque d'amour : c'est de l'éducation.",advice_en:"Between 12 and 20 months, tolerating a small frustration is a skill that is learned — like walking. A child who cannot bear any waiting, any refusal, will struggle greatly at school. Not responding immediately to every request is not a lack of love: it is education.",tip:"Attendre 30 secondes avant de répondre à une demande non urgente, c'est déjà enseigner la frustration saine.",tip_en:"Waiting 30 seconds before responding to a non-urgent request is already teaching healthy frustration.",ref:{label:"Tolérance à la frustration",detail:"Goldman est précise sur ce point dans ses conférences : le parent qui répond à tout, immédiatement, prive l'enfant d'une expérience fondamentale — apprendre que le monde ne s'organise pas autour de ses désirs instantanés. Cette compétence est prédictive de la réussite scolaire et sociale.",detail_en:"Goldman is precise on this in her talks: the parent who responds to everything, immediately, deprives the child of a fundamental experience — learning that the world does not revolve around their instant desires. This skill predicts academic and social success."}},
    {topic:"Marche et chutes : laisser faire sans anxiété",topic_en:"Walking and falls: let it happen without anxiety",advice:"Autour de 12–14 mois, les chutes sont inévitables et nécessaires. La réaction du parent conditionne la réaction de l'enfant : si vous paniquez à chaque chute, l'enfant apprend que tomber est dangereux. Une chute sans risque réel mérite un regard calme et un « allez, on se relève ! ».",advice_en:"Around 12–14 months, falls are inevitable and necessary. The parent's reaction conditions the child's reaction: if you panic at every fall, the child learns that falling is dangerous. A fall with no real risk deserves a calm look and an 'up you get!'",tip:"Regardez la chute en face. Si vous n'êtes pas inquiet, votre bébé ne le sera probablement pas non plus.",tip_en:"Look at the fall calmly. If you are not worried, your baby probably won't be either.",ref:{label:"Apprentissage par l'expérience",detail:"Goldman cite les recherches sur la référenciation sociale : avant de réagir, le bébé regarde l'expression du parent pour calibrer sa propre réponse émotionnelle. Un parent anxieux produit un enfant plus craintif.",detail_en:"Goldman cites social referencing research: before reacting, the baby looks at the parent's expression to calibrate their own emotional response. An anxious parent produces a more fearful child."}},
    {topic:"Sommeil à 12–18 mois : les associations qui durent",topic_en:"Sleep at 12–18 months: the associations that last",advice:"Si votre enfant de 12–18 mois ne s'endort que dans vos bras ou au biberon, l'association est solidement installée. Goldman est directe : ça ne se résout pas seul. Plus on attend, plus c'est difficile. Modifier ces associations demande quelques nuits difficiles — mais le bénéfice pour tous est réel et durable.",advice_en:"If your 12–18-month-old only falls asleep in your arms or at the bottle, the association is firmly established. Goldman is direct: it won't resolve itself. The longer you wait, the harder it is. Modifying these associations requires a few difficult nights — but the benefit for everyone is real and lasting.",tip:"Un rituel prévisible (bain → histoire → chanson → lit éveillé) remplace progressivement les associations problématiques.",tip_en:"A predictable ritual (bath → story → song → awake in bed) gradually replaces problematic associations.",ref:{label:"Associations d'endormissement",detail:"Dans \"Comprendre et accompagner les enfants difficiles\" (Odile Jacob), Goldman consacre un chapitre aux troubles du sommeil : elle distingue les causes organiques (rares) des causes comportementales (fréquentes et traitables) et propose des protocoles gradués adaptés à chaque famille.",detail_en:"In 'Comprendre et accompagner les enfants difficiles' (Odile Jacob), Goldman devotes a chapter to sleep disorders: she distinguishes organic causes (rare) from behavioural causes (frequent and treatable) and proposes graduated protocols adapted to each family."}},
  ]},
  {minMonths:20,maxMonths:36,pool:[
    {topic:"Les colères : normales, mais pas illimitées",topic_en:"Tantrums: normal, but not unlimited",advice:"Entre 18 mois et 3 ans, les crises de colère sont neurologiquement inévitables — le cortex préfrontal (siège du contrôle) est encore très immature. Mais « normal » ne signifie pas « acceptable partout ». Goldman distingue comprendre la colère (toujours) et y céder (jamais sous la pression).",advice_en:"Between 18 months and 3 years, tantrums are neurologically inevitable — the prefrontal cortex (the control centre) is still very immature. But 'normal' does not mean 'acceptable everywhere'. Goldman distinguishes understanding the anger (always) from giving in to it (never under pressure).",tip:"Attendez que la crise soit passée pour discuter. Pendant la tempête, les mots ne passent pas.",tip_en:"Wait until the tantrum has passed before talking. During the storm, words don't get through.",ref:{label:"Régulation émotionnelle précoce",detail:"Goldman explique que céder pour arrêter la crise apprend à l'enfant que crier est efficace. Tenir le cadre avec calme, même face à une crise spectaculaire, enseigne au contraire que la colère ne modifie pas les règles — et c'est rassurant pour lui.",detail_en:"Goldman explains that giving in to stop the tantrum teaches the child that screaming works. Holding the boundary calmly, even in the face of a spectacular tantrum, teaches that anger does not change the rules — and that is reassuring."}},
    {topic:"L'opposition : signe de développement, pas d'échec éducatif",topic_en:"Opposition: a sign of development, not a parenting failure",advice:"Le « non » systématique de votre enfant de 2 ans n'est pas une attaque personnelle. C'est l'exercice de son identité naissante — tester ses propres limites et les vôtres. Goldman rappelle que les enfants les plus opposants à cet âge ont souvent un fort tempérament, qui sera une richesse plus tard s'il est bien canalisé.",advice_en:"Your 2-year-old's systematic 'no' is not a personal attack. It is the exercise of their emerging identity — testing their own limits and yours. Goldman points out that the most oppositional children at this age often have a strong temperament, which will be an asset later if well channelled.",tip:"Proposez des choix réels mais limités : « tu veux les chaussures rouges ou les bleues ? » Ça donne du pouvoir sans laisser le chaos s'installer.",tip_en:"Offer real but limited choices: 'do you want the red shoes or the blue ones?' That gives power without letting chaos take over.",ref:{label:"Autonomisation par l'opposition",detail:"Goldman s'appuie sur les stades d'individuation de Margaret Mahler : l'enfant de 2 ans qui dit non affirme « je suis une personne distincte de toi ». C'est un progrès développemental, pas une régression éducative.",detail_en:"Goldman draws on Margaret Mahler's individuation stages: the 2-year-old who says no is asserting 'I am a person distinct from you'. That is developmental progress, not educational regression."}},
    {topic:"Propreté : le rythme de l'enfant, sans pression",topic_en:"Potty training: the child's pace, no pressure",advice:"Goldman est claire : avant 2 ans, le système nerveux autonome ne permet pas le contrôle sphinctérien conscient. Trop précoce = stress inutile. L'âge moyen d'acquisition est 2,5–3 ans. Les comparaisons avec la voisine ou la crèche ne doivent pas dicter votre timing.",advice_en:"Goldman is clear: before 2 years, the autonomic nervous system does not allow conscious sphincter control. Too early = unnecessary stress. The average age of acquisition is 2.5–3 years. Comparisons with the neighbour or the nursery should not dictate your timing.",tip:"Trois signaux de maturité : annoncer quand il fait, rester sec 2h, montrer de l'intérêt pour les toilettes. Attendre ces signaux avant de commencer.",tip_en:"Three maturity signals: announcing when they are going, staying dry for 2 hours, showing interest in the toilet. Wait for these signals before starting.",ref:{label:"Acquisition de la propreté",detail:"Goldman explique que la pression précoce peut créer des résistances durables. Un enfant prêt acquiert la propreté en quelques jours. Un enfant pas prêt peut prendre des mois avec beaucoup de tension — le rapport coût/bénéfice ne plaide pas pour la précocité forcée.",detail_en:"Goldman explains that early pressure can create lasting resistance. A ready child acquires continence in a few days. An unready child may take months with a lot of tension — the cost/benefit ratio does not favour forced earliness."}},
  ]},
  {minMonths:36,maxMonths:60,pool:[
    {topic:"Caprices vs besoins : apprendre à distinguer",topic_en:"Whims vs. needs: learning to distinguish",advice:"À partir de 3 ans, l'enfant a les capacités cognitives pour tester stratégiquement les limites. Un caprice est une demande qui change de nature selon votre réponse — il pleure si vous dites non, s'arrête net si vous dites oui. Un besoin reste, lui, indépendant de votre réaction. Goldman enseigne à poser la question : est-ce que ça change si je tiens ma position ?",advice_en:"From age 3, a child has the cognitive ability to strategically test limits. A whim is a request that changes nature depending on your response — they cry if you say no, stop immediately if you say yes. A need, on the other hand, remains regardless of your reaction. Goldman teaches you to ask: does it change if I hold my position?",tip:"Face à un caprice : calme, fermeté, répétition. Une seule explication suffit — pas de négociation en boucle.",tip_en:"Facing a whim: calm, firmness, repetition. One explanation is enough — no looping negotiations.",ref:{label:"\"Comprendre et accompagner les enfants difficiles\"",detail:"Goldman y développe cette distinction fondamentale. Elle rappelle que les enfants dont les parents cèdent aux caprices par épuisement développent plus d'anxiété — l'absence de limite est déstabilisante. Un cadre ferme et bienveillant est sécurisant.",detail_en:"Goldman develops this fundamental distinction throughout the book. She notes that children whose parents give in to whims out of exhaustion develop more anxiety — the absence of a limit is destabilising. A firm and caring framework is reassuring."}},
    {topic:"Peurs nocturnes : ne pas minimiser, ne pas amplifier",topic_en:"Night fears: don't minimize, don't amplify",advice:"Entre 3 et 5 ans, les peurs du noir, des monstres, des bruits sont universelles et reflètent le développement de l'imagination. Goldman conseille de valider l'émotion sans valider la menace : « Je comprends que tu aies peur, et je sais qu'il n'y a pas de monstre. » Rester dans la chambre jusqu'à l'endormissement crée une dépendance.",advice_en:"Between 3 and 5 years, fears of the dark, monsters, and noises are universal and reflect the development of imagination. Goldman advises validating the emotion without validating the threat: 'I understand you're scared, and I know there is no monster.' Staying in the room until they fall asleep creates dependency.",tip:"Une veilleuse, un doudou, un rituel rassurant — mais pas votre présence prolongée. Ça maintient la peur.",tip_en:"A night light, a soft toy, a reassuring ritual — but not your prolonged presence. That maintains the fear.",ref:{label:"Peurs développementales",detail:"Goldman distingue peur normale (intense mais circonscrite à l'âge) et phobie (persistante, envahissante, résistante à la réassurance). La peur du noir à 4 ans : normale. La même peur sévère à 8 ans avec évitement généralisé : consultation recommandée.",detail_en:"Goldman distinguishes normal fear (intense but confined to the age) from phobia (persistent, invasive, resistant to reassurance). Fear of the dark at 4: normal. The same severe fear at 8 with generalised avoidance: consultation recommended."}},
    {topic:"Mensonge à 3–5 ans : pas une faute morale",topic_en:"Lying at 3–5: not a moral failing",advice:"L'enfant qui commence à mentir vers 3–4 ans fait preuve d'une capacité cognitive sophistiquée : la théorie de l'esprit (comprendre que l'autre ne sait pas ce que lui sait). Ce n'est pas un défaut de caractère — c'est une étape. La réponse éducative consiste à valoriser la vérité sans criminaliser le mensonge.",advice_en:"A child who starts lying around age 3–4 is demonstrating a sophisticated cognitive ability: theory of mind (understanding that the other person doesn't know what they know). This is not a character flaw — it is a stage. The educational response consists of valuing truth without criminalising lying.",tip:"« Je préfère que tu me dises la vérité — même quand c'est difficile. » plutôt que « Tu mens ! C'est très mal ! »",tip_en:"'I prefer you to tell me the truth — even when it's hard.' rather than 'You're lying! That's very bad!'",ref:{label:"Développement moral",detail:"Goldman cite les recherches de Paul Ekman et les études canadiennes de Kang Lee sur le développement du mensonge chez l'enfant : à 4 ans, 90 % des enfants mentent. C'est un signe de développement cognitif, pas de perversité morale.",detail_en:"Goldman cites the research of Paul Ekman and Kang Lee's Canadian studies on the development of lying in children: at age 4, 90% of children lie. It is a sign of cognitive development, not moral perversity."}},
  ]},
  {minMonths:60,maxMonths:96,pool:[
    {topic:"Confiance en soi : elle se construit par la compétence, pas les compliments",topic_en:"Self-confidence builds through competence, not compliments",advice:"Dire à votre enfant qu'il est « le plus intelligent » ou « le meilleur » peut paradoxalement fragiliser sa confiance en soi — il évite ensuite les défis pour ne pas perdre cette image. Goldman s'appuie sur les travaux de Carol Dweck : le praise efficace porte sur l'effort, pas sur le résultat.",advice_en:"Telling your child they are 'the most intelligent' or 'the best' can paradoxically undermine their self-confidence — they then avoid challenges to protect that image. Goldman draws on Carol Dweck's work: effective praise focuses on effort, not result.",tip:"« Tu as vraiment persévéré sur ce puzzle » plutôt que « Tu es doué ». Le premier compliment est inconditionnellement vrai.",tip_en:"'You really persevered on that puzzle' rather than 'You're gifted'. The first compliment is unconditionally true.",ref:{label:"Growth mindset et estime de soi",detail:"Goldman intègre dans ses conférences les recherches de Carol Dweck (Mindset, 2006) : les enfants loués sur leur intelligence deviennent plus rigides et évitent les échecs. Ceux loués sur l'effort deviennent plus résilients. Un principe applicable dès 5 ans.",detail_en:"Goldman incorporates Carol Dweck's research (Mindset, 2006) in her talks: children praised for their intelligence become more rigid and avoid failure. Those praised for effort become more resilient. A principle applicable from age 5."}},
    {topic:"École : quand l'enfant dit « je n'aime pas l'école »",topic_en:"School: when your child says \"I don't like school\"",advice:"Entre 5 et 8 ans, « je n'aime pas l'école » peut signifier beaucoup de choses : fatigue, relation difficile avec un enseignant, problème social, ou simple souhait d'être à la maison. Goldman conseille de creuser sans dramatiser : demander le nom d'un ami, le meilleur moment de la journée, ce qui est difficile. L'évitement scolaire s'installe rarement du jour au lendemain.",advice_en:"Between 5 and 8 years, 'I don't like school' can mean many things: tiredness, a difficult relationship with a teacher, a social problem, or simply wanting to be at home. Goldman advises digging without dramatising: ask for a friend's name, the best moment of the day, what is difficult. School avoidance rarely sets in overnight.",tip:"Ne jamais valider l'idée que l'école est une option. Mais toujours chercher ce qui se cache derrière le rejet.",tip_en:"Never validate the idea that school is optional. But always look for what is hiding behind the rejection.",ref:{label:"Refus scolaire et phobie scolaire",detail:"Goldman distingue clairement la plainte du matin (normale, transitoire) du refus scolaire anxieux (envahissant, avec symptômes somatiques, nécessitant un accompagnement). La frontière est la durée, l'intensité et l'impact sur le quotidien.",detail_en:"Goldman clearly distinguishes the morning complaint (normal, transient) from anxious school refusal (invasive, with somatic symptoms, requiring support). The border is duration, intensity, and impact on daily life."}},
    {topic:"Frères et sœurs : la jalousie est saine si elle est nommée",topic_en:"Siblings: jealousy is healthy when named",advice:"Les conflits entre frères et sœurs sont inévitables — et utiles. Ils apprennent la négociation, la gestion des émotions, la réparation. Goldman déconseille d'arbitrer systématiquement : cela enseigne aux enfants à attendre l'intervention d'un adulte plutôt que de résoudre eux-mêmes. Intervenir en cas de violence physique seulement.",advice_en:"Sibling conflicts are inevitable — and useful. They teach negotiation, emotion management, and repair. Goldman advises against systematically arbitrating: it teaches children to wait for adult intervention rather than resolving things themselves. Intervene only in cases of physical violence.",tip:"« Vous avez un problème ensemble. Je vous fais confiance pour le résoudre. Je suis là si vous avez besoin. »",tip_en:"'You have a problem together. I trust you to solve it. I'm here if you need me.'",ref:{label:"Conflits fraternels",detail:"Goldman rappelle que l'enfant qui n'a jamais géré de conflit avec un pair (ou un frère/sœur) sera désarmé face aux conflits de l'école. La fratrie est le premier terrain d'entraînement social — un terrain rugueux, mais précieux.",detail_en:"Goldman points out that a child who has never managed a conflict with a peer (or a sibling) will be defenceless in the face of school conflicts. The sibling relationship is the first social training ground — rough, but precious."}},
  ]},
  {minMonths:96,maxMonths:999,pool:[
    {topic:"Préadolescence : l'autorité doit évoluer, pas disparaître",topic_en:"Pre-adolescence: authority must evolve, not disappear",advice:"Vers 8–10 ans, l'enfant commence à remettre en question l'autorité parentale — c'est sain et attendu. Ce n'est pas le moment de tout lâcher ni de tout rigidifier. Goldman préconise de passer d'une autorité de statut (« parce que je le dis ») à une autorité de sens (« parce que c'est important, et voilà pourquoi »). L'explication ne remplace pas la règle, elle la légitime.",advice_en:"Around 8–10 years, children start questioning parental authority — this is healthy and expected. This is not the time to let everything go or to tighten everything up. Goldman advocates moving from status authority ('because I say so') to meaningful authority ('because it matters, and here's why'). Explanation does not replace the rule — it legitimises it.",tip:"Donnez de vraies explications, mais ne négociez pas indéfiniment. « Je t'ai expliqué, maintenant c'est comme ça. »",tip_en:"Give real explanations, but don't negotiate indefinitely. 'I've explained it, now that's how it is.'",ref:{label:"Autorité parentale et préadolescence",detail:"Goldman insiste : les parents qui abandonnent toute autorité par peur du conflit créent un vide que l'enfant comble souvent par de l'anxiété ou de l'agitation. L'autorité bienveillante est un acte de soin, pas de domination.",detail_en:"Goldman insists: parents who abandon all authority for fear of conflict create a void the child often fills with anxiety or agitation. Caring authority is an act of care, not domination."}},
    {topic:"Écrans : l'enjeu n'est pas le temps, c'est le contenu et le contexte",topic_en:"Screens: the issue isn't time, it's content and context",advice:"Goldman recadre le débat sur les écrans : l'heure passée devant une série seul dans le noir n'est pas équivalente à l'heure passée à jouer à un jeu avec un parent. Le contenu (passif vs actif, violent vs créatif) et le contexte (seul vs accompagné, la nuit vs le jour) importent plus que la durée brute.",advice_en:"Goldman reframes the screen debate: an hour spent watching a series alone in the dark is not equivalent to an hour playing a game with a parent. Content (passive vs active, violent vs creative) and context (alone vs together, at night vs daytime) matter more than raw duration.",tip:"La règle des 3 C de Goldman : Contenu adapté, Contexte partagé, Cohérence dans les limites.",tip_en:"Goldman's 3 Cs rule: appropriate Content, shared Context, Consistency in limits.",ref:{label:"Enfants et écrans",detail:"Goldman cite les méta-analyses récentes qui nuancent l'effet global des écrans : l'impact négatif est concentré sur la consommation passive, nocturne et solitaire. Elle déconseille d'interdire totalement — la frustration crée une fascination accrue.",detail_en:"Goldman cites recent meta-analyses that nuance the overall effect of screens: the negative impact is concentrated on passive, nocturnal and solitary consumption. She advises against total bans — the frustration creates heightened fascination."}},
    {topic:"Confiance en l'école : ne pas saper l'autorité de l'enseignant",topic_en:"Trust in school: don't undermine the teacher's authority",advice:"Critiquer l'enseignant devant votre enfant le place dans une situation de double bind : à qui obéir ? Goldman est ferme : même si vous avez des désaccords avec l'enseignant, les régler directement avec l'école — pas via votre enfant. Un enfant qui sent ses parents alliés de l'école est plus serein.",advice_en:"Criticising the teacher in front of your child places them in a double bind: who to obey? Goldman is firm: even if you have disagreements with the teacher, deal with them directly with the school — not via your child. A child who feels their parents are allied with the school is more settled.",tip:"En cas de problème réel : rendez-vous avec l'enseignant, sans votre enfant, en cherchant à comprendre avant de conclure.",tip_en:"If there's a real problem: a meeting with the teacher, without your child, seeking to understand before concluding.",ref:{label:"Relation école-famille",detail:"Goldman analyse les effets de la dévalorisation parentale de l'autorité scolaire sur l'enfant : elle augmente les comportements d'opposition en classe et réduit les apprentissages. La cohérence adulte-adulte est protectrice pour l'enfant.",detail_en:"Goldman analyses the effects of parental devaluation of school authority on the child: it increases oppositional behaviour in class and reduces learning. Adult-adult consistency is protective for the child."}},
  ]},
];

function getCarolineEntry(ageMonths,doy){
  const range=carolineData.find(r=>ageMonths>=r.minMonths&&ageMonths<r.maxMonths)||carolineData[carolineData.length-1];
  return range.pool[doy%range.pool.length];
}

// ═══════════════════════ PRENATAL/FRATRIE HELPERS ═══════════════════════
function isUnborn(c){return new Date(c.birthDate+'T12:00:00')>new Date();}
function getGestWeeks(c){const due=new Date(c.birthDate+'T12:00:00'),now=new Date(),daysUntil=Math.ceil((due-now)/86400000);return Math.round(40-daysUntil/7);}
function getDaysUntilDue(c){return Math.max(0,Math.ceil((new Date(c.birthDate+'T12:00:00')-new Date())/86400000));}
function getPrenatalData(gestWeeks){return prenatal.find(p=>gestWeeks>=p.minW&&gestWeeks<p.maxW)||prenatal[prenatal.length-1];}
function getFratriePrep(ageMonths){return fratriePrep.find(f=>ageMonths>=f.minM&&ageMonths<f.maxM)||fratriePrep[fratriePrep.length-1];}
function getFratrieBond(gapMonths){return fratrieBond.find(f=>gapMonths>=f.minG&&gapMonths<f.maxG)||fratrieBond[fratrieBond.length-1];}
function getGapMonths(olderChild,youngerChild){const a=new Date(olderChild.birthDate+'T12:00:00'),b=new Date(youngerChild.birthDate+'T12:00:00');return Math.round(Math.abs(b-a)/2629800000);}
function getSiblings(idx){return S.children.filter((_,i)=>i!==idx);}

// ═══════════════════════ THEME ═══════════════════════
function applyTheme(mode){
  const dark=mode==='dark'||(mode==='auto'&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
}
function setTheme(mode){
  localStorage.setItem('bebe_theme',mode);
  applyTheme(mode);
  render();
}
function initTheme(){
  const saved=localStorage.getItem('bebe_theme')||'auto';
  applyTheme(saved);

function getMilestoneForAge(d){const p=milestones.filter(m=>d>=m.minDays&&d<m.maxDays);const a=p.length?p:[milestones[milestones.length-1]];return a[Math.floor(Date.now()/86400000)%a.length];}
function getAgeLabel(d,s){
  const en=S.lang==='en';
  if(d<7)return`${d} ${d>1?(en?t('ageUnit_days_p'):t('ageUnit_days_p')):(en?t('ageUnit_days_s'):t('ageUnit_days_s'))}`;
  if(d<30){const w=Math.floor(d/7);return`${w} ${w>1?t('ageUnit_weeks'):t('ageUnit_week')}`;}
  const n=new Date(),b=new Date(s+'T12:00:00');
  let y=n.getFullYear()-b.getFullYear(),m=n.getMonth()-b.getMonth();
  if(n.getDate()<b.getDate())m--;if(m<0){y--;m+=12;}
  if(en){
    if(y===0)return`${m} ${t('ageUnit_month')}`;
    if(m>0)return`${y} ${y>1?t('ageUnit_years'):t('ageUnit_year')} ${t('ageUnit_and')} ${m} ${t('ageUnit_month')}`;
    return`${y} ${y>1?t('ageUnit_years'):t('ageUnit_year')}`;
  }
  if(y===0)return`${m} mois`;
  if(m>0)return`${y} an${y>1?'s':''} et ${m} mois`;
  return`${y} an${y>1?'s':''}`;
}
function getNeuronStats(d,bk){
  let daily;
  if(d<365)daily=60e6+Math.floor(Math.random()*5e6);
  else if(d<730)daily=45e6+Math.floor(Math.random()*4e6);
  else if(d<1095)daily=30e6+Math.floor(Math.random()*3e6);
  else if(d<1825)daily=15e6+Math.floor(Math.random()*2e6);
  else daily=8e6+Math.floor(Math.random()*1e6);
  // Persist once per day for chart
  if(bk){
    const hk='bebeNH_'+bk,t=new Date().toISOString().split('T')[0];
    const h=JSON.parse(localStorage.getItem(hk)||'{}');
    if(!h[t]){h[t]=daily;const ks=Object.keys(h).sort().slice(-30),r={};ks.forEach(k=>r[k]=h[k]);localStorage.setItem(hk,JSON.stringify(r));}
  }
  return{daily,total:50e12+Math.min(d,1095)*50e6};
}
// Returns 14 days of neuron data (stored + estimated for missing days)
function getNeuronHistory(c,ageInDays){
  const hk='bebeNH_'+c.birthDate;
  const h=JSON.parse(localStorage.getItem(hk)||'{}');
  const pts=[];
  for(let i=13;i>=0;i--){
    const dt=new Date(Date.now()-i*86400000),ds=dt.toISOString().split('T')[0];
    let v=h[ds];
    if(!v){
      // deterministic estimate for missing days
      const da=Math.max(0,ageInDays-i),s=(da*1234567)%1000;
      if(da<365)v=60e6+s*5000;else if(da<730)v=45e6+s*4000;else if(da<1095)v=30e6+s*3000;else if(da<1825)v=15e6+s*2000;else v=8e6+s*1000;
    }
    pts.push({ds,v});
  }
  return pts;
}
function fmt(n){if(n>=1e12)return(n/1e12).toFixed(1)+' billion';if(n>=1e9)return(n/1e9).toFixed(1)+' milliard';if(n>=1e6)return(n/1e6).toFixed(1)+' million';return n.toLocaleString('fr-FR');}
function getDailySectionEntry(id,months,doy){const entries=sections_data[id]||[];let pool=entries.filter(e=>months>=e.minMonths&&months<=e.maxMonths);if(!pool.length)pool=[...entries].sort((a,b)=>Math.abs((a.minMonths+a.maxMonths)/2-months)-Math.abs((b.minMonths+b.maxMonths)/2-months)).slice(0,5);return pool[doy%pool.length];}
function getDayOfYear(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);}

    q:"Va-t-il chercher et t'apporter un objet précis que tu lui demandes, même si l'objet est dans une autre pièce ?",q_en:"Will they go and fetch a specific object you ask for, even if it's in another room?"},

  {track:"comp",m:20,minMonths:17,maxMonths:26,
    t:"Comprend une consigne en deux étapes",t_en:"Follows a two-step instruction",
    summary:"Il comprend maintenant une séquence — preuve que le langage et la mémoire coopèrent.",
    summary_en:"They now understand a sequence — proof that language and memory are cooperating.",
    detail:"Une consigne à deux étapes (« prends tes chaussures et viens me les donner ») exige que l'enfant maintienne deux informations en mémoire de travail, les séquence et les exécute dans l'ordre. Cette capacité émerge généralement entre 18 et 24 mois et est l'un des indicateurs utilisés dans les bilans de développement pédiatriques standardisés.",
    detail_en:"A two-step instruction ('get your shoes and bring them to me') requires the child to hold two pieces of information in working memory, sequence them, and execute them in order. This ability typically emerges between 18 and 24 months and is one of the indicators used in standardised paediatric developmental assessments.",
    refs:["AAP (2020). Developmental milestones: 18 and 24 months. Healthy Children.","Gathercole, S. E. (1998). The development of memory. Journal of Child Psychology & Psychiatry."],
    q:"Suit-il une consigne en deux étapes — par exemple « prends ton manteau et mets-le sur la chaise » — sans que tu aies besoin de répéter ?",q_en:"Do they follow a two-step instruction — like 'get your jacket and put it on the chair' — without you needing to repeat?"},

  {track:"prag",m:21,minMonths:18,maxMonths:28,
    t:"Nomme spontanément les choses",t_en:"Names things on their own",
    summary:"Il passe de « répéter quand on lui demande » à « nommer de lui-même » — une étape qualitative.",
    summary_en:"They shift from 'repeating when asked' to 'naming on their own' — a qualitative step.",
    detail:"Le naming spontané signale que le mot appartient maintenant à l'enfant, pas seulement à la situation d'apprentissage. Au lieu d'attendre qu'on lui demande « c'est quoi ? », il commence à commenter son environnement de lui-même : « chien ! », « balle ! ». Ce comportement dit « de commentaire » est un puissant moteur de l'accélération lexicale — l'enfant crée ses propres occasions d'apprendre.",
    detail_en:"Spontaneous naming signals that the word now belongs to the child, not just to the learning situation. Instead of waiting to be asked 'what's that?', they begin to comment on their environment on their own: 'dog!', 'ball!'. This 'commenting' behaviour is a powerful driver of lexical acceleration — the child creates their own learning opportunities.",
    refs:["Tomasello, M. & Farrar, M. J. (1986). Joint attention and early language. Child Development.","Hoff, E. (2006). How social contexts support and shape language development. Developmental Review."],
    q:"Nomme-t-il spontanément des objets ou des personnes familières, sans qu'on lui demande — juste parce qu'il les voit ?",q_en:"Do they spontaneously name familiar objects or people, unprompted — just because they see them?"},

  {track:"gram",m:22,minMonths:18,maxMonths:30,
    t:"Combine deux mots",t_en:"Two-word combinations",
    summary:"Les deux premiers mots mis ensemble marquent l'entrée dans la syntaxe — le début de la grammaire.",
    summary_en:"The first two words put together mark the entry into syntax — the beginning of grammar.",
    detail:"Roger Brown (1973) a montré que cette étape est universelle dans toutes les langues étudiées. Les premières combinaisons (« encore lait », « papa parti », « doudou là ») suivent une logique sémantique avant une logique grammaticale : l'enfant exprime des relations (possession, localisation, action) avant de maîtriser les règles formelles. C'est l'une des acquisitions les plus spectaculaires du développement humain.",
    detail_en:"Roger Brown (1973) showed this stage is universal across all languages studied. The first combinations ('more milk', 'daddy gone', 'blanky there') follow a semantic logic before a grammatical one: the child expresses relationships (possession, location, action) before mastering formal rules. It is one of the most spectacular acquisitions in human development.",
    refs:["Brown, R. (1973). A First Language: The Early Stages. Harvard University Press.","Braine, M. D. S. (1976). Children's first word combinations. Monographs SRCD."],
    q:"Assemble-t-il deux mots pour exprimer une idée — comme « encore lait », « papa viens » ou « chien là » ?",q_en:"Do they put two words together to express an idea — like 'more milk', 'daddy come', or 'dog there'?"},

  {track:"voc",m:24,minMonths:20,maxMonths:32,
    t:"Cinquante mots et mini-phrases",t_en:"Fifty words and mini-sentences",
    summary:"À 2 ans, le langage devient un vrai outil : il peut exprimer ses besoins, ses observations, ses désirs.",
    summary_en:"At age 2, language becomes a real tool: they can express needs, observations, desires.",
    detail:"La plupart des enfants de 24 mois ont un vocabulaire expressif de 50 à 200 mots et commencent à assembler des bouts de phrase. Rescorla (1989) a identifié que les enfants de 24 mois avec moins de 50 mots (qu'il appelle « late talkers ») méritent un suivi : 50-60% rattrapent leur retard seuls, mais 40-50% bénéficient d'une intervention précoce. C'est donc un bon âge pour une évaluation si tu as des doutes.",
    detail_en:"Most 24-month-olds have an expressive vocabulary of 50 to 200 words and begin assembling word phrases. Rescorla (1989) identified that 24-month-olds with fewer than 50 words ('late talkers') warrant monitoring: 50–60% catch up on their own, but 40–50% benefit from early intervention. So it's a good age for an evaluation if you have concerns.",
    refs:["Rescorla, L. (1989). The Language Development Survey. Journal of Speech & Hearing Disorders.","Fenson, L. et al. (1994). Variability in early communicative development. Monographs SRCD."],
    q:"Dit-il environ une cinquantaine de mots différents et assemble-t-il des mini-phrases de deux mots ou plus ?",q_en:"Do they say roughly fifty different words and put together mini-phrases of two words or more?"},

  {track:"gram",m:27,minMonths:22,maxMonths:36,
    t:"Pronoms et premières questions",t_en:"Pronouns and first questions",
    summary:"« Moi », « toi », « lui » — il se pense comme un sujet à part entière. Les questions commencent.",
    summary_en:"'Me', 'you', 'him' — they think of themselves as a subject in their own right. Questions begin.",
    detail:"L'usage des pronoms est cognitivement exigeant : il faut comprendre que le référent change selon qui parle. Chiat (1982) a montré que les erreurs de pronoms (dire « toi » pour « moi ») sont normales jusqu'à 3 ans et ne sont pas des signes d'anomalie. Les premières questions (« c'est quoi ? », « où est... ? ») montrent que le langage est devenu un outil de pensée : l'enfant s'en sert pour combler ses lacunes.",
    detail_en:"Using pronouns is cognitively demanding: the referent must be understood as changing depending on who speaks. Chiat (1982) showed that pronoun errors (saying 'you' for 'me') are normal until age 3 and are not signs of abnormality. First questions ('what's that?', 'where is...?') show that language has become a tool for thinking: the child uses it to fill knowledge gaps.",
    refs:["Chiat, S. (1982). If I were you and you were me: The analysis of pronouns in a pronoun-reversing child. Journal of Child Language.","Bloom, L. et al. (1982). Wh-questions: Linguistic factors that contribute to the sequence of acquisition. Child Development."],
    q:"Utilise-t-il « moi » ou « toi » (même avec des erreurs) et commence-t-il à poser des questions simples du type « c'est quoi ? » ou « où est papa ? » ?",q_en:"Do they use 'me' or 'you' (even with errors) and begin asking simple questions like 'what's that?' or 'where's daddy?'?"},

  {track:"gram",m:30,minMonths:24,maxMonths:40,
    t:"Phrases de trois mots",t_en:"Three-word sentences",
    summary:"Les phrases s'allongent — un étranger commence à comprendre la moitié de ce qu'il dit.",
    summary_en:"Sentences lengthen — a stranger can now understand about half of what they say.",
    detail:"À 30 mois, les phrases de 3 mots (sujet-verbe-objet ou sujet-verbe-lieu) deviennent régulières. La règle empirique des orthophonistes est qu'un enfant de 2 ans doit être compris 50% du temps par un inconnu, et un enfant de 3 ans 75% du temps. Si un inconnu ne comprend presque jamais ton enfant à 30 mois, c'est le bon moment d'en parler à un professionnel.",
    detail_en:"At 30 months, 3-word sentences (subject-verb-object or subject-verb-location) become regular. The speech therapist rule of thumb is that a 2-year-old should be understood 50% of the time by a stranger, and a 3-year-old 75% of the time. If a stranger almost never understands your child at 30 months, it is the right time to consult a professional.",
    refs:["Owens, R. E. (2015). Language Development: An Introduction (9th ed.). Pearson.","ASHA (2020). Speech Sound Development. American Speech-Language-Hearing Association."],
    q:"Fait-il des phrases de 3 mots régulièrement, et une personne qui ne le connaît pas peut-elle comprendre environ la moitié de ce qu'il dit ?",q_en:"Do they regularly make 3-word sentences, and can someone who doesn't know them understand about half of what they say?"},

  {track:"prag",m:36,minMonths:30,maxMonths:48,
    t:"Vraie conversation et récit",t_en:"Real conversation and narration",
    summary:"Il raconte, négocie, demande « pourquoi » — le langage est devenu son outil de pensée principal.",
    summary_en:"They tell stories, negotiate, ask 'why' — language has become their main thinking tool.",
    detail:"Vers 3 ans, les enfants entrent dans ce que Vygotsky appelait le « discours intérieur » : ils utilisent la langue pour réguler leur propre pensée, pas seulement pour communiquer. La période des « pourquoi » qui suit est un signe de santé cognitive remarquable — l'enfant cherche des explications causales. Nelson (1996) a montré que la capacité narrative à 3 ans prédit la réussite scolaire bien mieux que le QI mesuré au même âge.",
    detail_en:"Around age 3, children enter what Vygotsky called 'inner speech': they use language to regulate their own thinking, not only to communicate. The ensuing 'why' phase is a sign of remarkable cognitive health — the child seeks causal explanations. Nelson (1996) showed that narrative ability at age 3 predicts academic success far better than IQ measured at the same age.",
    refs:["Vygotsky, L. S. (1934/1986). Thought and Language. MIT Press.","Nelson, K. (1996). Language in Cognitive Development. Cambridge University Press."],
    q:"Tient-il une véritable petite conversation (pas juste répondre) et te raconte-t-il un événement passé avec un début et une fin ?",q_en:"Do they hold a real little conversation (not just responding) and recount a past event with a beginning and end?"},

  {track:"prag",m:24,minMonths:20,maxMonths:32,
    t:"Parle de ce qui n'est pas là",t_en:"Talks about what isn't there",
    summary:"Il évoque un objet absent ou un petit événement passé — le langage se détache de l'ici-et-maintenant.",summary_en:"They mention an absent object or a past event — language detaches from the here-and-now.",
    detail:"Quand un enfant montre son front et dit « bobo » en pointant l'endroit où il s'est cogné plus tôt, il fait de la référence déplacée : utiliser un mot pour parler de quelque chose hors du présent immédiat. Hockett rangeait ce « déplacement » parmi les propriétés qui définissent le langage humain. C'est un marqueur cognitif majeur : la mémoire autobiographique et le langage commencent à coopérer pour reconstruire le passé.",detail_en:"When a child points to their forehead and says 'ouch' pointing at where they bumped earlier, they are using displaced reference: a word to talk about something outside the immediate present. Hockett listed this 'displacement' among the properties that define human language. It is a major cognitive marker: autobiographical memory and language begin to cooperate to reconstruct the past.",
    refs:["Hockett, C. F. (1960). The Origin of Speech. Scientific American.","Tomasello, M. (2003). Constructing a Language. Harvard University Press."],
    q:"Évoque-t-il spontanément un objet absent (« où papa ? ») ou un petit événement passé (un bobo, un chien vu tout à l'heure) ?",q_en:"Do they spontaneously mention an absent object ('where daddy?') or a past event (a bump, a dog seen earlier)?"},

  {track:"prag",m:30,minMonths:26,maxMonths:42,
    t:"Fait parler ses jouets",t_en:"Makes their toys talk",
    summary:"Il prête une voix et des intentions à ses figurines — le jeu symbolique devient verbal.",summary_en:"They give a voice and intentions to their figures — symbolic play becomes verbal.",
    detail:"Faire dire « bonjour » à une peluche ou organiser un dialogue entre deux personnages révèle la capacité de représentation symbolique décrite par Leslie : l'enfant manipule des fictions tout en sachant qu'elles sont fausses. Vygotsky voyait dans ce jeu la matrice de la pensée abstraite — l'objet devient un signe que l'enfant contrôle.",detail_en:"Making a stuffed toy say 'hello' or staging a dialogue between two characters reveals the symbolic representation capacity described by Leslie: the child manipulates fictions while knowing they are not real. Vygotsky saw this play as the matrix of abstract thought — the object becomes a sign the child controls.",
    refs:["Leslie, A. M. (1987). Pretense and Representation. Psychological Review.","Vygotsky, L. S. (1978). Mind in Society. Harvard University Press."],
    q:"Fait-il parler ses jouets, leur prête-t-il une voix ou organise-t-il de petits dialogues entre eux ?",q_en:"Do they make their toys talk, give them a voice, or stage little dialogues between them?"},

  {track:"prag",m:42,minMonths:34,maxMonths:54,
    t:"Raconte une histoire en séquence",t_en:"Tells a story in sequence",
    summary:"Début, milieu, fin : il enchaîne les événements dans l'ordre — la trame narrative apparaît.",summary_en:"Beginning, middle, end: they order events in sequence — the narrative arc appears.",
    detail:"Raconter « on est allés au parc, j'ai glissé, et après on a mangé une glace » suppose d'ordonner des événements dans le temps et de les relier. Applebee a montré que les récits d'enfants évoluent de simples listes vers de vraies trames vers 4-5 ans. La capacité narrative à cet âge prédit la compréhension en lecture plusieurs années plus tard.",detail_en:"Telling 'we went to the park, I slid down, and then we had ice cream' requires ordering events in time and linking them. Applebee showed children's narratives evolve from simple lists into true arcs around age 4-5. Narrative ability at this age predicts reading comprehension years later.",
    refs:["Applebee, A. N. (1978). The Child's Concept of Story. University of Chicago Press.","Nelson, K. (1996). Language in Cognitive Development. Cambridge University Press."],
    q:"Te raconte-t-il un petit événement vécu en mettant deux ou trois actions dans le bon ordre ?",q_en:"Do they recount a small event putting two or three actions in the right order?"},

  {track:"prag",m:54,minMonths:44,maxMonths:66,
    t:"Adapte son langage à l'interlocuteur",t_en:"Adapts language to the listener",
    summary:"Il parle plus simplement à un bébé qu'à un adulte — il modélise ce que l'autre comprend.",summary_en:"They speak more simply to a baby than to an adult — modelling what the other understands.",
    detail:"Shatz et Gelman ont montré dès 1973 que des enfants de 4 ans simplifient spontanément leurs phrases quand ils s'adressent à un plus petit. Ce réglage révèle une théorie de l'esprit en action : l'enfant tient compte de ce que son interlocuteur sait et comprend, pas seulement de ce que lui-même veut dire.",detail_en:"Shatz and Gelman showed as early as 1973 that 4-year-olds spontaneously simplify their sentences when addressing a younger child. This adjustment reveals theory of mind in action: the child accounts for what the listener knows and understands, not only what they themselves want to say.",
    refs:["Shatz, M. & Gelman, R. (1973). The Development of Communication Skills. SRCD Monographs.","Tomasello, M. (2008). Origins of Human Communication. MIT Press."],
    q:"Parle-t-il différemment selon l'interlocuteur — plus simplement à un bébé, autrement à un adulte ?",q_en:"Do they speak differently depending on the listener — more simply to a baby, differently to an adult?"},

  {track:"prag",m:60,minMonths:50,maxMonths:72,
    t:"Raconte sa journée avec des détails",t_en:"Recounts their day with detail",
    summary:"Hors contexte, sans objets sous les yeux, il reconstruit un récit riche — la clé de l'écrit à venir.",summary_en:"Out of context, with nothing in sight, they rebuild a rich account — the key to future literacy.",
    detail:"Raconter sa journée à quelqu'un qui n'y était pas mobilise le « langage décontextualisé » : on ne peut pas montrer du doigt, il faut tout dire avec des mots. Snow a montré que la richesse de ces conversations à la maison prédit fortement la réussite en lecture à l'école — bien plus que le simple décodage des lettres.",detail_en:"Recounting their day to someone who wasn't there mobilises 'decontextualised language': you cannot point, everything must be carried by words. Snow showed that the richness of these home conversations strongly predicts later reading achievement — far more than letter decoding alone.",
    refs:["Snow, C. E. (1983). Literacy and Language. Harvard Educational Review.","Dickinson, D. K. & Tabors, P. O. (2001). Beginning Literacy with Language. Brookes."],
    q:"Te raconte-t-il sa journée ou un moment vécu sans que tu aies à lui poser des questions à chaque phrase ?",q_en:"Do they recount their day or an event without you having to prompt every sentence?"},

  {track:"comp",m:26,minMonths:22,maxMonths:34,
    t:"Comprend dans, sur, sous",t_en:"Understands in, on, under",
    summary:"Il situe les objets dans l'espace sur consigne verbale seule — la grammaire spatiale s'installe.",summary_en:"They place objects in space on a verbal cue alone — spatial grammar settles in.",
    detail:"Comprendre « mets le cube DANS la boîte » vs « SOUS la boîte » sans aucun geste demande de traiter une relation spatiale encodée par un seul petit mot. Bowerman a montré que ces prépositions s'acquièrent dans un ordre régulier (dans/sur avant sous/à côté) et que leur maîtrise reflète la façon dont la langue découpe l'espace.",detail_en:"Understanding 'put the block IN the box' vs 'UNDER the box' with no gesture requires processing a spatial relation encoded by a single small word. Bowerman showed these prepositions are acquired in a regular order (in/on before under/beside) and that mastering them reflects how language carves up space.",
    refs:["Bowerman, M. (1996). Learning How to Structure Space. In Language and Space, MIT Press.","Clark, E. V. (2009). First Language Acquisition. Cambridge University Press."],
    q:"Pose-t-il un objet « dans », « sur » ou « sous » quelque chose quand tu le demandes sans faire le geste ?",q_en:"Do they put an object 'in', 'on' or 'under' something when you ask without making the gesture?"},

  {track:"comp",m:32,minMonths:27,maxMonths:44,
    t:"Comprend grand, petit, encore",t_en:"Understands big, small, more",
    summary:"Il saisit des notions relatives de taille et de quantité — la comparaison entre dans le langage.",summary_en:"They grasp relative notions of size and quantity — comparison enters language.",
    detail:"« Donne-moi le GRAND », « encore un PEU » : ces mots n'ont pas de référent fixe, ils dépendent du contexte. Les comprendre suppose de comparer deux éléments, pas seulement d'étiqueter. C'est une étape vers les concepts quantitatifs qui sous-tendront plus tard les mathématiques.",detail_en:"'Give me the BIG one', 'a little MORE': these words have no fixed referent, they depend on context. Understanding them requires comparing two items, not just labelling. It is a step toward the quantitative concepts that will later underpin mathematics.",
    refs:["Clark, E. V. (2009). First Language Acquisition. Cambridge University Press.","Gentner, D. (2003). Why We're So Smart. In Language in Mind, MIT Press."],
    q:"Comprend-il « le grand », « le petit » ou « encore un peu » et agit-il en conséquence ?",q_en:"Do they understand 'the big one', 'the small one' or 'a little more' and act accordingly?"},

  {track:"comp",m:40,minMonths:34,maxMonths:52,
    t:"Suit une consigne en trois étapes",t_en:"Follows a three-step instruction",
    summary:"Il retient et exécute une suite de trois actions — la mémoire de travail verbale grandit.",summary_en:"They hold and carry out a sequence of three actions — verbal working memory grows.",
    detail:"« Prends ton manteau, mets-le sur la chaise et viens t'asseoir » : exécuter trois consignes enchaînées suppose de garder l'instruction en mémoire de travail tout en agissant. Baddeley reliait cette capacité à la « boucle phonologique », un système qui se développe nettement entre 3 et 5 ans et qui prédit l'apprentissage scolaire.",detail_en:"'Take your coat, put it on the chair, and come sit down': carrying out three chained instructions requires holding the instruction in working memory while acting. Baddeley linked this capacity to the 'phonological loop', a system that develops markedly between ages 3 and 5 and predicts school learning.",
    refs:["Baddeley, A. (2003). Working Memory and Language. Journal of Communication Disorders.","Gathercole, S. E. & Baddeley, A. (1993). Working Memory and Language. Erlbaum."],
    q:"Exécute-t-il une consigne en trois temps (« prends X, pose-le sur Y, puis viens ») sans que tu la répètes ?",q_en:"Do they carry out a three-part instruction ('take X, put it on Y, then come') without you repeating it?"},

  {track:"comp",m:54,minMonths:44,maxMonths:66,
    t:"Comprend hier, demain, après",t_en:"Understands yesterday, tomorrow, later",
    summary:"Le temps devient une dimension qu'il manipule par les mots — au-delà du seul présent.",summary_en:"Time becomes a dimension they manipulate through words — beyond the present alone.",
    detail:"Comprendre « on ira au parc demain » suppose de se projeter dans un temps qui n'existe pas encore perceptivement. Busby et Suddendorf ont montré que la maîtrise verbale d'« hier » et « demain » émerge vers 4-5 ans et accompagne le « voyage mental dans le temps » — la capacité à se représenter le passé et l'avenir.",detail_en:"Understanding 'we'll go to the park tomorrow' requires projecting into a time that does not yet perceptually exist. Busby and Suddendorf showed that verbal mastery of 'yesterday' and 'tomorrow' emerges around age 4-5 and accompanies 'mental time travel' — the ability to represent past and future.",
    refs:["Busby, J. & Suddendorf, T. (2005). Recalling Yesterday and Predicting Tomorrow. Cognitive Development.","Friedman, W. J. (2005). Developmental Perspectives on the Psychology of Time."],
    q:"Comprend-il « hier », « demain » ou « tout à l'heure » et les utilise-t-il à peu près correctement ?",q_en:"Do they understand 'yesterday', 'tomorrow' or 'later' and use them roughly correctly?"},

  {track:"comp",m:60,minMonths:50,maxMonths:72,
    t:"Saisit les devinettes et l'humour des mots",t_en:"Gets riddles and word humour",
    summary:"Il joue avec le double sens, comprend une devinette — la conscience métalinguistique éclôt.",summary_en:"They play with double meanings, get a riddle — metalinguistic awareness blooms.",
    detail:"Rire d'un jeu de mots ou résoudre une devinette suppose de traiter le langage comme un objet en soi, manipulable — pas seulement comme un canal vers le sens. Cette « conscience métalinguistique » que décrit Gombert est un prédicteur solide de l'apprentissage de la lecture, car lire exige justement de réfléchir sur les sons et les mots.",detail_en:"Laughing at a pun or solving a riddle requires treating language as an object in itself, manipulable — not just a channel to meaning. This 'metalinguistic awareness' described by Gombert is a strong predictor of learning to read, because reading precisely demands reflecting on sounds and words.",
    refs:["Gombert, J. E. (1992). Metalinguistic Development. University of Chicago Press.","Cazden, C. B. (1976). Play with Language and Metalinguistic Awareness."],
    q:"Comprend-il une devinette simple ou rit-il d'un jeu de mots, d'un mot rigolo employé exprès ?",q_en:"Do they get a simple riddle or laugh at a pun, a silly word used on purpose?"},

  {track:"voc",m:26,minMonths:22,maxMonths:34,
    t:"L'explosion du vocabulaire",t_en:"The vocabulary explosion",
    summary:"Les mots arrivent par dizaines chaque semaine — un nouveau mot suffit parfois d'une seule écoute.",summary_en:"Words arrive by the dozen each week — sometimes a single hearing is enough.",
    detail:"Vers 18-24 mois, beaucoup d'enfants passent de quelques dizaines à plusieurs centaines de mots en quelques mois. Goldfield et Reznick ont décrit cette accélération souvent appelée « explosion lexicale ». Elle s'appuie sur le « fast mapping » : l'enfant attache un mot nouveau à un sens après une exposition minime, parfois unique.",detail_en:"Around 18-24 months, many children go from a few dozen to several hundred words in a few months. Goldfield and Reznick described this acceleration often called the 'vocabulary spurt'. It relies on 'fast mapping': the child attaches a new word to a meaning after minimal, sometimes single, exposure.",
    refs:["Goldfield, B. A. & Reznick, J. S. (1990). Early Lexical Acquisition. Journal of Child Language.","Carey, S. & Bartlett, E. (1978). Acquiring a Single New Word."],
    q:"Apprend-il visiblement de nouveaux mots très vite, plusieurs par semaine, parfois après les avoir entendus une seule fois ?",q_en:"Are they visibly learning new words very fast, several a week, sometimes after hearing them once?"},

  {track:"voc",m:36,minMonths:30,maxMonths:48,
    t:"Nomme les couleurs",t_en:"Names colours",
    summary:"Il associe le mot à la teinte — une catégorie abstraite que la langue lui apprend à découper.",summary_en:"They link the word to the hue — an abstract category language teaches them to carve.",
    detail:"Les noms de couleurs s'acquièrent étonnamment tard et lentement, souvent bien après d'autres mots concrets. La raison : la couleur est une propriété abstraite détachée de l'objet. La recherche montre que l'enfant comprend d'abord que « rouge » est ce type de mot, avant d'en stabiliser le sens exact — d'où les erreurs longtemps persistantes.",detail_en:"Colour names are acquired surprisingly late and slowly, often well after other concrete words. The reason: colour is an abstract property detached from the object. Research shows the child first grasps that 'red' is that kind of word, before stabilising its exact meaning — hence long-persisting errors.",
    refs:["Wagner, K. et al. (2013). Color Word Learning. Cognitive Psychology.","Sandhofer, C. M. & Smith, L. B. (1999). Learning Color Words."],
    q:"Nomme-t-il correctement au moins quelques couleurs quand tu lui montres un objet et demandes « c'est quelle couleur ? »",q_en:"Do they correctly name at least a few colours when you show an object and ask 'what colour is it?'"},

  {track:"voc",m:48,minMonths:40,maxMonths:60,
    t:"Range les mots en catégories",t_en:"Sorts words into categories",
    summary:"Chien et chat sont des « animaux » ; voiture et vélo des « véhicules » — le vocabulaire s'organise.",summary_en:"Dog and cat are 'animals'; car and bike are 'vehicles' — vocabulary gets organised.",
    detail:"Utiliser des mots superordonnés (« animal », « véhicule », « fruit ») montre que le lexique n'est plus une liste plate mais une structure hiérarchique. Markman a montré que les enfants supposent spontanément qu'un mot nouveau désigne une catégorie entière d'objets semblables — un biais qui rend l'apprentissage du vocabulaire si rapide.",detail_en:"Using superordinate words ('animal', 'vehicle', 'fruit') shows the lexicon is no longer a flat list but a hierarchical structure. Markman showed children spontaneously assume a new word names a whole category of similar objects — a bias that makes vocabulary learning so fast.",
    refs:["Markman, E. M. (1989). Categorization and Naming in Children. MIT Press.","Waxman, S. R. & Gelman, S. A. (2009). Early Word-Learning and Conceptual Development."],
    q:"Emploie-t-il des mots de catégorie (« animal », « véhicule », « fruit ») pour regrouper plusieurs choses ?",q_en:"Do they use category words ('animal', 'vehicle', 'fruit') to group several things?"},

  {track:"voc",m:60,minMonths:50,maxMonths:72,
    t:"Des mots pour les pensées et les émotions",t_en:"Words for thoughts and emotions",
    summary:"Penser, croire, espérer, être déçu : il nomme l'invisible — la vie mentale entre dans la langue.",summary_en:"Think, believe, hope, be disappointed: they name the invisible — mental life enters language.",
    detail:"Employer des verbes mentaux (« je crois que », « j'espère », « il pense que ») marque un tournant : l'enfant parle d'états internes invisibles, les siens et ceux des autres. Bartsch et Wellman ont montré que l'usage spontané de ces mots vers 3-5 ans accompagne le développement de la théorie de l'esprit — comprendre que l'esprit représente le monde.",detail_en:"Using mental verbs ('I think that', 'I hope', 'he thinks that') marks a turning point: the child talks about invisible internal states, their own and others'. Bartsch and Wellman showed that spontaneous use of these words around age 3-5 accompanies theory of mind development — understanding that the mind represents the world.",
    refs:["Bartsch, K. & Wellman, H. M. (1995). Children Talk About the Mind. Oxford University Press.","Wellman, H. M. (2014). Making Minds. Oxford University Press."],
    q:"Utilise-t-il des mots comme « je crois », « j'espère », « il pense » ou nomme-t-il des émotions plus fines (déçu, jaloux, fier) ?",q_en:"Do they use words like 'I think', 'I hope', 'he thinks' or name finer emotions (disappointed, jealous, proud)?"},

  {track:"gram",m:28,minMonths:24,maxMonths:38,
    t:"Pluriels et premières marques grammaticales",t_en:"Plurals and first grammatical markers",
    summary:"Un « s » au pluriel, « encore », « pas » : il ajoute la grammaire qui relie les mots.",summary_en:"A plural 's', 'more', 'not': they add the grammar that links words.",
    detail:"Après la phase des mots isolés, l'enfant commence à ajouter les petits éléments grammaticaux : pluriels, négation, articles. Brown a décrit un ordre d'acquisition remarquablement régulier de ces « morphèmes ». Leur apparition montre que l'enfant n'imite plus seulement des blocs, il applique des règles productives.",detail_en:"After the single-word phase, the child starts adding small grammatical elements: plurals, negation, articles. Brown described a remarkably regular order of acquisition for these 'morphemes'. Their appearance shows the child is no longer merely imitating chunks but applying productive rules.",
    refs:["Brown, R. (1973). A First Language. Harvard University Press.","de Villiers, J. & de Villiers, P. (1973). Acquisition of Grammatical Morphemes."],
    q:"Marque-t-il le pluriel, la négation (« pas ») ou ajoute-t-il « encore » dans des phrases courtes ?",q_en:"Do they mark plurals, negation ('not') or add 'more' in short sentences?"},

  {track:"gram",m:34,minMonths:28,maxMonths:46,
