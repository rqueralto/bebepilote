  // Drawer nav items
  const sw='stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"';
  const drawerIcons={
    today:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ${sw}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
    chat:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ${sw}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
    history:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ${sw}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
    profile:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ${sw}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
    settings:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ${sw}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  };
  const navItems=[
    {id:'today',label:t('tab_today')},
    {id:'chat',label:t('tab_chat')},
    {id:'history',label:t('tab_history')},
    {id:'profile',label:t('tab_profile')},
  ];
  const childConvs=getConversations().filter(c=>c.childName===child.firstName);
  const recentConvs=childConvs.slice(0,10);
  const hasMore=childConvs.length>10;
  const drawerHTML=`
<div class="drawer-overlay${S.drawer?' open':''}" id="drawer-overlay"></div>
<div class="drawer${S.drawer?' open':''}" id="main-drawer">
  <div class="drawer-head">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--c-ink);transform:rotate(35deg)"><path d="M10 5V3a2 2 0 0 1 4 0v2"/><path d="M9 5h6v2H9z"/><path d="M7 7h10v12a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V7z"/><line x1="7" y1="13" x2="17" y2="13"/></svg>
        <span style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--c-ink)">BébéPilote</span>
      </div>
      <button id="btn-new-conv" title="Nouvelle conversation" style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--c-t2);background:var(--c-bg3);flex-shrink:0;transition:background .15s">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
    </div>
  </div>
  <div class="drawer-body">
    ${navItems.map(item=>`<button class="drawer-item${S.tab===item.id&&!S.chat.currentConvId&&item.id==='chat'?' active':S.tab===item.id&&item.id!=='chat'?' active':''}" data-tab="${item.id}">
      ${drawerIcons[item.id]}<span>${item.label}</span>
    </button>`).join('')}
    ${recentConvs.length?`
    <div class="drawer-section-label">${S.lang==='en'?'Recent':'Récents'}</div>
    ${recentConvs.map(c=>`<button class="drawer-conv-item${S.chat.currentConvId===c.id?' active':''}" data-conv-id="${c.id}">
      <span class="drawer-conv-title">${e(c.title)}</span>
    </button>`).join('')}
    ${hasMore?`<button class="drawer-all-convs" id="btn-all-convs">
      ${S.lang==='en'?'All conversations':'Toutes les conversations'} <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:4px"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>`:''}
    `:''}
  </div>
  <div class="drawer-foot">
    <button class="drawer-item" id="btn-drawer-settings">
      ${drawerIcons.settings}<span>${S.lang==='en'?'Settings':'Paramètres'}</span>
    </button>
  </div>
</div>
${S.ctxMenu.open?`<div id="ctx-backdrop" style="position:fixed;inset:0;z-index:299"></div>
<div class="ctx-menu" id="ctx-menu" style="left:${Math.min(S.ctxMenu.x,window.innerWidth-210)}px;top:${Math.min(S.ctxMenu.y,window.innerHeight-120)}px">
  <button class="ctx-menu-item" id="ctx-rename">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    ${S.lang==='en'?'Rename':'Renommer'}
  </button>
  <div class="ctx-menu-sep"></div>
  <button class="ctx-menu-item danger" id="ctx-delete">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    ${S.lang==='en'?'Delete':'Supprimer'}
  </button>
</div>`:''}
`;

  app.innerHTML=`
<div style="height:100dvh;display:flex;flex-direction:column">
  <div class="topbar">
    ${topbarHTML}
  </div>
  <div style="flex:1;${S.tab==='chat'?'overflow:hidden;display:flex;flex-direction:column':'overflow-y:auto'}">${tabHTML}</div>
</div>
${drawerHTML}
${modalHTML}`;
  bind(child,data);
}

// ═══════════════════════ BINDINGS ═══════════════════════
function bind(child,data){
  // Controverse du jour — chargement auto du jour (cache) ou génération
  if(S.tab==='today'&&S.flags.controverse&&!data.unborn){
    if(S.controverse.childKey&&S.controverse.childKey!==ctrvIdent(child)){S.controverse={loading:false,error:null,data:null,childKey:null,dive:{open:false,items:[],loading:false,error:null}};}
    if(ctrvProviderKey()&&!S.controverse.data&&!S.controverse.loading&&!S.controverse.error){
      const cached=localStorage.getItem(ctrvCacheKey(child));
      if(cached){try{const parsed=JSON.parse(cached);if(parsed&&Array.isArray(parsed.camps)&&parsed.camps.length){S.controverse.data=parsed;S.controverse.childKey=ctrvIdent(child);}else{localStorage.removeItem(ctrvCacheKey(child));}}catch{}if(S.controverse.data){render();return;}}
      generateControverse(child,data);
    }
  }
  // data-tab outside the drawer (e.g. btn-zoe in chat)
  document.querySelectorAll('[data-tab]:not(#main-drawer [data-tab])').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;if(b.dataset.tab!=='profile')S.profileSettings=false;render();}));
  document.querySelectorAll('[data-switch]').forEach(b=>b.addEventListener('click',()=>{S.childIdx=+b.dataset.switch;S.childMenu=false;render();}));
  // Child switcher toggle
  document.getElementById('btn-child-switcher')?.addEventListener('click',ev=>{
    ev.stopPropagation();
    S.childMenu=!S.childMenu;
    render();
  });
  // Close menu on outside click
  if(S.childMenu){
    const closeMenu=()=>{S.childMenu=false;render();document.removeEventListener('click',closeMenu);};
    setTimeout(()=>document.addEventListener('click',closeMenu),0);
  }
  document.querySelector('[data-caroline]')?.addEventListener('click',()=>{S.modal='caroline';render();});
  // Controverse du jour
  document.getElementById('btn-ctrv-open')?.addEventListener('click',()=>{S.controverse.dive.open=false;S.modal='controverse';render();});
  document.getElementById('btn-ctrv-gen')?.addEventListener('click',()=>generateControverse(child,data));
  document.getElementById('btn-ctrv-retry')?.addEventListener('click',()=>generateControverse(child,data,true));
  document.getElementById('btn-ctrv-regen')?.addEventListener('click',()=>{S.modal=null;generateControverse(child,data,true);});
  document.querySelectorAll('[data-ctrv-fb]').forEach(b=>b.addEventListener('click',()=>{setCtrvFeedback(b.dataset.ctrvFb);render();}));
  // Creuser (deep dive)
  document.getElementById('btn-ctrv-creuser')?.addEventListener('click',()=>{S.controverse.dive.open=true;S.controverse.dive.error=null;render();});
  document.getElementById('btn-dive-back')?.addEventListener('click',()=>{S.controverse.dive.open=false;render();});
  document.querySelectorAll('[data-dive-q]').forEach(b=>b.addEventListener('click',()=>askDeepDive(child,data,b.dataset.diveQ)));
  document.getElementById('dive-send')?.addEventListener('click',()=>{const inp=document.getElementById('dive-input');const v=inp?.value.trim();if(v)askDeepDive(child,data,v);});
  document.getElementById('dive-input')?.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();const v=ev.target.value.trim();if(v)askDeepDive(child,data,v);}});
  // Garder / Partager — controverse
  document.querySelector('[data-fav-ctrv]')?.addEventListener('click',()=>{
    const d=S.controverse.data;if(!d)return;
    toggleFavorite({id:favId(child.firstName,'controverse',d.topic),childName:child.firstName,childAge:data.ageLabel,type:'controverse',typeLabel:'Controverse',title:d.question,summary:d.why_now,ctrv:d,refsColorBg:'acc-plum',date:new Date().toISOString(),canShare:true,shareData:{headerBg:'#A06C2A',accentColor:'#A06C2A',categoryLabel:'Controverse · '+d.topic,title:d.question,body:ctrvShareText(d),ageLabel:data.ageLabel}});
    render();
  });
  document.querySelector('[data-share-ctrv]')?.addEventListener('click',()=>{
    const d=S.controverse.data;if(!d)return;
    shareTextContent('Controverse — '+d.topic,ctrvFullText(d));
  });
  // Garder / Partager — creuser (par réponse)
  document.querySelectorAll('[data-fav-dive]').forEach(b=>b.addEventListener('click',()=>{
    const it=S.controverse.dive.items[+b.dataset.favDive];if(!it)return;const d=S.controverse.data;
    toggleFavorite({id:favId(child.firstName,'creuser',it.q),childName:child.firstName,childAge:data.ageLabel,type:'creuser',typeLabel:'Creuser',title:it.q,summary:'',blocks:it.blocks,diveSources:it.sources,refsColorBg:'acc-plum',date:new Date().toISOString(),canShare:true,shareData:{headerBg:'#A06C2A',accentColor:'#A06C2A',categoryLabel:'Creuser'+(d?.topic?' · '+d.topic:''),title:it.q,body:diveShareText(it),ageLabel:data.ageLabel}});
    render();
  }));
  document.querySelectorAll('[data-share-dive]').forEach(b=>b.addEventListener('click',()=>{
    const it=S.controverse.dive.items[+b.dataset.shareDive];if(!it)return;
    shareTextContent('Creuser — '+it.q,diveFullText(it));
  }));
  document.getElementById('btn-zoe')?.addEventListener('click',()=>{S.tab='chat';render();});
  document.getElementById('chat-suggestions')?.addEventListener('change',ev=>{
    const val=ev.target.value;if(!val)return;
    const opt=ev.target.selectedOptions[0];
    const inp=document.getElementById('chat-in');
    if(opt?.dataset?.tpl){if(inp){inp.value=val;inp.focus();}}
    else{sendMsg(val,child,data);}
    ev.target.value='';
  });
  document.getElementById('btn-share')?.addEventListener('click',()=>shareHighlight(child,data));
  document.querySelectorAll('[data-section]').forEach(b=>b.addEventListener('click',()=>{S.modal='section';S.modalSection=b.dataset.section;render();}));
  // Section like (dans le modal)
  document.querySelectorAll('[data-fav-section]').forEach(b=>b.addEventListener('click',()=>{
    const sid=b.dataset.favSection;
    const sec=data.sections?.find(({s})=>s.id===sid);
    const entry=sec?.entry;
    const id=favId(child.firstName,'section',sid);
    const refsHtml=(entry?.references||[]).map(r=>refLink(r)).join('');
    toggleFavorite({id,childName:child.firstName,childAge:data.ageLabel,type:'section',typeLabel:sec?.s?.label||sid,title:entry?.title||sec?.s?.label||'',summary:entry?.detail||'',refsHtml,refsColorBg:sec?.s?.colorBg||'acc-blue',date:new Date().toISOString(),canShare:true,shareData:{headerBg:'#3D5570',accentColor:'#2D4A8A',categoryLabel:sec?.s?.label||'',title:entry?.title||'',body:entry?.detail||'',ageLabel:data.ageLabel}});
    render();
  }));
  // Section share (dans le modal)
  document.querySelectorAll('[data-share-section]').forEach(b=>b.addEventListener('click',()=>{
    const sid=b.dataset.shareSection;
    const sec=data.sections?.find(({s})=>s.id===sid);
    const entry=sec?.entry;
    shareCardCanvas(child,{headerBg:'#3D5570',accentColor:'#2D4A8A',categoryLabel:sec?.s?.label||'',title:entry?.title||'',body:entry?.detail||'',ageLabel:data.ageLabel});
  }));
  // Conseil du jour like/share (dans le modal)
  document.querySelector('[data-fav-conseil]')?.addEventListener('click',()=>{
    const ms=data.milestone;
    const id=favId(child.firstName,'conseil','conseil');
    const refsHtml=[
      refLink('Brazelton, T. B. & Greenspan, S. I. (2000). The Irreducible Needs of Children.'),
      refLink('Gopnik, A., Meltzoff, A. N. & Kuhl, P. K. (1999). The Scientist in the Crib.'),
      refLink('AAP (2023). Caring for Your Baby and Young Child.')
    ].join('');
    toggleFavorite({id,childName:child.firstName,childAge:data.ageLabel,type:'conseil',typeLabel:'Conseil du jour',title:ms?.tip||'',summary:ms?.details||ms?.tip||'',refsHtml,refsColorBg:'acc-amber',date:new Date().toISOString(),canShare:true,shareData:{headerBg:'#A06C2A',accentColor:'#A06C2A',categoryLabel:'Conseil du jour',title:ms?.tip||'',body:ms?.details||ms?.tip||'',ageLabel:data.ageLabel}});
    render();
  });
  document.querySelector('[data-share-conseil]')?.addEventListener('click',()=>{
    const ms=data.milestone;
    shareCardCanvas(child,{headerBg:'#A06C2A',accentColor:'#A06C2A',categoryLabel:'Conseil du jour',title:ms?.tip||'',body:ms?.details||ms?.tip||'',ageLabel:data.ageLabel});
  });
  // Caroline like/share (dans le modal)
  document.querySelector('[data-fav-caroline]')?.addEventListener('click',()=>{
    const ce=getCarolineEntry(data.ageInMonths,data.doy);
    const id=favId(child.firstName,'caroline','caroline');
    const refLabel=ce?.ref?.label||'';
    const refSearch='Caroline Goldman '+refLabel;
    const refText=refLabel.includes('Comprendre et accompagner')?'Caroline Goldman — Comprendre et accompagner les enfants difficiles (Odile Jacob)':refLabel;
    const refsHtml=refLink(refText,refSearch)+(ce?.ref?.detail?`<p style="font-size:12px;color:#5C5752;line-height:1.65;margin-top:6px;padding:0 4px">${e(ce.ref.detail)}</p>`:'');
    toggleFavorite({id,childName:child.firstName,childAge:data.ageLabel,type:'caroline',typeLabel:'Caroline Goldman',title:ce?.topic||'',summary:ce?.advice||ce?.tip||'',refsHtml,refsColorBg:'acc-sage',date:new Date().toISOString(),canShare:true,shareData:{headerBg:'#3A5E38',accentColor:'#3A5E38',categoryLabel:'Conseil de Caroline Goldman',title:ce?.topic||'',body:ce?.advice||ce?.tip||'',ageLabel:data.ageLabel}});
    render();
  });
  document.querySelector('[data-share-caroline]')?.addEventListener('click',()=>{
    const ce=getCarolineEntry(data.ageInMonths,data.doy);
    shareCardCanvas(child,{headerBg:'#3A5E38',accentColor:'#3A5E38',categoryLabel:'Conseil de Caroline Goldman',title:ce?.topic||'',body:ce?.advice||ce?.tip||'',ageLabel:data.ageLabel});
  });
  // Unfav depuis la section favoris
  document.querySelectorAll('[data-unfav]').forEach(b=>b.addEventListener('click',()=>{
    const favs=getFavorites();const idx=favs.findIndex(f=>String(f.id)===b.dataset.unfav);
    if(idx>=0){favs.splice(idx,1);localStorage.setItem('bebeFavorites',JSON.stringify(favs));}
    render();
  }));
  // Partager depuis la section favoris
  document.querySelectorAll('[data-share-fav]').forEach(b=>b.addEventListener('click',()=>{
    const fav=getFavorites().find(f=>String(f.id)===b.dataset.shareFav);
    if(!fav)return;
    if(fav.type==='controverse'&&fav.ctrv){shareTextContent('Controverse — '+fav.ctrv.topic,ctrvFullText(fav.ctrv));return;}
    if(fav.type==='creuser'&&fav.blocks){shareTextContent('Creuser — '+fav.title,diveFullText({q:fav.title,blocks:fav.blocks,sources:fav.diveSources}));return;}
    if(fav.type==='zoecamps'&&fav.campsData){shareTextContent('Les écoles divergent — '+fav.title,zoeCampsFullText({creuserLabel:fav.title,camps:fav.campsData}));return;}
    if(fav.shareData)shareCardCanvas(child,{...fav.shareData});
  }));
  document.querySelectorAll('[data-fratrie-prep]').forEach(b=>b.addEventListener('click',()=>{S.modal='fratriePrep';S.modalSection=+b.dataset.fratriePrep;render();}));
  document.querySelectorAll('[data-fratrie-bond]').forEach(b=>b.addEventListener('click',()=>{S.modal='fratrieBond';S.modalSection=+b.dataset.fratrieBond;render();}));
  document.querySelectorAll('[data-prenatal-detail]').forEach(b=>b.addEventListener('click',()=>{S.modal='prenatalDetail';render();}));
  document.querySelectorAll('[data-prenatal-section]').forEach(b=>b.addEventListener('click',()=>{S.modal='prenatalSection';S.modalSection=b.dataset.prenatalSection;render();}));
  document.querySelectorAll('[data-fav-cat]').forEach(b=>b.addEventListener('click',()=>{const k=b.dataset.favCat;S.favCatExp[k]=!S.favCatExp[k];render();}));
  document.querySelectorAll('[data-saved-item]').forEach(b=>b.addEventListener('click',()=>{const id=+b.dataset.savedItem;S.savedExp[id]=!S.savedExp[id];render();}));
  document.querySelectorAll('[data-hist]').forEach(b=>b.addEventListener('click',()=>{const d=b.dataset.hist;S.histExp[d]=!S.histExp[d];render();}));
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>{S.childIdx=+b.dataset.edit;S.modal='editChild';S.modalChildIdx=+b.dataset.edit;render();}));
  document.getElementById('btn-add-child')?.addEventListener('click',()=>{S.modal='addChild';render();});
  document.getElementById('btn-apikey')?.addEventListener('click',()=>{S.modal='apikey';render();});
  // Drawer open/close
  document.getElementById('btn-drawer-open')?.addEventListener('click',ev=>{ev.stopPropagation();S.drawer=true;render();});
  document.getElementById('drawer-overlay')?.addEventListener('click',()=>{S.drawer=false;render();});
  // Drawer nav items
  document.querySelectorAll('#main-drawer [data-tab]').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;S.drawer=false;render();}));
  // Drawer settings → modal overlay
  document.getElementById('btn-drawer-settings')?.addEventListener('click',()=>{S.modal='settings';S.drawer=false;render();});
  // Nouvelle conversation (drawer + topbar)
  document.getElementById('btn-new-conv')?.addEventListener('click',()=>newConv());
  document.getElementById('btn-new-conv-topbar')?.addEventListener('click',()=>newConv());
  // Toutes les conversations
  document.getElementById('btn-all-convs')?.addEventListener('click',()=>{S.modal='allConversations';S.drawer=false;render();});
  // Charger une conversation (drawer + modal)
  let longPressTimer=null;
  document.querySelectorAll('[data-conv-id]').forEach(el=>{
    const id=+el.dataset.convId;

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='',lines=[];
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  lines.push(line);
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH));
  return lines.length;
}

  ctx.fillStyle='#fff';ctx.font='500 56px "Cormorant Garamond",serif';
  ctx.fillText(child.firstName,W/2,128);

  // Age
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='400 16px "DM Sans",sans-serif';
  ctx.fillText(ageLabel,W/2,164);

  // White card
  ctx.fillStyle='#fff';
  const cr=16;const cx=32,cy=240,cw=W-64,ch=320;
  ctx.beginPath();ctx.moveTo(cx+cr,cy);ctx.arcTo(cx+cw,cy,cx+cw,cy+ch,cr);ctx.arcTo(cx+cw,cy+ch,cx,cy+ch,cr);ctx.arcTo(cx,cy+ch,cx,cy,cr);ctx.arcTo(cx,cy,cx+cw,cy,cr);ctx.closePath();
  ctx.shadowColor='rgba(0,0,0,.07)';ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;

  // Neuron count
  ctx.fillStyle='#2D4A8A';ctx.font='700 44px "DM Sans",sans-serif';ctx.textAlign='center';
  ctx.fillText('+'+fmt(neuron.daily),W/2,310);
  ctx.fillStyle='#9C9790';ctx.font='400 14px "DM Sans",sans-serif';
  ctx.fillText('connexions neuronales aujourd\'hui',W/2,338);

  // Separator
  ctx.strokeStyle='#F2F0EB';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx+24,365);ctx.lineTo(cx+cw-24,365);ctx.stroke();

  // Milestone
  if(milestone){
    ctx.fillStyle='#1A1918';ctx.font='400 20px "Cormorant Garamond",serif';ctx.textAlign='center';
    wrapText(ctx,milestone.fact,W/2,400,cw-64,30);
  }

  // Total
  ctx.fillStyle='#B0A89E';ctx.font='400 13px "DM Sans",sans-serif';ctx.textAlign='center';
  ctx.fillText('Total : '+fmt(neuron.total)+' connexions',W/2,540);

  // Bottom branding
  ctx.fillStyle='#E2DFD9';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,640);ctx.lineTo(520,640);ctx.stroke();
  ctx.fillStyle='#3D5570';ctx.font='500 22px "Cormorant Garamond",serif';
  ctx.fillText('BébéPilote',W/2,680);
  ctx.fillStyle='#C4BFB8';ctx.font='400 12px "DM Sans",sans-serif';
  ctx.fillText(new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}),W/2,704);

  cv.toBlob(async blob=>{
    const file=new File([blob],`bebepilote-${child.firstName}.png`,{type:'image/png'});
    try{
      if(navigator.share&&navigator.canShare?.({files:[file]})){
        await navigator.share({files:[file],title:`${child.firstName} — BébéPilote`});
      }else{
        const url=URL.createObjectURL(blob),a=document.createElement('a');
        a.href=url;a.download=`bebepilote-${child.firstName}.png`;
        document.body.appendChild(a);a.click();
        setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
      }
    }catch(err){if(err.name!=='AbortError')console.warn(err);}
  },'image/png');
}

initTheme();
initLang();
initKeyboardAwareness();
render();

function initKeyboardAwareness(){
  if(!window.visualViewport)return;
  let lastH=window.visualViewport.height;
  window.visualViewport.addEventListener('resize',()=>{
    const h=window.visualViewport.height;
    // Keyboard considered open when viewport shrinks more than 20%
    const keyboardOpen=h<window.screen.height*0.75;
    document.documentElement.classList.toggle('keyboard-open',keyboardOpen);
    lastH=h;
  });
}
</script>
