function renderProfile(){
  const locale=S.lang==='en'?'en-GB':'fr-FR';
  return`<div style="padding:20px 16px">
${S.children.map((c,i)=>{
  const unb=isUnborn(c);
  const dateLabel=unb
    ?(S.lang==='en'?`Due on ${new Date(c.birthDate+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`:`Terme prévu le ${new Date(c.birthDate+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}`)
    :new Date(c.birthDate+'T12:00:00').toLocaleDateString(locale,{day:'numeric',month:'long',year:'numeric'});
  // ── stats block (born or unborn) ──────────────────────────────
  const statsBlock=(()=>{
    const sep=`<div style="height:1px;background:var(--c-bd);margin:14px 0"></div>`;
    if(unb){
      const dtu=getDaysUntilDue(c);
      const gw=Math.max(5,getGestWeeks(c));
      let countdown;
      if(dtu<=0){
        countdown=S.lang==='en'?"Any day now!":"C'est imminent !";
      } else {
        const mo=Math.floor(dtu/30),dy=dtu%30;
        if(S.lang==='en'){
          if(mo===0) countdown=`${dtu} ${dtu>1?'days':'day'}`;
          else if(dy===0) countdown=`${mo} ${mo>1?'months':'month'}`;
          else countdown=`${mo} ${mo>1?'months':'month'} ${dy} ${dy>1?'days':'day'}`;
        } else {
          if(mo===0) countdown=`${dtu} jour${dtu>1?'s':''}`;
          else if(dy===0) countdown=`${mo} mois`;
          else countdown=`${mo} mois et ${dy} jour${dy>1?'s':''}`;
        }
      }
      return sep+`
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px">
        <span style="font-size:0.75rem;color:var(--c-t3);font-weight:500">${S.lang==='en'?'Arrives in':'Arrive dans'}</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:1.375rem;font-weight:500;color:var(--c-ink)">${countdown}</span>
      </div>
      <div style="display:flex;align-items:center;gap:7px;background:rgba(27,112,96,.08);border-radius:10px;padding:8px 11px">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#1B7060" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <span style="font-size:0.6875rem;color:#1B7060;font-weight:500">${S.lang==='en'?`W${gw}`:`SA ${gw}`} &nbsp;·&nbsp; ${S.lang==='en'?'Due':'Terme'} ${new Date(c.birthDate+'T12:00:00').toLocaleDateString(S.lang==='en'?'en-GB':'fr-FR',{day:'numeric',month:'short',year:'numeric'})}</span>
      </div>`;
    }
    const d=Math.floor((new Date()-new Date(c.birthDate+'T12:00:00'))/86400000);
    if(d<0)return'';
    const ageLbl=getAgeLabel(d,c.birthDate);
    const ns=getNeuronStats(d,c.birthDate);
    // ── Timeline milestones ────────────────────────────────────────
    const _ageMo=d/30.44;const _MAX=72;
    const _agePct=Math.min(98,Math.round(_ageMo/_MAX*100));
    const _ms=getMilestones(c);
    let _totAcq=0,_totAll=0;
    const _secDefs=[{sid:'langage',col:'#2D4A8A'},{sid:'motricite',col:'#3D7050'},{sid:'caractere',col:'#A06C2A'},{sid:'activite',col:'#A04060'}];
    const _secInfo=_secDefs.map(({sid,col})=>{
      const ladder=getLadder(sid);const focus=getFocus(c,_ageMo,sid);
      const acq=ladder.filter(x=>_ms[x.mid]?.status==='done').length;
      _totAcq+=acq;_totAll+=ladder.length;
      const done=_ms[focus.mid]?.status==='done';
      const pct=Math.min(97,Math.max(2,Math.round(focus.e.m/_MAX*100)));
      return{col,pct,done,acq,total:ladder.length};
    });
    const _en=S.lang==='en';
    // dots sur 4 niveaux y distincts — impossible de se superposer même si x identiques
    const _yLevels=['10%','35%','65%','90%'];
    const _dotsHTML=_secInfo.map(({col,pct,done},di)=>{
      return`<div style="position:absolute;top:${_yLevels[di]};left:${pct}%;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%);background:${done?col:'var(--c-card)'};border:1.5px solid ${col};box-sizing:border-box;z-index:1"></div>`;
    }).join('');
    const _tl=`<div style="margin-top:14px">
  <div style="position:relative;height:40px">
    <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:var(--c-bd);border-radius:1px;transform:translateY(-50%)"></div>
    <div style="position:absolute;top:50%;left:0;width:${_agePct}%;height:2px;background:var(--c-bd2);border-radius:1px;transform:translateY(-50%)"></div>
    ${_dotsHTML}
    <div style="position:absolute;top:2px;bottom:2px;left:${_agePct}%;width:2px;background:#3D5570;border-radius:1px;transform:translateX(-50%);z-index:2"></div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px">
    <span style="font-size:0.5rem;color:var(--c-t4)">${_en?'birth':'naiss.'}</span>
    <span style="font-size:0.5rem;color:var(--c-t4)">6 ${_en?'yrs':'ans'}</span>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
    <div style="display:flex;gap:7px;align-items:center">
      ${_secInfo.map(({col,acq,total})=>`<span style="font-size:0.5625rem;font-weight:700;color:${col}">${acq}<span style="font-weight:400;opacity:.55">/${total}</span></span>`).join('')}
    </div>
    <span style="font-size:0.625rem;color:var(--c-t3);font-weight:500">${_totAcq}/${_totAll} ${_en?'acquired':'acquis'}</span>
  </div>
</div>`;
    return sep+`
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px">
      <span style="font-family:'Cormorant Garamond',serif;font-size:1.375rem;font-weight:500;color:var(--c-ink)">${e(ageLbl)}</span>
      <span style="font-size:0.75rem;color:var(--c-t4)">·</span>
      <span style="font-size:0.75rem;color:var(--c-t3);font-weight:500">${t('today_day')} ${d}</span>
    </div>
    <div style="display:flex;align-items:center;gap:7px;background:rgba(61,85,112,.07);border-radius:10px;padding:8px 11px">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#3D5570" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="17" r="2"/><circle cx="19" cy="17" r="2"/><line x1="12" y1="7" x2="5" y2="15"/><line x1="12" y1="7" x2="19" y2="15"/><line x1="5" y1="17" x2="19" y2="17"/></svg>
      <span style="font-size:0.6875rem;color:#3D5570;font-weight:500">${_en?'Today':'Aujourd\'hui'} <strong>+${fmt(ns.daily)}</strong> &nbsp;·&nbsp; Total <strong>${fmt(ns.total)}</strong></span>
    </div>
    ${_tl}`;
  })();
  // ── avatar ─────────────────────────────────────────────────────
  const avatarBg=unb?'rgba(27,112,96,.1)':'var(--c-fbd)';
  const avatarContent=unb
    ?`<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#1B7060" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="10" rx="5" ry="6"/><path d="M7 16c0 2.5 2.2 5 5 5s5-2.5 5-5"/><path d="M9 10c.5-1.5 3.5-1.5 4 0"/></svg>`
    :`<span style="font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:600;color:var(--c-t2);line-height:1">${e(c.firstName.charAt(0).toUpperCase())}</span>`;
  return`<button class="profile-row${i===S.childIdx?' active-p':''}" data-edit="${i}" style="display:block;padding:18px 18px 16px">
  <div style="display:flex;align-items:center;gap:14px">
    <div style="width:54px;height:54px;border-radius:16px;background:${avatarBg};display:flex;align-items:center;justify-content:center;flex-shrink:0">${avatarContent}</div>
    <div style="flex:1;min-width:0;text-align:left">
      <p style="font-family:'Cormorant Garamond',serif;font-size:1.375rem;font-weight:500;color:var(--c-ink);line-height:1.15">${e(c.firstName)}</p>
      <div style="display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:4px">
          <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="var(--c-t4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/><path d="M2 21h20"/><line x1="12" y1="6" x2="12" y2="11"/><path d="M10 6c0-1 1-2.5 2-3 1 .5 2 2 2 3"/></svg>
          <span style="font-size:0.75rem;color:var(--c-t3)">${dateLabel}</span>
        </div>
        ${S.children.length>1?`<span class="badge-sibling">${i===0?t('badge_eldest'):t('badge_youngest')}</span>`:''}
      </div>
    </div>
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--c-t4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M9 18l6-6-6-6"/></svg>
  </div>
  ${statsBlock}
</button>`;
}).join('')}
<button id="btn-add-child" class="dashed-add">
  ${t('profile_add_child')}
</button>
</div>`;
}

function renderMilestoneModal(s,data,child){
  const sid=s.id;const cfg=SECTION_MS[sid];if(!cfg)return'';
  const ladder=getLadder(sid);
  const mid=S.modalMid||(getSectionFocus(child,data.ageInMonths,sid,data.doy)||getFocus(child,data.ageInMonths,sid)).mid;
  const idx=+mid.replace(cfg.pfx,'');
  const item=ladder.find(x=>x.mid===mid)||ladder[0];
  const entry=item.e;const N=ladder.length;
  const ms=getMilestones(child);const status=ms[mid]?.status;
  const reached=data.ageInMonths>=entry.minMonths;
  const en=S.lang==='en';
  const tracks=getTracks(sid);
  const ageHint=entry.m<24?entry.m+(en?' mo':' mois'):(entry.m/12%1?(entry.m/12).toFixed(1):entry.m/12)+(en?' yr':' ans');
  const acquired=ladder.filter(x=>ms[x.mid]?.status==='done');
  const fid=child?favId(child.firstName,'section',s.id):'';
  const faved=child&&isFavorited(fid);
  const dateFmt=ts=>new Date(ts).toLocaleDateString(en?'en-GB':'fr-FR',{day:'numeric',month:'short'});
  // Boutons de la boucle
  const opt=(st,labelFr,labelEn,activeBg,activeCol)=>{
    const on=status===st;
    return`<button class="ms-btn" data-ms-set="${mid}|${st}" style="${on?`background:${activeBg};color:${activeCol};border-color:${activeBg}`:''}">${en?labelEn:labelFr}</button>`;
  };
  const statusChip=status?`<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:0.6875rem;font-weight:700;${
    status==='done'?'background:rgba(74,124,89,.14);color:#3F7A55'
    :status==='unsure'?'background:rgba(160,108,42,.14);color:#A06C2A'
    :'background:rgba(61,90,138,.13);color:#3D5A8A'}">${
    status==='done'?(en?'Acquired':'Acquis')
    :status==='unsure'?(en?'Not sure yet':'Pas sûr')
    :(en?'In progress':'En cours')}</span>`:'';
  // Une ligne navigable de l'échelle
  const renderRow=x=>{
    const st=ms[x.mid]?.status;const isCur=x.mid===mid;const done=st==='done';
    const upcoming=data.ageInMonths<x.e.minMonths;
    const ringCol=done?'#3F7A55':st==='unsure'?'#A06C2A':st==='pending'?'#3D5A8A':upcoming?'#DDD8D1':'#C8C2BA';
    const glyph=done
      ?`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#3F7A55" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>`
      :`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="${ringCol}" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="8"/>${st==='pending'?'<circle cx="12" cy="12" r="3" fill="'+ringCol+'" stroke="none"/>':st==='unsure'?'<line x1="12" y1="8.5" x2="12" y2="12.5" stroke-linecap="round"/><circle cx="12" cy="15.6" r="0.6" fill="'+ringCol+'" stroke="none"/>':''}</svg>`;
    const titleCol=done?'#5C5752':upcoming?'#B8B2AA':'#2A2926';
    const right=done?(ms[x.mid]?.firstDone?`<span style="font-size:0.6875rem;color:#B8B2AA;flex-shrink:0">${dateFmt(ms[x.mid].firstDone)}</span>`:'')
      :isCur?`<span style="font-size:0.625rem;font-weight:700;color:#3D5A8A;flex-shrink:0">${en?'CURRENT':'EN COURS'}</span>`
      :upcoming?`<span style="font-size:0.625rem;font-weight:600;color:#C8C2BA;flex-shrink:0">${en?'soon':'bientôt'}</span>`:'';
    return`<button data-ms-goto="${x.mid}" style="display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;background:${isCur?'#F4F7FB':'none'};border:none;width:100%;text-align:left;cursor:pointer">
      ${glyph}
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8125rem;font-weight:${isCur?'700':'500'};color:${titleCol}">${e(en?(x.e.title_en||x.e.title):x.e.title)}</span>
      ${right}
    </button>`;
  };
  // Bloc d'une piste : titre + progression + étapes
  const renderTrackBlock=tk=>{
    const lad=getTrackLadder(sid,tk.key);if(!lad.length)return'';
    const acq=lad.filter(x=>ms[x.mid]?.status==='done').length;
    const pos=lad.findIndex(x=>x.mid===mid);
    const earlierUndone=lad.filter((x,i)=>i<(pos<0?lad.length:pos)&&ms[x.mid]?.status!=='done');
    const hasCur=pos>=0;
    return`<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span style="font-size:0.6875rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:${hasCur?'#3D5A8A':'#B8B2AA'}">${e(en?(tk.label_en||tk.label):tk.label)}</span>
        <span style="font-size:0.75rem;font-weight:700;color:#3D5A8A">${acq}/${lad.length}</span>
      </div>
      <div style="height:5px;background:#EDE9E3;border-radius:999px;overflow:hidden;margin-bottom:8px">
        <div style="height:100%;width:${Math.round(acq/lad.length*100)}%;background:#6E96C4;border-radius:999px"></div>

function render(){
  const app=document.getElementById('app');
  if(!S.children.length){renderOnboarding();return;}
  const child=S.children[S.childIdx]||S.children[0];
  const data=childData(child);
  const streak=getStreak();

  const tabs=[{id:'today',label:t('tab_today')},{id:'chat',label:t('tab_chat')},{id:'history',label:t('tab_history')},{id:'profile',label:t('tab_profile')}];

  let tabHTML='';
  if(S.tab==='today')tabHTML=renderToday(child,data,S.childIdx);
  else if(S.tab==='history')tabHTML=renderHistory(child);
  else if(S.tab==='chat')tabHTML=renderChat(child,data);
  else if(S.tab==='profile')tabHTML=renderProfile();
  else if(S.tab==='apilog')tabHTML=renderApiLog();

  let modalHTML='';
  if(S.modal==='savedChats')modalHTML=renderSavedChatsModal(child);

  else if(S.modal==='conseil')modalHTML=renderConseilModal(data.milestone,data,child);
  else if(S.modal==='section')modalHTML=renderSectionModal(S.modalSection,data,child);
  else if(S.modal==='apikey')modalHTML=renderApiKeyModal();

  else if(S.modal==='addChild')modalHTML=renderChildModal(null);
  else if(S.modal==='fratriePrep')modalHTML=renderFratriePrepModal(S.modalSection,child);
  else if(S.modal==='fratrieBond')modalHTML=renderFratrieBondModal(S.modalSection,child);

  else if(S.modal==='prenatalSection')modalHTML=renderPrenatalSectionModal(S.modalSection,child);
  else if(S.modal==='controverse')modalHTML=renderControverseModal(child,data);
  else if(S.modal==='observe')modalHTML=renderObserveModal(child,data);
  else if(S.modal==='favDetail')modalHTML=renderFavDetailModal(child);

  else if(S.modal==='allCtrv')modalHTML=renderAllCtrvModal(child);
  else if(S.modal==='ctrvView')modalHTML=renderCtrvViewModal(child);

// ═══════════════════════ BINDINGS ═══════════════════════
function bind(child,data){
  // Controverse du jour — chargement auto du jour (cache) ou génération
  if(S.tab==='today'&&S.flags.controverse&&!data.unborn){
    if(S.controverse.childKey&&S.controverse.childKey!==ctrvIdent(child)){S.controverse={loading:false,error:null,data:null,childKey:null,dive:{open:false,items:[],loading:false,error:null}};}
    if(ctrvProviderKey()&&!S.controverse.data&&!S.controverse.loading&&!S.controverse.error){
      const cached=localStorage.getItem(ctrvCacheKey(child));
      if(cached){try{const parsed=JSON.parse(cached);if(parsed&&Array.isArray(parsed.camps)&&parsed.camps.length&&parsed.bridge){S.controverse.data=parsed;S.controverse.childKey=ctrvIdent(child);}else{localStorage.removeItem(ctrvCacheKey(child));}}catch{}if(S.controverse.data){render();return;}}
      // setTimeout(0) : defer to next JS task so bind() finishes first — prevents re-entrant double-bind
      setTimeout(()=>generateControverse(child,data),0);
    }
  }
  // data-tab outside the drawer (e.g. btn-zoe in chat)
  document.querySelectorAll('[data-tab]:not(#main-drawer [data-tab])').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;if(b.dataset.tab!=='profile')S.profileSettings=false;render();}));
  document.querySelectorAll('[data-switch]').forEach(b=>b.addEventListener('click',()=>{S.childIdx=+b.dataset.switch;S.childMenu=false;render();}));
  // Child switcher toggle
  document.getElementById('btn-child-switcher')?.addEventListener('click',ev=>{
    ev.stopPropagation();
    S.childMenu=!S.childMenu;
    render();
  });
  // Close menu on outside click
  if(S.childMenu){
    const closeMenu=()=>{S.childMenu=false;render();document.removeEventListener('click',closeMenu);};
    setTimeout(()=>document.addEventListener('click',closeMenu),0);
  }
  document.querySelector('[data-caroline]')?.addEventListener('click',()=>{S.modal='caroline';render();});
  // Controverse du jour
  document.getElementById('btn-ctrv-open')?.addEventListener('click',()=>{S.controverse.dive.open=false;S.modal='controverse';render();});
  document.getElementById('btn-ctrv-gen')?.addEventListener('click',()=>generateControverse(child,data));
  document.getElementById('btn-ctrv-retry')?.addEventListener('click',()=>generateControverse(child,data,true));
  document.getElementById('btn-ctrv-regen')?.addEventListener('click',()=>{S.modal=null;generateControverse(child,data,true);});
  document.querySelectorAll('[data-ctrv-fb]').forEach(b=>b.addEventListener('click',()=>{setCtrvFeedback(b.dataset.ctrvFb,child.firstName);render();}));
  // "J'ai observé…"
  document.getElementById('btn-observe-open')?.addEventListener('click',()=>{S.observe={loading:false,error:null,result:null,text:''};S.modal='observe';render();});
  document.getElementById('obs-input')?.addEventListener('input',ev=>{S.observe.text=ev.target.value;});
  document.querySelectorAll('[data-obs-ex]').forEach(b=>b.addEventListener('click',()=>{const inp=document.getElementById('obs-input');if(inp){inp.value=b.dataset.obsEx;S.observe.text=b.dataset.obsEx;inp.focus();}}));
  document.getElementById('obs-analyze')?.addEventListener('click',()=>{const inp=document.getElementById('obs-input');const v=(inp?.value||S.observe.text||'').trim();if(v)analyzeObservation(child,data,v);});
  document.getElementById('obs-new')?.addEventListener('click',()=>{S.observe.result=null;S.observe.text='';S.observe.error=null;render();});
  document.querySelectorAll('[data-obs-check]').forEach(b=>b.addEventListener('click',()=>{
    const mid=b.dataset.obsCheck;setMilestoneStatus(child,mid,'done');
    if(S.observe.result){S.observe.result.checked=[...(S.observe.result.checked||[]),mid];updateObservation(child,S.observe.result.ts,{checked:S.observe.result.checked});}
    toast(S.lang==='en'?'Milestone confirmed':'Jalon confirmé');render();
  }));
  document.querySelectorAll('[data-obs-hist]').forEach(b=>b.addEventListener('click',()=>{const ts=+b.dataset.obsHist;const it=getObservations(child).find(o=>o.ts===ts);if(it){S.observe.result=it;render();}}));
  document.querySelector('[data-fav-observe]')?.addEventListener('click',()=>{
    const r=S.observe.result;if(!r)return;
    const id=favId(child.firstName,'observe',String(r.ts));
    const en=S.lang==='en';
    toggleFavorite({id,childName:child.firstName,childAge:data.ageLabel,type:'observe',typeLabel:en?'Observation':'Observation',title:r.title||'',summary:r.text||'',obsData:r,refsColorBg:'acc-sage',date:new Date(r.ts).toISOString(),canShare:true,shareData:{headerBg:'#3A5E38',accentColor:'#3A5E38',categoryLabel:en?'Observation':'Observation',title:r.title||'',body:obsShareText(r),ageLabel:data.ageLabel}});
    render();
  });
  document.querySelector('[data-share-observe]')?.addEventListener('click',()=>{
    const r=S.observe.result;if(!r)return;
    shareTextContent((S.lang==='en'?'Observation — ':'Observation — ')+r.title,obsShareText(r));
  });
  // Coach "Là, maintenant"
  // Creuser (deep dive)
  document.getElementById('btn-ctrv-creuser')?.addEventListener('click',()=>{S.controverse.dive.open=true;S.controverse.dive.error=null;render();});
  document.getElementById('btn-dive-back')?.addEventListener('click',()=>{S.controverse.dive.open=false;render();});
  document.querySelectorAll('[data-dive-q]').forEach(b=>b.addEventListener('click',()=>askDeepDive(child,data,b.dataset.diveQ)));
  document.getElementById('dive-send')?.addEventListener('click',()=>{const inp=document.getElementById('dive-input');const v=inp?.value.trim();if(v)askDeepDive(child,data,v);});
  document.getElementById('dive-input')?.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();const v=ev.target.value.trim();if(v)askDeepDive(child,data,v);}});
  // Garder / Partager — controverse
  document.querySelector('[data-fav-ctrv]')?.addEventListener('click',()=>{
    const d=S.controverse.data;if(!d)return;
    toggleFavorite({id:favId(child.firstName,'controverse',d.topic),childName:child.firstName,childAge:data.ageLabel,type:'controverse',typeLabel:'Controverse',title:d.question,summary:d.why_now,ctrv:d,refsColorBg:'acc-plum',date:new Date().toISOString(),canShare:true,shareData:{headerBg:'#A06C2A',accentColor:'#A06C2A',categoryLabel:'Controverse · '+d.topic,title:d.question,body:ctrvShareText(d),ageLabel:data.ageLabel}});
    render();
  });
  document.querySelector('[data-share-ctrv]')?.addEventListener('click',()=>{
    const d=S.controverse.data;if(!d)return;
    shareTextContent('Controverse — '+d.topic,ctrvFullText(d));
  });
  // Garder / Partager — creuser (par réponse)
  document.querySelectorAll('[data-fav-dive]').forEach(b=>b.addEventListener('click',()=>{
    const it=S.controverse.dive.items[+b.dataset.favDive];if(!it)return;const d=S.controverse.data;
    toggleFavorite({id:favId(child.firstName,'creuser',it.q),childName:child.firstName,childAge:data.ageLabel,type:'creuser',typeLabel:'Creuser',title:it.q,summary:'',blocks:it.blocks,diveSources:it.sources,refsColorBg:'acc-plum',date:new Date().toISOString(),canShare:true,shareData:{headerBg:'#A06C2A',accentColor:'#A06C2A',categoryLabel:'Creuser'+(d?.topic?' · '+d.topic:''),title:it.q,body:diveShareText(it),ageLabel:data.ageLabel}});
    render();
  }));
  document.querySelectorAll('[data-share-dive]').forEach(b=>b.addEventListener('click',()=>{
    const it=S.controverse.dive.items[+b.dataset.shareDive];if(!it)return;
    shareTextContent('Creuser — '+it.q,diveFullText(it));
  }));
  document.getElementById('btn-zoe')?.addEventListener('click',()=>{S.tab='chat';render();});
  document.getElementById('chat-suggestions')?.addEventListener('change',ev=>{
    const val=ev.target.value;if(!val)return;
    const opt=ev.target.selectedOptions[0];
    const inp=document.getElementById('chat-in');
    if(opt?.dataset?.tpl){if(inp){inp.value=val;inp.focus();}}
    else{sendMsg(val,child,data);}
    ev.target.value='';
  });
  document.getElementById('btn-share')?.addEventListener('click',()=>shareHighlight(child,data));
  document.querySelectorAll('[data-section]').forEach(b=>b.addEventListener('click',()=>{S.modal='section';S.modalSection=b.dataset.section;S.modalMid=SECTION_MS[b.dataset.section]?getSectionFocus(child,data.ageInMonths,b.dataset.section,data.doy).mid:null;render();}));
  // Boucle de suivi : enregistrer l'état d'un milestone (Il le fait / Pas encore / Pas sûr)
  document.querySelectorAll('[data-ms-set]').forEach(b=>b.addEventListener('click',()=>{
    const[mid,status]=b.dataset.msSet.split('|');
    setMilestoneStatus(child,mid,status);
    toast(status==='done'?(S.lang==='en'?'Noted — nice!':'Noté — bravo !'):status==='pending'?(S.lang==='en'?'Noted — see you soon':'Noté — on y revient'):(S.lang==='en'?'Noted':'Noté'));
    render();
  }));
  document.querySelectorAll('[data-ms-confirm-upto]').forEach(b=>b.addEventListener('click',()=>{
    const[_csid,_cupto]=b.dataset.msConfirmUpto.split('|');confirmEarlier(child,_csid,+_cupto);
    toast(S.lang==='en'?'Earlier steps confirmed':'Étapes précédentes confirmées');
    render();
  }));
  document.querySelectorAll('[data-ms-confirm-track]').forEach(b=>b.addEventListener('click',()=>{
    const[_csid,_ctk,_cmid]=b.dataset.msConfirmTrack.split('|');confirmEarlierTrack(child,_csid,_ctk,_cmid);
    toast(S.lang==='en'?'Earlier steps confirmed':'Étapes précédentes confirmées');
    render();
  }));
  document.querySelectorAll('[data-ms-goto]').forEach(b=>b.addEventListener('click',()=>{
    S.modalMid=b.dataset.msGoto;render();
    const body=document.querySelector('.sheet-body');if(body)body.scrollTop=0;
  }));
  // Section like (dans le modal)
  document.querySelectorAll('[data-fav-section]').forEach(b=>b.addEventListener('click',()=>{
    const sid=b.dataset.favSection;
    const sec=data.sections?.find(({s})=>s.id===sid);
    const entry=sec?.entry;
    const id=favId(child.firstName,'section',sid);
    const refsHtml=(entry?.references||[]).map(r=>refLink(r)).join('');
    toggleFavorite({id,childName:child.firstName,childAge:data.ageLabel,type:'section',typeLabel:sec?.s?.label||sid,title:entry?.title||sec?.s?.label||'',summary:entry?.detail||'',refsHtml,refsColorBg:sec?.s?.colorBg||'acc-blue',date:new Date().toISOString(),canShare:true,shareData:{headerBg:'#3D5570',accentColor:'#2D4A8A',categoryLabel:sec?.s?.label||'',title:entry?.title||'',body:entry?.detail||'',ageLabel:data.ageLabel}});
    render();
  }));
  // Section share (dans le modal)
  document.querySelectorAll('[data-share-section]').forEach(b=>b.addEventListener('click',()=>{
    const sid=b.dataset.shareSection;
    const sec=data.sections?.find(({s})=>s.id===sid);
    const entry=sec?.entry;

function bindChildForm(){
  const cfSave=document.getElementById('cf-save');if(!cfSave)return;
  const isEdit=S.modal==='editChild';
  let g=isEdit?S.children[S.modalChildIdx]?.gender:'';
  document.getElementById('cf-boy')?.addEventListener('click',()=>{g='boy';document.getElementById('cf-boy').classList.add('sel');document.getElementById('cf-girl')?.classList.remove('sel');});
  document.getElementById('cf-girl')?.addEventListener('click',()=>{g='girl';document.getElementById('cf-girl').classList.add('sel');document.getElementById('cf-boy')?.classList.remove('sel');});
  cfSave.addEventListener('click',()=>{
    const n=document.getElementById('cf-name').value.trim(),d=document.getElementById('cf-date').value;
    if(!n||!d||!g)return;
    if(isEdit){S.children[S.modalChildIdx]={firstName:n,birthDate:d,gender:g};}
    else{S.children.push({firstName:n,birthDate:d,gender:g});S.childIdx=S.children.length-1;}
    saveKids();S.modal=null;render();
  });
  document.getElementById('cf-delete')?.addEventListener('click',ev=>{
    const btn=ev.currentTarget;
    if(btn.dataset.c){S.children.splice(S.modalChildIdx,1);S.childIdx=Math.max(0,S.childIdx-1);saveKids();S.modal=null;render();}
    else{btn.dataset.c='1';btn.textContent=t('modal_child_delete_confirm');btn.className='btn-danger-confirm';}
  });
}

function bindMsgActions(child){
  // Copy
  document.querySelectorAll('[data-msg-copy]').forEach(b=>b.addEventListener('click',()=>{
    const idx=+b.dataset.msgCopy,m=S.chat.msgs[idx];if(!m)return;
    navigator.clipboard?.writeText(m.content).catch(()=>{});
    // Flash feedback
    b.classList.add('copied-flash');setTimeout(()=>b.classList.remove('copied-flash'),900);
  }));
  // Like
  document.querySelectorAll('[data-msg-like]').forEach(b=>b.addEventListener('click',()=>{
    const idx=+b.dataset.msgLike,m=S.chat.msgs[idx];if(!m)return;
    m.liked=!m.liked;
    if(m.liked){
      // Store as liked example for future AI improvement
      const q=(S.chat.msgs[idx-1]||{}).content||'';
      const existing=getSavedChats().filter(x=>x.childName===child.firstName&&x.question===q&&x.liked);
      if(!existing.length)addSavedChat({id:Date.now(),childName:child.firstName,question:q,answer:m.content,refs:m.refs||[],liked:true,date:new Date().toISOString()});
    }
    patchChatMsgs();
  }));
  // Save
  document.querySelectorAll('[data-msg-save]').forEach(b=>b.addEventListener('click',()=>{
    const idx=+b.dataset.msgSave,m=S.chat.msgs[idx];if(!m)return;
    m.saved=!m.saved;
    const q=(S.chat.msgs[idx-1]||{}).content||'';
    if(m.saved){
      addSavedChat({id:Date.now(),childName:child.firstName,question:q,answer:m.content,refs:m.refs||[],liked:false,date:new Date().toISOString()});
    }else{
      // Remove most recent match
      const saves=getSavedChats();
      const toRemove=saves.find(x=>x.childName===child.firstName&&x.question===q&&!x.liked);
      if(toRemove)deleteSavedChat(toRemove.id);
    }
    patchChatMsgs();
  }));
  // Zoé camps — débat inline
  document.querySelectorAll('[data-zoe-creuser]').forEach(b=>b.addEventListener('click',()=>{
    loadZoeCamps(+b.dataset.zoeCreuser);
  }));
  // Zoé camps — creuser une position
  document.querySelectorAll('[data-zoe-camp-dive]').forEach(b=>b.addEventListener('click',()=>{
    const[msgIdx,campIdx]=b.dataset.zoeCampDive.split('-').map(Number);
    loadZoeCampDive(msgIdx,campIdx);
  }));
  // Zoé camps — save
  document.querySelectorAll('[data-zoe-camps-save]').forEach(b=>b.addEventListener('click',()=>{
    const idx=+b.dataset.zoeCampsSave,m=S.chat.msgs[idx];if(!m||!m.camps)return;
    const prevMsg=S.chat.msgs[idx-1];
    const question=prevMsg?.content||'';
    const fid=favId(child.firstName,'zoecamps',m.creuserLabel);
    if(isFavorited(fid)){
      const favs=getFavorites();const i=favs.findIndex(f=>f.id===fid);if(i>=0)favs.splice(i,1);localStorage.setItem('bebeFavorites',JSON.stringify(favs));
    }else{
      toggleFavorite({id:fid,childName:child.firstName,childAge:data?.ageLabel||'',type:'zoecamps',typeLabel:'Débat Zoé',title:m.creuserLabel,summary:question,campsData:m.camps,refsColorBg:'acc-honey',date:new Date().toISOString(),canShare:true});
    }
    patchChatMsgs();
  }));
  // Zoé camps — share
  document.querySelectorAll('[data-zoe-camps-share]').forEach(b=>b.addEventListener('click',()=>{
    const idx=+b.dataset.zoeCampsShare,m=S.chat.msgs[idx];if(!m||!m.camps)return;
    shareTextContent('Les écoles divergent — '+m.creuserLabel,zoeCampsFullText(m));
  }));
  // Share saved (in modal)
  document.querySelectorAll('[data-share-saved]').forEach(b=>b.addEventListener('click',()=>{
    const entry=getSavedChats().find(x=>x.id===+b.dataset.shareSaved);
    if(entry)shareEntry(entry);
  }));
  // Delete saved (in modal)
  document.querySelectorAll('[data-del-saved]').forEach(b=>b.addEventListener('click',()=>{
    deleteSavedChat(+b.dataset.delSaved);render();
  }));
}

function bindChat(child,data){
  const inp=document.getElementById('chat-in');
  // Accordéon sections
  document.querySelectorAll('[data-acc]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.dataset.acc;
    const idx=S.chat.openSections.indexOf(id);
    if(idx>=0)S.chat.openSections.splice(idx,1);
    else S.chat.openSections.push(id);
    render();
  }));
  // Chips & suggestions
  document.querySelectorAll('[data-q]').forEach(b=>b.addEventListener('click',()=>{
    if(!b.dataset.q)return;
    if(b.dataset.tpl){
      if(inp){inp.value=b.dataset.q;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';inp.focus();}
    }else{
      sendMsg(b.dataset.q,child,data);
    }
  }));
  const growInp=()=>{if(!inp)return;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';};
  inp?.addEventListener('input',growInp);
  document.getElementById('chat-send')?.addEventListener('click',()=>{sendMsg(inp?.value||'',child,data);});
  inp?.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();sendMsg(inp.value,child,data);}});
  document.getElementById('btn-saved-chats')?.addEventListener('click',()=>{S.modal='savedChats';render();});
  bindMsgActions(child);
}

async function sendMsg(txt,child,data){
  if(!txt.trim()||S.chat.loading)return;

## Who Caroline Goldman is and how she responds

Caroline Goldman is direct, evidence-based, and non-guilt-tripping. She doesn't reassure at all costs — she explains. She validates the parent's emotion without necessarily validating their interpretation. She gives a mechanism (why it happens) before the advice (what to do).

## Key clinical positions — apply whenever relevant

SLEEP: Sleep onset associations (falling asleep in arms, at the breast, with the parent) don't resolve on their own. The longer you wait, the harder it gets. A graduated protocol is possible without trauma from 4 months if parents wish. Parental sleep deprivation has documented effects on attachment quality.

TANTRUMS vs NEEDS: Before 18 months, every cry is a need. After, you must distinguish: a demand that changes in nature based on your response (stops if you give in, resumes if you hold firm) is a tantrum. Holding position calmly and consistently is more effective — and more reassuring — than giving in under pressure.

FRUSTRATION: Frustration tolerance is a skill that is learned like walking. A child who has never experienced it will struggle at school and socially. Not responding immediately to every non-urgent request is educational, not neglectful.

BOUNDARIES AND FRAMEWORK: A clear framework is reassuring for the child, not repressive. A child without limits is often more anxious than a child with firm, consistent rules. Benevolent authority — explanation + held rule — is better than status authority ("because I say so") or absence of authority.

TANTRUMS: Between 18 months and 3 years, tantrums are neurologically inevitable (immature prefrontal cortex). Normal doesn't mean unlimited. Giving in to stop a tantrum teaches the child that screaming is effective. Holding the framework calmly teaches that anger doesn't change the rules.

NIGHT SLEEP: Before diagnosing a "bad sleeper," check sleep onset associations, regularity of schedules and lighting. Most sleep problems in a healthy child are behavioral and treatable.

PRAISE: Praising effort ("you persevered") is more effective long-term than praising the result or intrinsic quality ("you're gifted"). The latter weakens in the face of failure, the former builds resilience (Dweck).

SEPARATION: Separation anxiety (8–10 months) is a sign that attachment is working. Leaving while warning is better than sneaking away — predictability teaches that you come back.

LYING: Before 5 years, lying is a sign of cognitive development (theory of mind), not a moral failing. Value truth without criminalizing lying.

NIGHT FEARS: Validate the emotion without validating the threat. Staying in the room until sleep onset maintains the fear. Short ritual + comfort toy + nightlight, then leave.

Caroline Goldman est directe, fondée sur les données probantes, et non-culpabilisante. Elle ne rassure pas à tout prix — elle explique. Elle valide l'émotion du parent sans nécessairement valider son interprétation. Elle donne un mécanisme (pourquoi ça se passe) avant le conseil (quoi faire).

## Ses positions cliniques clés — à appliquer dès que pertinent

SOMMEIL : Les associations d'endormissement (s'endormir dans les bras, au sein, avec le parent) ne se résolvent pas seules. Plus on attend, plus c'est difficile. Un protocole gradué est possible sans traumatisme dès 4 mois si les parents le souhaitent. Le manque de sommeil parental a des effets documentés sur la qualité de l'attachement.

CAPRICES vs BESOINS : Avant 18 mois, tout pleur est un besoin. Après, il faut distinguer : une demande qui change de nature selon votre réponse (il s'arrête si vous cédez, reprend si vous résistez) est un caprice. Tenir sa position avec calme et régularité est plus efficace — et plus sécurisant — que céder sous pression.

FRUSTRATION : La tolérance à la frustration est une compétence qui s'apprend comme marcher. Un enfant qui n'en a jamais expérimenté sera en difficulté à l'école et socialement. Ne pas répondre immédiatement à chaque demande non urgente est éducatif, pas négligent.

COLÈRES : Entre 18 mois et 3 ans, les crises sont neurologiquement inévitables (cortex préfrontal immature). Normal ne signifie pas illimité. Céder pour arrêter la crise apprend à l'enfant que crier est efficace. Tenir le cadre avec calme enseigne que la colère ne modifie pas les règles.

SÉPARATION : L'angoisse de séparation (8-10 mois) est un signe que l'attachement fonctionne. Partir en prévenant vaut mieux que partir en douce — la prévisibilité enseigne que vous revenez.

MENSONGE : Avant 5 ans, mentir est un signe de développement cognitif (théorie de l'esprit), pas un défaut moral. Valoriser la vérité sans criminaliser le mensonge.

PEURS NOCTURNES : Valider l'émotion sans valider la menace. Rester dans la chambre jusqu'à l'endormissement entretient la peur. Rituel court + doudou + veilleuse, puis sortir.

  const _logT0=Date.now();

      const reader=res.body.getReader();

  }catch(err){
    addApiLog({ts:new Date().toISOString(),provider:useAnthropic?'anthropic':'gemini',endpoint:'chat',status:'error',model:useAnthropic?ANTHROPIC_MODEL:GEMINI_MODEL,duration:Date.now()-_logT0,reqMsgs:S.chat.msgs.filter(m=>m.role==='user').length,reqSystem:sys,reqUserMsg:txt.trim(),respText:'',error:netErrMsg(err)});

}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='',lines=[];
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  lines.push(line);
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH));
  return lines.length;
}

async function shareHighlight(child,data){
  const{neuron,ageLabel,milestone}=data;
  const cv=document.createElement('canvas');
  const W=600,H=820,dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  await document.fonts.ready;

  // Background
  ctx.fillStyle='#F2F0EB';ctx.fillRect(0,0,W,H);

  // Blue header
  ctx.fillStyle='#3D5570';ctx.fillRect(0,0,W,220);

  // Subtle circles deco
  ctx.save();ctx.globalAlpha=.07;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(560,0,170,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-20,220,110,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Header label
  ctx.fillStyle='rgba(255,255,255,.65)';ctx.font='600 12px "DM Sans",sans-serif';
  ctx.textAlign='center';ctx.fillText('HIGHLIGHT DU JOUR',W/2,58);

  // Child name
  ctx.fillStyle='#fff';ctx.font='500 56px "Cormorant Garamond",serif';
  ctx.fillText(child.firstName,W/2,128);

  // Age
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='400 16px "DM Sans",sans-serif';
  ctx.fillText(ageLabel,W/2,164);

  // White card
  ctx.fillStyle='#fff';
  const cr=16;const cx=32,cy=240,cw=W-64,ch=320;
  ctx.beginPath();ctx.moveTo(cx+cr,cy);ctx.arcTo(cx+cw,cy,cx+cw,cy+ch,cr);ctx.arcTo(cx+cw,cy+ch,cx,cy+ch,cr);ctx.arcTo(cx,cy+ch,cx,cy,cr);ctx.arcTo(cx,cy,cx+cw,cy,cr);ctx.closePath();
  ctx.shadowColor='rgba(0,0,0,.07)';ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;

  // Neuron count
  ctx.fillStyle='#2D4A8A';ctx.font='700 44px "DM Sans",sans-serif';ctx.textAlign='center';
  ctx.fillText('+'+fmt(neuron.daily),W/2,310);
  ctx.fillStyle='#9C9790';ctx.font='400 14px "DM Sans",sans-serif';
  ctx.fillText('connexions neuronales aujourd\'hui',W/2,338);

  // Separator
  ctx.strokeStyle='#F2F0EB';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx+24,365);ctx.lineTo(cx+cw-24,365);ctx.stroke();

  // Milestone
  if(milestone){
    ctx.fillStyle='#1A1918';ctx.font='400 20px "Cormorant Garamond",serif';ctx.textAlign='center';
    wrapText(ctx,milestone.fact,W/2,400,cw-64,30);
  }

  // Total
  ctx.fillStyle='#B0A89E';ctx.font='400 13px "DM Sans",sans-serif';ctx.textAlign='center';
  ctx.fillText('Total : '+fmt(neuron.total)+' connexions',W/2,540);

  // Bottom branding
  ctx.fillStyle='#E2DFD9';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,640);ctx.lineTo(520,640);ctx.stroke();
  ctx.fillStyle='#3D5570';ctx.font='500 22px "Cormorant Garamond",serif';
  ctx.fillText('BébéPilote',W/2,680);
  ctx.fillStyle='#C4BFB8';ctx.font='400 12px "DM Sans",sans-serif';
  ctx.fillText(new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}),W/2,704);

  cv.toBlob(async blob=>{
    const file=new File([blob],`bebepilote-${child.firstName}.png`,{type:'image/png'});
    try{
      if(navigator.share&&navigator.canShare?.({files:[file]})){
        await navigator.share({files:[file],title:`${child.firstName} — BébéPilote`});
      }else{
        const url=URL.createObjectURL(blob),a=document.createElement('a');
        a.href=url;a.download=`bebepilote-${child.firstName}.png`;
        document.body.appendChild(a);a.click();
        setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
      }
    }catch(err){if(err.name!=='AbortError')console.warn(err);}
  },'image/png');
}

function initKeyboardAwareness(){
  if(!window.visualViewport)return;
  let lastH=window.visualViewport.height;
  window.visualViewport.addEventListener('resize',()=>{
    const h=window.visualViewport.height;
    // Keyboard considered open when viewport shrinks more than 20%
    const keyboardOpen=h<window.screen.height*0.75;
    document.documentElement.classList.toggle('keyboard-open',keyboardOpen);
    lastH=h;
  });
}
